<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Aviso - Avisos Colonia Jardines PVR</title>

  <!-- Estilos base -->
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
  <link rel="manifest" href="/avisos-jardines/manifest.json">
  <meta name="theme-color" content="#2c3e50">

  <style>
    /* ========== ESTILO PERIÓDICO DIGITAL PREMIUM ========== */
    :root {
      --paper-bg: #faf8f5;
      --paper-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      --border-light: #e8e0d0;
      --accent-gold: #d4a043;
      --text-dark: #1a2a3a;
      --text-muted: #5a6e7a;
    }

    body {
      background: #e8e4dc;
      font-family: 'Georgia', 'Times New Roman', Times, serif;
    }

    /* Contenedor principal estilo periódico */
    .aviso-paper {
      max-width: 960px;
      margin: 2rem auto;
      background: var(--paper-bg);
      border-radius: 4px;
      box-shadow: var(--paper-shadow);
      overflow: hidden;
      border: 1px solid var(--border-light);
    }

    /* Header del artículo */
    .article-header {
      padding: 2rem 2.5rem 1rem;
      border-bottom: 2px solid var(--accent-gold);
      background: white;
    }

    .article-category {
      display: inline-block;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
      padding: 0.2rem 0.8rem;
      background: var(--accent-gold);
      color: white;
      border-radius: 20px;
      margin-bottom: 1rem;
    }

    .article-category.urgente {
      background: #c0392b;
    }

    .article-category.pendiente {
      background: #f39c12;
    }

    .article-title {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 0.5rem 0 1rem;
      color: var(--text-dark);
      letter-spacing: -0.5px;
      font-family: 'Georgia', 'Times New Roman', Times, serif;
    }

    /* Barra de metadatos */
    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding: 0.8rem 0;
      margin: 0.5rem 0 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: system-ui, -apple-system, sans-serif;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
    }

    .article-meta span {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Cuerpo del artículo */
    .article-body {
      padding: 2rem 2.5rem;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #2c3e2f;
    }

    .article-body p {
      margin-bottom: 1.3rem;
    }

    /* Información adicional */
    .info-card {
      background: #f0ede6;
      border-left: 4px solid var(--accent-gold);
      padding: 1.2rem 1.8rem;
      margin: 1.5rem 0;
      border-radius: 0 12px 12px 0;
    }

    .info-card p {
      margin: 0.6rem 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .info-card strong {
      min-width: 80px;
      color: var(--text-dark);
    }

    /* Galería */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
      margin: 1.8rem 0;
    }

    .media-item {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 0.8rem;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .media-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .media-item img,
    .media-item video {
      max-width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* Botones de acción */
    .article-actions {
      display: flex;
      gap: 1rem;
      margin: 2rem 0 1rem;
      padding-top: 1rem;
      border-top: 2px solid var(--border-light);
      flex-wrap: wrap;
    }

    .btn-action {
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: #1e4620;
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-action.edit {
      background: #d4a043;
      color: #1a2a3a;
    }

    .btn-action.delete {
      background: #c0392b;
    }

    .btn-action.back {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-dark);
    }

    .btn-action.back:hover {
      background: var(--border-light);
    }

    .btn-action:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    /* Estados */
    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .error-message {
      background: #fef2e8;
      border-left: 4px solid #c0392b;
      padding: 1.2rem;
      margin: 2rem;
      border-radius: 8px;
      color: #c0392b;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .aviso-paper {
        margin: 1rem;
      }
      .article-title {
        font-size: 1.8rem;
      }
      .article-header,
      .article-body {
        padding: 1.2rem;
      }
      .article-meta {
        gap: 1rem;
        font-size: 0.7rem;
      }
      .info-card p {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.2rem;
      }
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header-container"></div>

  <!-- Contenido principal -->
  <main>
    <div id="aviso-container" class="aviso-paper">
      <div class="loading-state">
        📰 Cargando aviso... ⏳
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/multimedia.js"></script>
  <script src="/avisos-jardines/js/auth.js"></script>

  <script>
    // ========== FUNCIÓN ESCAPE HTML CORREGIDA ==========
    function escapeHTML(str) {
      // Si es null, undefined, o no es string, retornar string vacío
      if (str === null || str === undefined) return '';
      // Convertir a string por si acaso
      const stringValue = String(str);
      return stringValue
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Función para formatear contenido con párrafos
    function formatearContenido(texto) {
      if (!texto) return '<p>Sin contenido</p>';
      const stringTexto = String(texto);
      const parrafos = stringTexto.split(/\n\s*\n/);
      return parrafos.map(p => `<p>${escapeHTML(p).replace(/\n/g, '<br>')}</p>`).join('');
    }

    // ========== CARGA DEL AVISO ==========
    const AVISO_ID = new URLSearchParams(window.location.search).get('id');
    const ES_EDICION = new URLSearchParams(window.location.search).get('editar') === 'true';

    let avisoActual = null;
    let usuarioActual = null;

    const container = document.getElementById('aviso-container');

    async function cargarAviso() {
      if (!AVISO_ID) {
        mostrarError('No se especificó ningún aviso');
        return;
      }

      try {
        console.log('Cargando aviso ID:', AVISO_ID);

        // Intentar obtener usuario actual
        try {
          usuarioActual = API.getUsuarioActual();
        } catch (e) {
          console.log('Usuario no logueado o error:', e);
          usuarioActual = null;
        }

        // Obtener todos los avisos (la API no tiene getById directo)
        const resultado = await API.listar('AVISOS');
        console.log('Resultado API:', resultado);
        
        const avisos = resultado.datos || [];
        const aviso = avisos.find(a => String(a.id) === String(AVISO_ID));

        if (!aviso) {
          mostrarError('El aviso no existe o fue eliminado');
          return;
        }

        avisoActual = aviso;
        console.log('Aviso cargado:', avisoActual);
        renderizarAviso();

      } catch (error) {
        console.error('Error cargando aviso:', error);
        mostrarError('Error al cargar el aviso: ' + (error.message || 'Error desconocido'));
      }
    }

    function mostrarError(mensaje) {
      container.innerHTML = `
        <div class="error-message">
          ❌ ${escapeHTML(mensaje)}
          <div style="margin-top: 1rem;">
            <a href="/avisos-jardines/index.html" class="btn-action back" style="display: inline-block;">← Volver al inicio</a>
          </div>
        </div>
      `;
    }

    function renderizarAviso() {
      if (!avisoActual) return;

      // Manejo seguro de fechas
      let fechaTexto = 'Fecha no disponible';
      if (avisoActual.created_at) {
        try {
          fechaTexto = new Date(avisoActual.created_at).toLocaleDateString('es-MX', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
          });
        } catch (e) {
          fechaTexto = String(avisoActual.created_at);
        }
      }

      const esUrgente = avisoActual.destacado === 'TRUE' || avisoActual.categoria === 'urgente';
      const esPendiente = avisoActual.status === 'pendiente';
      const esAdmin = usuarioActual && usuarioActual.rol === 'admin';
      const esPropietario = usuarioActual && String(usuarioActual.id) === String(avisoActual.created_by);
      const puedeEditar = esAdmin || esPropietario;

      // Categoría legible
      const categoriaLegible = {
        'urgente': 'URGENTE',
        'eventos': 'EVENTOS',
        'servicios': 'SERVICIOS',
        'perdidos': 'PERDIDOS Y ENCONTRADOS',
        'clasificados': 'CLASIFICADOS'
      }[avisoActual.categoria] || avisoActual.categoria || 'GENERAL';

      // Determinar clase y texto de categoría
      let categoriaClase = '';
      let categoriaTexto = categoriaLegible;
      if (esUrgente) {
        categoriaClase = 'urgente';
        categoriaTexto = '⚠️ URGENTE';
      } else if (esPendiente) {
        categoriaClase = 'pendiente';
        categoriaTexto = '⏳ PENDIENTE DE APROBACIÓN';
      }

      // Construir HTML
      let html = `
        <div class="article-header">
          <div class="article-category ${categoriaClase}">${categoriaTexto}</div>
          <h1 class="article-title">${escapeHTML(avisoActual.titulo || 'Sin título')}</h1>
          <div class="article-meta">
            <span>📅 ${escapeHTML(fechaTexto)}</span>
            <span>👤 Por: ${escapeHTML(avisoActual.created_by || 'Vecino')}</span>
            <span>🏷️ ${escapeHTML(categoriaLegible)}</span>
          </div>
        </div>
        <div class="article-body">
          <div class="article-content">
            ${formatearContenido(avisoActual.contenido)}
          </div>
      `;

      // Información adicional
      const tieneUbicacion = avisoActual.ubicacion && String(avisoActual.ubicacion).trim() !== '';
      const tieneContacto = avisoActual.contacto && String(avisoActual.contacto).trim() !== '';
      const tieneFechaEvento = avisoActual.fecha_evento && String(avisoActual.fecha_evento).trim() !== '';

      if (tieneUbicacion || tieneContacto || tieneFechaEvento) {
        html += `<div class="info-card">`;
        if (tieneUbicacion) {
          html += `<p><strong>📍 Ubicación</strong> ${escapeHTML(avisoActual.ubicacion)}</p>`;
        }
        if (tieneContacto) {
          html += `<p><strong>📞 Contacto</strong> ${escapeHTML(avisoActual.contacto)}</p>`;
        }
        if (tieneFechaEvento) {
          try {
            const fechaEvento = new Date(avisoActual.fecha_evento).toLocaleDateString('es-MX');
            html += `<p><strong>📅 Fecha del evento</strong> ${escapeHTML(fechaEvento)}</p>`;
          } catch (e) {
            html += `<p><strong>📅 Fecha del evento</strong> ${escapeHTML(avisoActual.fecha_evento)}</p>`;
          }
        }
        html += `</div>`;
      }

      // Galería multimedia (placeholder - se puede implementar después)
      if (window.Multimedia && avisoActual.id) {
        html += `<div class="gallery" id="gallery-container"></div>`;
      }

      // Botones de acción
      html += `<div class="article-actions">`;
      
      if (puedeEditar) {
        html += `<a href="/avisos-jardines/admin.html" class="btn-action back">← Volver al panel</a>`;
        html += `<button class="btn-action edit" onclick="irAEditar('${avisoActual.id}')">✏️ Editar aviso</button>`;
        html += `<button class="btn-action delete" onclick="eliminarAviso('${avisoActual.id}')">🗑️ Eliminar aviso</button>`;
      } else {
        html += `<a href="/avisos-jardines/index.html" class="btn-action back">← Volver al inicio</a>`;
      }
      
      html += `</div></div></div>`;

      container.innerHTML = html;

      // Cargar galería multimedia si existe
      if (window.Multimedia && avisoActual.id && typeof Multimedia.obtenerPorAviso === 'function') {
        try {
          const multimedia = Multimedia.obtenerPorAviso(avisoActual.id);
          if (multimedia && multimedia.length > 0) {
            const galleryContainer = document.getElementById('gallery-container');
            if (galleryContainer && typeof Multimedia.renderGallery === 'function') {
              Multimedia.renderGallery(galleryContainer, multimedia, avisoActual.id);
            }
          }
        } catch (e) {
          console.warn('Error cargando multimedia:', e);
        }
      }
    }

    // Funciones globales
    window.irAEditar = function(id) {
      window.location.href = `/avisos-jardines/admin.html?editar=${id}`;
    };

    window.eliminarAviso = async function(id) {
      if (!confirm('¿Estás seguro de que quieres eliminar este aviso? Esta acción no se puede deshacer.')) return;

      try {
        const resultado = await API.eliminar('AVISOS', id);
        if (resultado && resultado.success) {
          alert('✅ Aviso eliminado correctamente');
          window.location.href = '/avisos-jardines/admin.html';
        } else {
          alert('❌ Error al eliminar: ' + (resultado?.error || 'Error desconocido'));
        }
      } catch (error) {
        console.error('Error eliminando aviso:', error);
        alert('❌ Error al eliminar el aviso');
      }
    };

    // Cargar header y footer
    document.addEventListener('DOMContentLoaded', function() {
      // Header
      fetch('/avisos-jardines/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          setTimeout(() => {
            if (typeof window.inicializarHeaderAuth === 'function') {
              window.inicializarHeaderAuth();
            }
          }, 100);
        })
        .catch(err => console.error('Error cargando header:', err));

      // Footer
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) {
            footerContainer.innerHTML = data;
            const anioElement = document.getElementById('anio-actual');
            if (anioElement) {
              anioElement.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando footer:', error));

      // Cargar el aviso
      cargarAviso();
    });
  </script>
</body>
</html>
