<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Aviso - Avisos Colonia Jardines PVR</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">

  <!-- Estilos adicionales formato periódico digital -->
  <style>
    /* ========== ESTILO PERIÓDICO DIGITAL / SITIO DE NOTICIAS ========== */
    body {
      background: #f5f5f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    /* Contenedor principal estilo artículo */
    .contenedor-chico {
      max-width: 880px;
      margin: 30px auto;
      background: #ffffff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }

    /* Contenido del aviso */
    #aviso-detalle {
      padding: 0 35px 40px;
    }

    /* Categoría - etiqueta de sección */
    .aviso-categoria {
      display: inline-block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      padding: 5px 12px;
      background: #1a1a2e;
      color: #f5b042;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    /* Título principal del aviso */
    .aviso-titulo {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 15px 0 20px;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    /* Barra de metadatos */
    .aviso-meta {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      padding: 15px 0;
      margin: 15px 0 25px;
      border-top: 1px solid #e8e0d0;
      border-bottom: 1px solid #e8e0d0;
      color: #6b5b4a;
      font-size: 0.8rem;
    }

    .aviso-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Contenido del artículo */
    .aviso-contenido {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #2c3e2f;
      margin: 30px 0;
    }

    .aviso-contenido p {
      margin-bottom: 1.3em;
    }

    /* Recuadro de información adicional */
    .aviso-info-adicional {
      background: #faf8f2;
      border-left: 4px solid #f5b042;
      padding: 18px 24px;
      margin: 30px 0;
      border-radius: 8px;
    }

    .aviso-info-adicional p {
      margin: 10px 0;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Botón volver */
    .boton-volver {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f5f5f0;
      color: #1a1a2e;
      text-decoration: none;
      padding: 10px 22px;
      font-weight: 500;
      font-size: 0.85rem;
      border-radius: 40px;
      transition: all 0.2s ease;
      border: 1px solid #e0d5c0;
      margin-top: 30px;
    }

    .boton-volver:hover {
      background: #1a1a2e;
      color: #f5b042;
      border-color: #1a1a2e;
    }

    /* Estado de carga */
    .cargando {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 1rem;
    }

    /* Galería multimedia */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin: 30px 0;
    }

    .media-item {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      background: #f9f9f9;
    }

    .media-item img,
    .media-item video {
      max-width: 100%;
      max-height: 150px;
      object-fit: cover;
      border-radius: 4px;
    }

    .btn-eliminar-media {
      margin-top: 8px;
      background: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn-eliminar-media:hover {
      background: #c82333;
    }

    /* Subida de archivos */
    .upload-area {
      border: 2px dashed #4CAF50;
      padding: 20px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .upload-area:hover {
      background: #f0f8f0;
    }

    .upload-area.drag-over {
      background: #e8f5e9;
      border-color: #45a049;
    }

    /* Botones de acción */
    .boton {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 14px;
      transition: all 0.3s;
    }

    .boton:hover {
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .contenedor-chico {
        margin: 15px;
      }

      .aviso-titulo {
        font-size: 1.8rem;
      }

      #aviso-detalle {
        padding: 0 20px 30px;
      }

      .aviso-contenido {
        font-size: 1rem;
      }

      .aviso-meta {
        gap: 15px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>

  <meta name="theme-color" content="#2c3e50">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <div id="header-container"></div>

  <!-- ================= CONTENIDO ================= -->
  <main class="contenedor-chico">

    <!-- Mensajes del sistema -->
    <div id="mensaje-container"></div>

    <!-- Aquí se inyecta TODO el aviso desde aviso.js -->
    <div id="aviso-detalle" class="cargando">
      📰 Cargando aviso...
    </div>

  </main>

  <!-- ================= FOOTER ================= -->
  <div id="footer-container"></div>

  <!-- ================= SCRIPTS ================= -->

  <!-- Cargar header  -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;

          // ✅ Esperar a que la función exista (máximo 3 segundos)
          let intentos = 0;
          const maxIntentos = 30; // 30 * 100ms = 3 segundos

          const esperarHeader = setInterval(() => {
            intentos++;
            if (typeof window.inicializarHeaderAuth === 'function') {
              clearInterval(esperarHeader);
              window.inicializarHeaderAuth();
              console.log('✅ Header inicializado después de', intentos * 100, 'ms');
            } else if (intentos >= maxIntentos) {
              clearInterval(esperarHeader);
              console.warn('⚠️ No se pudo encontrar inicializarHeaderAuth');
            }
          }, 100);
        })
        .catch(err => console.error('Error cargando header:', err));
    });
  </script>

  <!-- Cargar footer -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footer = document.getElementById('footer-container');
          if (footer) {
            footer.innerHTML = data;
            const anio = document.getElementById('anio-actual');
            if (anio) {
              anio.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando el footer:', error));
    });
  </script>

  <!-- Core Scripts -->
  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/multimedia.js"></script>
  <script src="/avisos-jardines/js/aviso.js"></script>

  <!-- Inicialización final -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Pequeña pausa para asegurar que todos los scripts cargaron
      setTimeout(() => {
        // Verificar si ya estamos en modo edición
        const urlParams = new URLSearchParams(window.location.search);
        const modoEdicion = urlParams.get('editar') === 'true';

        // El aviso.js ya maneja la carga, solo aseguramos el header
        if (typeof window.actualizarHeaderSesion === 'function') {
          window.actualizarHeaderSesion();
        }

        console.log('✅ aviso.html inicializado correctamente', modoEdicion ? '(modo edición)' : '(modo vista)');
      }, 200);
    });
  </script>

</body>

</html>
