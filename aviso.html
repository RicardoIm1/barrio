<!DOCTYPE html>
<html lang="es-MX">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Aviso - Avisos Colonia Jardines PVR</title>

  <!-- Estilos base -->
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
  <link rel="manifest" href="/avisos-jardines/manifest.json">
  <meta name="theme-color" content="#2c3e50">

  <style>
    /* ========== ESTILO PERIÓDICO DIGITAL PREMIUM ========== */
    .aviso-paper {
      max-width: 960px;
      margin: 2rem auto;
      background: var(--paper-bg);
      border-radius: 4px;
      box-shadow: var(--paper-shadow);
      overflow: hidden;
      border: 1px solid var(--border-light);
    }

    .article-header {
      padding: 2rem 2.5rem 1rem;
      border-bottom: 2px solid var(--accent-gold);
      background: white;
    }

    .article-category {
      display: inline-block;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
      padding: 0.2rem 0.8rem;
      background: var(--accent-gold);
      color: white;
      border-radius: 20px;
      margin-bottom: 1rem;
    }

    .article-category.urgente {
      background: #c0392b;
    }

    .article-category.pendiente {
      background: #f39c12;
    }

    .article-title {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 0.5rem 0 1rem;
      color: var(--text-dark);
      letter-spacing: -0.5px;
      font-family: 'Georgia', 'Times New Roman', Times, serif;
    }

    .featured-image {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      display: block;
    }

    .featured-image-container {
      position: relative;
      background: #1a1a2e;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding: 0.8rem 0;
      margin: 0.5rem 0 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: system-ui, -apple-system, sans-serif;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
    }

    .article-meta span {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .article-body {
      padding: 2rem 2.5rem;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #2c3e2f;
    }

    .article-body p {
      margin-bottom: 1.3rem;
    }

    .info-card {
      background: #f0ede6;
      border-left: 4px solid var(--accent-gold);
      padding: 1.2rem 1.8rem;
      margin: 1.5rem 0;
      border-radius: 0 12px 12px 0;
    }

    .info-card p {
      margin: 0.6rem 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .info-card strong {
      min-width: 80px;
      color: var(--text-dark);
    }

    .gallery-section {
      margin: 2rem 0;
    }

    .gallery-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent-gold);
      display: inline-block;
      font-family: system-ui, sans-serif;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .gallery-item {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 0.5rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .gallery-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .gallery-item video {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img,
    .lightbox video {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      font-family: system-ui;
    }

    .article-actions {
      display: flex;
      gap: 1rem;
      margin: 2rem 0 1rem;
      padding-top: 1rem;
      border-top: 2px solid var(--border-light);
      flex-wrap: wrap;
    }

    .btn-action {
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: #1e4620;
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-action.edit {
      background: #d4a043;
      color: #1a2a3a;
    }

    .btn-action.delete {
      background: #c0392b;
    }

    .btn-action.back {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-dark);
    }

    .btn-action.back:hover {
      background: var(--border-light);
    }

    .btn-action:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .stats-row {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      padding: 0.8rem;
      background: #f0ede6;
      border-radius: 12px;
      font-size: 0.85rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .error-message {
      background: #fef2e8;
      border-left: 4px solid #c0392b;
      padding: 1.2rem;
      margin: 2rem;
      border-radius: 8px;
      color: #c0392b;
    }

    @media (max-width: 768px) {
      .aviso-paper {
        margin: 1rem;
      }

      .article-title {
        font-size: 1.8rem;
      }

      .article-header,
      .article-body {
        padding: 1.2rem;
      }

      .article-meta {
        gap: 1rem;
        font-size: 0.7rem;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>

<body>

  <div id="header-container"></div>

  <main>
    <div id="aviso-container" class="aviso-paper">
      <div class="loading-state">
        📰 Cargando aviso... ⏳
      </div>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" onclick="cerrarLightbox()">
    <span class="lightbox-close">&times;</span>
    <div id="lightbox-content"></div>
  </div>

  <div id="footer-container"></div>

  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/auth.js"></script>
  <script src="/avisos-jardines/js/multimedia.js"></script>

  <script>
    // ========== UTILIDADES ==========
    function escapeHTML(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatearContenido(texto) {
      if (!texto) return '<p>Sin contenido</p>';
      const stringTexto = String(texto);
      const parrafos = stringTexto.split(/\n\s*\n/);
      return parrafos.map(p => `<p>${escapeHTML(p).replace(/\n/g, '<br>')}</p>`).join('');
    }

    // ========== LIGHTBOX ==========
    function abrirLightbox(url, tipo) {
      const lightbox = document.getElementById('lightbox');
      const content = document.getElementById('lightbox-content');

      if (tipo === 'video') {
        content.innerHTML = `<video controls autoplay style="max-width:90%; max-height:90%;"><source src="${escapeHTML(url)}" type="video/mp4"></video>`;
      } else {
        content.innerHTML = `<img src="${escapeHTML(url)}" alt="Imagen ampliada">`;
      }

      lightbox.classList.add('active');
    }

    function cerrarLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.getElementById('lightbox-content').innerHTML = '';
    }

    // ========== REGISTRAR VISTA ==========
    async function registrarVista(avisoId) {
      try {
        const apiKey = localStorage.getItem('api_key');
        const resultado = await API.peticion('REGISTRAR_VISTA', { id: avisoId }, apiKey);
        if (resultado && resultado.success) {
          console.log(`✅ Vista registrada para aviso ${avisoId}`);
        }
      } catch (e) {
        console.warn('No se pudo registrar vista:', e);
      }
    }

    // ========== CARGA DEL AVISO ==========
    const AVISO_ID = new URLSearchParams(window.location.search).get('id');
    let multimediaManager = null;
    let avisoActual = null;
    let usuarioActual = null;

    async function cargarAviso() {
      const container = document.getElementById('aviso-container');
      
      if (!AVISO_ID) {
        container.innerHTML = `
          <div class="error-message">
            ❌ No se especificó ningún aviso
            <div style="margin-top: 1rem;">
              <a href="/avisos-jardines/index.html" class="btn-action back" style="display: inline-block;">← Volver al inicio</a>
            </div>
          </div>
        `;
        return;
      }

      try {
        console.log('Cargando aviso ID:', AVISO_ID);

        // Obtener usuario actual
        try {
          usuarioActual = API.getUsuarioActual();
        } catch (e) {
          usuarioActual = null;
        }

        // Inicializar MultimediaManager si existe la clase
        if (typeof MultimediaManager !== 'undefined') {
          multimediaManager = new MultimediaManager(API);
          console.log('MultimediaManager inicializado');
        }

        // Obtener el aviso - Usar listar correctamente
        const resultado = await API.listar('AVISOS');
        
        // Normalizar respuesta (API.listar devuelve { datos: [] } o directamente el array)
        let avisos = [];
        if (resultado && resultado.datos && Array.isArray(resultado.datos)) {
          avisos = resultado.datos;
        } else if (Array.isArray(resultado)) {
          avisos = resultado;
        } else if (resultado && resultado.data && Array.isArray(resultado.data)) {
          avisos = resultado.data;
        }
        
        const aviso = avisos.find(a => String(a.id) === String(AVISO_ID));

        if (!aviso) {
          container.innerHTML = `
            <div class="error-message">
              ❌ El aviso no existe o fue eliminado
              <div style="margin-top: 1rem;">
                <a href="/avisos-jardines/index.html" class="btn-action back" style="display: inline-block;">← Volver al inicio</a>
              </div>
            </div>
          `;
          return;
        }

        avisoActual = aviso;
        console.log('Aviso cargado:', avisoActual);

        // ✅ REGISTRAR VISTA (después de cargar el aviso)
        await registrarVista(AVISO_ID);

        // Obtener multimedia asociado
        let multimediaItems = [];
        if (multimediaManager) {
          try {
            const multimediaResult = await multimediaManager.listarMultimedia(AVISO_ID);
            if (multimediaResult && multimediaResult.success && multimediaResult.data) {
              multimediaItems = multimediaResult.data;
              console.log('Multimedia cargado:', multimediaItems.length, 'items');
            }
          } catch (e) {
            console.warn('Error cargando multimedia:', e);
          }
        }

        renderizarAviso(multimediaItems);

      } catch (error) {
        console.error('Error cargando aviso:', error);
        container.innerHTML = `
          <div class="error-message">
            ❌ Error al cargar el aviso: ${escapeHTML(error.message || 'Error desconocido')}
            <div style="margin-top: 1rem;">
              <a href="/avisos-jardines/index.html" class="btn-action back" style="display: inline-block;">← Volver al inicio</a>
            </div>
          </div>
        `;
      }
    }

    function renderizarAviso(multimediaItems) {
      if (!avisoActual) return;

      // Fecha
      let fechaTexto = 'Fecha no disponible';
      if (avisoActual.created_at) {
        try {
          fechaTexto = new Date(avisoActual.created_at).toLocaleDateString('es-MX', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });
        } catch (e) {
          fechaTexto = String(avisoActual.created_at);
        }
      }

      const esUrgente = avisoActual.destacado === 'TRUE' || avisoActual.categoria === 'urgente';
      const esPendiente = avisoActual.status === 'pendiente';
      const esAdmin = usuarioActual && usuarioActual.rol === 'admin';
      const esPropietario = usuarioActual && String(usuarioActual.id) === String(avisoActual.created_by);
      const puedeEditar = esAdmin || esPropietario;

      // Estadísticas
      const vistas = avisoActual.vistas || 0;
      const clicksWhatsApp = avisoActual.clicks_whatsapp || 0;
      const intereses = avisoActual.intereses || 0;

      const categoriaLegible = {
        'urgente': 'URGENTE',
        'escuelas': 'ESCUELAS',
        'servicios': 'SERVICIOS',
        'comercios': 'COMERCIOS',
        'eventos': 'EVENTOS',
        'gobierno': 'GOBIERNO',
        'varios': 'VARIOS'
      }[avisoActual.categoria] || avisoActual.categoria || 'GENERAL';

      let categoriaClase = '';
      let categoriaTexto = categoriaLegible;
      if (esUrgente) {
        categoriaClase = 'urgente';
        categoriaTexto = '⚠️ URGENTE';
      } else if (esPendiente) {
        categoriaClase = 'pendiente';
        categoriaTexto = '⏳ PENDIENTE DE APROBACIÓN';
      }

      // Determinar imagen destacada
      let imagenDestacada = null;
      let imagenesGaleria = [];

      if (avisoActual.imagen_url && avisoActual.imagen_url.trim() !== '') {
        imagenDestacada = avisoActual.imagen_url;
        if (multimediaItems && multimediaItems.length > 0) {
          imagenesGaleria = multimediaItems.filter(m => m.tipo === 'image/jpeg' || m.tipo === 'image/png' || m.tipo === 'image/jpg');
        }
      } else if (multimediaItems && multimediaItems.length > 0) {
        const imagenes = multimediaItems.filter(m => m.tipo === 'image/jpeg' || m.tipo === 'image/png' || m.tipo === 'image/jpg');
        if (imagenes.length > 0) {
          imagenDestacada = imagenes[0].url;
          imagenesGaleria = imagenes.slice(1);
        }
        const videos = multimediaItems.filter(m => m.tipo === 'video/mp4' || m.tipo === 'video/webm');
        imagenesGaleria.push(...videos);
      }

      const container = document.getElementById('aviso-container');

      let html = `
        <div class="article-header">
          <div class="article-category ${categoriaClase}">${categoriaTexto}</div>
          <h1 class="article-title">${escapeHTML(avisoActual.titulo || 'Sin título')}</h1>
          <div class="article-meta">
            <span>📅 ${escapeHTML(fechaTexto)}</span>
            <span>👤 Por: ${escapeHTML(avisoActual.created_by || 'Vecino')}</span>
            <span>🏷️ ${escapeHTML(categoriaLegible)}</span>
          </div>
        </div>
      `;

      // Imagen destacada
      if (imagenDestacada) {
        html += `
          <div class="featured-image-container">
            <img src="${escapeHTML(imagenDestacada)}" alt="${escapeHTML(avisoActual.titulo || 'Imagen destacada')}" class="featured-image" onclick="abrirLightbox('${escapeHTML(imagenDestacada)}', 'imagen')">
          </div>
        `;
      }

      html += `<div class="article-body">`;
      html += `<div class="article-content">${formatearContenido(avisoActual.contenido)}</div>`;

      // Estadísticas visibles
      html += `
        <div class="stats-row">
          <span class="stat-item">👁️ ${vistas} vistas</span>
          <span class="stat-item">💬 ${clicksWhatsApp} contactos WhatsApp</span>
          <span class="stat-item">❤️ ${intereses} personas interesadas</span>
        </div>
      `;

      // Información adicional
      const tieneUbicacion = avisoActual.ubicacion && String(avisoActual.ubicacion).trim() !== '';
      const tieneContacto = avisoActual.contacto && String(avisoActual.contacto).trim() !== '';
      const tieneFechaEvento = avisoActual.fecha_evento && String(avisoActual.fecha_evento).trim() !== '';

      if (tieneUbicacion || tieneContacto || tieneFechaEvento) {
        html += `<div class="info-card">`;
        if (tieneUbicacion) html += `<p><strong>📍 Ubicación</strong> ${escapeHTML(avisoActual.ubicacion)}</p>`;
        if (tieneContacto) {
          const contacto = escapeHTML(avisoActual.contacto);
          html += `<p><strong>📞 Contacto</strong> ${contacto}</p>`;
        }
        if (tieneFechaEvento) {
          try {
            const fechaEvento = new Date(avisoActual.fecha_evento).toLocaleDateString('es-MX');
            html += `<p><strong>📅 Fecha del evento</strong> ${escapeHTML(fechaEvento)}</p>`;
          } catch (e) {
            html += `<p><strong>📅 Fecha del evento</strong> ${escapeHTML(avisoActual.fecha_evento)}</p>`;
          }
        }
        html += `</div>`;
      }

      // Galería
      if (imagenesGaleria.length > 0) {
        html += `
          <div class="gallery-section">
            <div class="gallery-title">📸 Galería multimedia</div>
            <div class="gallery">
        `;

        imagenesGaleria.forEach(item => {
          const esVideo = item.tipo === 'video/mp4' || item.tipo === 'video/webm';
          if (esVideo) {
            html += `
              <div class="gallery-item" onclick="abrirLightbox('${escapeHTML(item.url)}', 'video')">
                <video src="${escapeHTML(item.url)}" preload="metadata"></video>
                <div style="text-align: center; font-size: 0.7rem; margin-top: 0.3rem;">🎬 Video</div>
              </div>
            `;
          } else {
            html += `
              <div class="gallery-item" onclick="abrirLightbox('${escapeHTML(item.url)}', 'imagen')">
                <img src="${escapeHTML(item.url)}" alt="Multimedia" loading="lazy">
              </div>
            `;
          }
        });

        html += `</div></div>`;
      }

      // Botones de acción
      html += `<div class="article-actions">`;
      if (puedeEditar) {
        html += `<a href="/avisos-jardines/admin.html" class="btn-action back">← Volver al panel</a>`;
        html += `<button class="btn-action edit" onclick="irAEditar('${avisoActual.id}')">✏️ Editar aviso</button>`;
        html += `<button class="btn-action delete" onclick="eliminarAviso('${avisoActual.id}')">🗑️ Eliminar aviso</button>`;
      } else {
        html += `<a href="/avisos-jardines/index.html" class="btn-action back">← Volver al inicio</a>`;
      }

      // Botón WhatsApp si hay contacto
      if (tieneContacto) {
        const numero = String(avisoActual.contacto).replace(/[^0-9]/g, '');
        const mensaje = encodeURIComponent(`Hola, vi tu aviso "${avisoActual.titulo}" en la plataforma de la colonia. Me interesa más información.`);
        html += `<a href="https://wa.me/52${numero}?text=${mensaje}" class="btn-action" target="_blank" onclick="registrarClickWhatsApp('${avisoActual.id}')">💬 Contactar por WhatsApp</a>`;
      }

      html += `</div></div></div>`;

      container.innerHTML = html;
    }

    // Registrar click WhatsApp
    async function registrarClickWhatsApp(id) {
      try {
        await API.peticion('REGISTRAR_CLICK_WHATSAPP', { id: id });
        console.log('✅ Click WhatsApp registrado');
      } catch (e) {
        console.warn('No se pudo registrar click:', e);
      }
    }

    // Funciones globales
    window.irAEditar = function (id) {
      window.location.href = `/avisos-jardines/admin.html?editar=${id}`;
    };

    window.eliminarAviso = async function (id) {
      if (!confirm('¿Estás seguro de que quieres eliminar este aviso? Esta acción no se puede deshacer.')) return;

      try {
        const apiKey = localStorage.getItem('api_key');
        const resultado = await API.peticion('ELIMINAR', { coleccion: 'AVISOS', id: id }, apiKey);
        if (resultado && resultado.success) {
          alert('✅ Aviso eliminado correctamente');
          window.location.href = '/avisos-jardines/index.html';
        } else {
          alert('❌ Error al eliminar: ' + (resultado?.error || 'Error desconocido'));
        }
      } catch (error) {
        console.error('Error eliminando aviso:', error);
        alert('❌ Error al eliminar el aviso');
      }
    };

    window.registrarClickWhatsApp = registrarClickWhatsApp;
    window.abrirLightbox = abrirLightbox;
    window.cerrarLightbox = cerrarLightbox;

    // ========== INICIALIZACIÓN ==========
    document.addEventListener('DOMContentLoaded', function () {
      // Cargar header
      fetch('/avisos-jardines/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          setTimeout(() => {
            if (typeof window.inicializarHeaderAuth === 'function') {
              window.inicializarHeaderAuth();
            }
          }, 100);
        })
        .catch(err => console.error('Error cargando header:', err));

      // Cargar footer
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) {
            footerContainer.innerHTML = data;
            const anioElement = document.getElementById('anio-actual');
            if (anioElement) anioElement.textContent = new Date().getFullYear();
          }
        })
        .catch(error => console.error('Error cargando footer:', error));

      // Cargar el aviso
      cargarAviso();
    });
  </script>

  <script>
    // Respaldo: Forzar actualización del header después de todo
    (function() {
        function forzarActualizarHeader() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');

            const loginLink = document.getElementById('login-link');
            const userArea = document.getElementById('user-area');
            const userNameSpan = document.getElementById('user-name');
            const perfilLink = document.getElementById('perfil-link');
            const cerrarBtn = document.getElementById('cerrar-sesion');

            if (!loginLink) {
                console.log('aviso.html: Header no encontrado, reintentando...');
                setTimeout(forzarActualizarHeader, 200);
                return;
            }

            console.log('aviso.html: Forzando actualización header');
            console.log('Usuario:', usuarioStr ? 'Sesión activa' : 'Sin sesión');

            if (usuarioStr && apiKey) {
                try {
                    const usuario = JSON.parse(usuarioStr);
                    loginLink.style.display = 'none';
                    userArea.style.display = 'flex';

                    if (userNameSpan) {
                        userNameSpan.textContent = `👋 ${usuario.nombre || usuario.email || 'Usuario'}`;
                    }

                    if (perfilLink) {
                        perfilLink.onclick = function(e) {
                            e.preventDefault();
                            window.location.href = '/avisos-jardines/perfil.html';
                        };
                    }

                    if (cerrarBtn) {
                        const nuevoCerrar = cerrarBtn.cloneNode(true);
                        cerrarBtn.parentNode.replaceChild(nuevoCerrar, cerrarBtn);
                        nuevoCerrar.addEventListener('click', function(e) {
                            e.preventDefault();
                            localStorage.removeItem('usuario');
                            localStorage.removeItem('api_key');
                            window.location.href = '/avisos-jardines/index.html';
                        });
                    }
                    console.log('aviso.html: Header actualizado - modo logueado');
                } catch (e) {
                    console.error('aviso.html: Error al actualizar header', e);
                }
            } else {
                loginLink.style.display = 'inline-flex';
                userArea.style.display = 'none';
                console.log('aviso.html: Header actualizado - modo no logueado');
            }
        }

        // Ejecutar cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', forzarActualizarHeader);
        } else {
            setTimeout(forzarActualizarHeader, 100);
        }

        // También ejecutar después de que el header se cargue (fetch)
        setTimeout(forzarActualizarHeader, 500);
        setTimeout(forzarActualizarHeader, 1000);
    })();
</script>
</body>

</html>
