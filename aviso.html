<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Aviso - Avisos Colonia Jardines PVR</title>

  <!-- Estilos base -->
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
  <link rel="manifest" href="/avisos-jardines/manifest.json">
  <meta name="theme-color" content="#2c3e50">

  <!-- Estilos específicos para la vista de aviso individual (estilo periódico digital) -->
  <style>
    /* ========== ESTILO PERIÓDICO DIGITAL ========== */
    body {
      background: #f5f5f0;
    }

    /* Contenedor principal estilo artículo */
    .aviso-contenedor {
      max-width: 880px;
      margin: 2rem auto;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid var(--color-borde);
    }

    /* Contenido del aviso */
    #aviso-detalle {
      padding: 2rem 2rem 2.5rem;
    }

    /* Categoría - etiqueta de sección */
    .aviso-categoria {
      display: inline-block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      background: var(--color-primario);
      color: #f5b042;
      border-radius: 2rem;
      margin-bottom: 1.2rem;
    }

    /* Título principal del aviso */
    .aviso-titulo {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 0.5rem 0 1rem;
      color: var(--color-primario);
      letter-spacing: -0.5px;
    }

    /* Barra de metadatos */
    .aviso-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      padding: 0.8rem 0;
      margin: 1rem 0 1.5rem;
      border-top: 1px solid var(--color-borde);
      border-bottom: 1px solid var(--color-borde);
      color: var(--color-texto-claro);
      font-size: 0.85rem;
    }

    .aviso-meta span {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Contenido del artículo */
    .aviso-contenido {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--color-texto);
      margin: 1.8rem 0;
    }

    .aviso-contenido p {
      margin-bottom: 1.2rem;
    }

    /* Recuadro de información adicional */
    .aviso-info-adicional {
      background: #faf8f2;
      border-left: 4px solid #f5b042;
      padding: 1rem 1.5rem;
      margin: 1.8rem 0;
      border-radius: 0.75rem;
    }

    .aviso-info-adicional p {
      margin: 0.6rem 0;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* Botón volver */
    .boton-volver {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--color-fondo);
      color: var(--color-primario);
      text-decoration: none;
      padding: 0.6rem 1.2rem;
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 2rem;
      transition: all 0.2s ease;
      border: 1px solid var(--color-borde);
      margin-top: 1.5rem;
    }

    .boton-volver:hover {
      background: var(--color-primario);
      color: white;
      border-color: var(--color-primario);
    }

    /* Estado de carga */
    .cargando {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-texto-claro);
      font-size: 1rem;
    }

    /* Galería multimedia */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1.8rem 0;
    }

    .media-item {
      border: 1px solid var(--color-borde);
      border-radius: 0.75rem;
      padding: 0.8rem;
      text-align: center;
      background: var(--color-fondo);
    }

    .media-item img,
    .media-item video {
      max-width: 100%;
      max-height: 150px;
      object-fit: cover;
      border-radius: 0.5rem;
    }

    .btn-eliminar-media {
      margin-top: 0.5rem;
      background: #dc3545;
      color: white;
      border: none;
      padding: 0.3rem 0.8rem;
      border-radius: 1.5rem;
      cursor: pointer;
      font-size: 0.7rem;
    }

    .btn-eliminar-media:hover {
      background: #c82333;
    }

    /* Subida de archivos */
    .upload-area {
      border: 2px dashed #4CAF50;
      padding: 1rem;
      text-align: center;
      margin: 1rem 0;
      cursor: pointer;
      border-radius: 0.75rem;
      transition: all 0.3s;
    }

    .upload-area:hover {
      background: #f0f8f0;
    }

    .upload-area.drag-over {
      background: #e8f5e9;
      border-color: #45a049;
    }

    @media (max-width: 768px) {
      .aviso-contenedor {
        margin: 1rem;
      }
      .aviso-titulo {
        font-size: 1.6rem;
      }
      #aviso-detalle {
        padding: 1.2rem;
      }
      .aviso-contenido {
        font-size: 1rem;
      }
      .aviso-meta {
        gap: 1rem;
      }
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div id="header-container"></div>

  <!-- Contenido principal -->
  <main>
    <div class="aviso-contenedor">
      <div id="mensaje-container"></div>
      <div id="aviso-detalle" class="cargando">
        📰 Cargando aviso...
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/multimedia.js"></script>
  <script src="/avisos-jardines/js/aviso.js"></script>

  <script>
    // Cargar header y footer
    document.addEventListener('DOMContentLoaded', function() {
      // Header
      fetch('/avisos-jardines/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          setTimeout(() => {
            if (typeof window.inicializarHeaderAuth === 'function') {
              window.inicializarHeaderAuth();
            } else {
              setTimeout(() => {
                if (typeof window.inicializarHeaderAuth === 'function') {
                  window.inicializarHeaderAuth();
                }
              }, 500);
            }
          }, 200);
        })
        .catch(err => console.error('Error cargando header:', err));

      // Footer
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) {
            footerContainer.innerHTML = data;
            const anioElement = document.getElementById('anio-actual');
            if (anioElement) {
              anioElement.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando footer:', error));
    });
  </script>
</body>
</html>
