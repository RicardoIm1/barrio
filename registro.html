<!DOCTYPE html>
<html lang="es-MX">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Registro | Avisos Colonia Jardines PVR</title>
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
  <link rel="manifest" href="/avisos-jardines/manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <style>
    .registro-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .registro-header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #1e4620, #2b7a2b);
      border-radius: 1rem;
      color: white;
    }

    .registro-header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
    }

    .badge {
      background: #fbbf24;
      color: #1e4620;
      font-size: 0.7rem;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      display: inline-block;
      margin-top: 0.5rem;
    }

    .registro-content {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid var(--color-borde);
      margin-bottom: 2rem;
    }

    .campo {
      margin-bottom: 1.2rem;
    }

    .campo label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: var(--color-primario);
    }

    .campo input,
    .campo select,
    .campo textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--color-borde);
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: white;
    }

    .campo input:focus,
    .campo select:focus,
    .campo textarea:focus {
      outline: none;
      border-color: var(--color-acento);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .ayuda {
      font-size: 0.7rem;
      color: var(--color-texto-claro);
      margin-top: 0.3rem;
    }

    .info-visibilidad {
      background: #f0fdf4;
      border-left: 4px solid #2b7a2b;
      padding: 0.8rem 1rem;
      border-radius: 0.75rem;
      margin: 1rem 0;
      font-size: 0.8rem;
    }

    .checkbox-acuerdo {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      margin: 1.2rem 0;
      cursor: pointer;
    }

    .checkbox-acuerdo input {
      width: 20px;
      height: 20px;
      margin-top: 0.1rem;
      accent-color: var(--color-primario);
    }

    .checkbox-acuerdo label {
      font-size: 0.85rem;
      line-height: 1.4;
      cursor: pointer;
      color: var(--color-texto);
    }

    .btn {
      background: var(--color-primario);
      color: white;
      border: none;
      width: 100%;
      padding: 0.9rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--color-secundario);
    }

    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .mensaje-error {
      background: #fee2e2;
      color: #b91c1c;
      padding: 0.8rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      border: 1px solid #fecaca;
    }

    .mensaje-exito {
      background: #d1fae5;
      color: #065f46;
      padding: 0.8rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      border: 1px solid #a7f3d0;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .registro-content {
        padding: 1.5rem;
      }
      .registro-header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <main class="contenedor">
    <div class="registro-container">
      <div class="registro-header">
        <h1>📋 Formar parte</h1>
        <p>Regístrate y publica avisos en tu colonia</p>
        <div class="badge">✨ Entre vecinos, sin letras chiquitas</div>
      </div>

      <div class="registro-content" id="formularioRegistro">
        <div id="mensajeGlobal"></div>

        <div class="campo">
          <label>Tu nombre completo *</label>
          <input type="text" id="nombre" placeholder="Ejemplo: María de la Luz Gutiérrez">
        </div>

        <div class="campo">
          <label>Correo electrónico *</label>
          <input type="email" id="email" placeholder="Ejemplo: maria@ejemplo.com">
          <div class="ayuda">Lo usarás para iniciar sesión</div>
        </div>

        <div class="campo">
          <label>Contraseña *</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="campo">
          <label>Teléfono o WhatsApp *</label>
          <input type="tel" id="telefono" placeholder="Ejemplo: 322 999 9999">
          <div class="ayuda">Para que los vecinos te contacten</div>
        </div>

        <div class="campo">
          <label>Dirección o referencia en la colonia *</label>
          <input type="text" id="direccion" placeholder="Ejemplo: Calle Siempre viva #847, atrás de la tortillería">
        </div>

        <div class="campo">
          <label>¿Qué oficio o profesión tienes? *</label>
          <select id="oficio">
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Electricista">⚡ Electricista</option>
            <option value="Plomero">🔧 Plomero</option>
            <option value="Carpintero">🪚 Carpintero</option>
            <option value="Mecánico">🚗 Mecánico</option>
            <option value="Estilista">✂️ Estilista / Barbería</option>
            <option value="Costurera">🧵 Costurera / Modista</option>
            <option value="Pintor">🎨 Pintor</option>
            <option value="Albañil">🧱 Albañil</option>
            <option value="Panadero / Bizcocho">🍞 Panadero / Bizcocho</option>
            <option value="Comida casera">🍲 Comida casera / Fonda</option>
            <option value="Otro">📝 Otro (escríbelo)</option>
          </select>
        </div>

        <div class="campo" id="otroOficioContainer" style="display: none;">
          <label>Escribe tu oficio</label>
          <input type="text" id="otroOficio" placeholder="Ej: Soldador, Afilador, Lavandera...">
        </div>

        <div class="campo">
          <label>Cuéntanos un poco sobre ti o tu negocio (opcional)</label>
          <textarea id="descripcion" placeholder="Ej: Hago reparaciones eléctricas a domicilio, voy a toda la colonia, precios económicos."></textarea>
        </div>

        <div class="info-visibilidad">
          📢 <strong>¿Quieres publicar tu primer aviso ahora?</strong> Cuéntale a los vecinos lo que ofreces.
        </div>

        <div class="campo">
          <label>Título del aviso (opcional)</label>
          <input type="text" id="avisoTitulo" placeholder="Ej: Reparaciones eléctricas a domicilio">
        </div>

        <div class="campo">
          <label>Contenido del aviso (opcional)</label>
          <textarea id="avisoContenido" placeholder="Ej: Ofrezco servicio de plomería económica, atiendo toda la colonia, llamar al WhatsApp."></textarea>
        </div>

        <div class="checkbox-acuerdo">
          <input type="checkbox" id="acepto">
          <label>
            Acepto el <strong><a href="/avisos-jardines/confianza.html" style="color: var(--color-acento);">Compromiso de Confianza Vecinal</a></strong>.
            Sé que mis datos se usarán solo para el directorio y avisos de la colonia, y que <strong>no se compartirán con bancos ni empresas externas</strong>.
          </label>
        </div>

        <button class="btn" id="btnRegistrar">Registrarme y publicar</button>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/auth.js"></script>

  <script>
    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbz3eGCWH3tNFuJGsV4B0mqEf3vwAh7z26mO4J2hwNZtXwtizYQr458sQ7GyxkgziNXs/exec';

    const oficioSelect = document.getElementById('oficio');
    const otroContainer = document.getElementById('otroOficioContainer');

    oficioSelect.addEventListener('change', () => {
      otroContainer.style.display = oficioSelect.value === 'Otro' ? 'block' : 'none';
    });

    async function llamarAPI(accion, datos = {}, apiKey = null) {
      const params = { accion: accion, ...datos };
      if (apiKey) params.api_key = apiKey;

      return new Promise((resolve, reject) => {
        window.handleCallback = function (respuesta) {
          delete window.handleCallback;
          respuesta.success ? resolve(respuesta) : reject(new Error(respuesta.error || 'Error desconocido'));
        };

        const script = document.createElement('script');
        script.src = `${API_BASE_URL}?callback=handleCallback&jsonp=${encodeURIComponent(JSON.stringify(params))}`;
        script.onerror = () => {
          delete window.handleCallback;
          reject(new Error('Error de conexión con el servidor'));
        };
        document.body.appendChild(script);
        document.body.removeChild(script);
      });
    }

    async function registrarUsuario(datosUsuario) {
      return llamarAPI('REGISTRO', { datos: datosUsuario });
    }

    async function crearAviso(apiKey, datosAviso) {
      return llamarAPI('CREAR', { coleccion: 'AVISOS', datos: datosAviso }, apiKey);
    }

    // Cargar header y footer
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/header.html')
        .then(res => res.ok ? res.text() : Promise.reject('Header no encontrado'))
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
        })
        .catch(err => console.error('Error cargando header:', err));

      fetch('/avisos-jardines/common/footer.html')
        .then(res => res.ok ? res.text() : Promise.reject('Footer no encontrado'))
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) {
            footerContainer.innerHTML = data;
            const anioElement = document.getElementById('anio-actual');
            if (anioElement) anioElement.textContent = new Date().getFullYear();
          }
        })
        .catch(error => console.error('Error cargando footer:', error));
    });

    const btn = document.getElementById('btnRegistrar');
    const mensajeDiv = document.getElementById('mensajeGlobal');

    function mostrarMensaje(texto, esError = true) {
      mensajeDiv.innerHTML = `<div class="${esError ? 'mensaje-error' : 'mensaje-exito'}">${texto}</div>`;
      setTimeout(() => {
        if (mensajeDiv.innerHTML.includes(texto)) mensajeDiv.innerHTML = '';
      }, 5000);
    }

    btn.addEventListener('click', async () => {
      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const direccion = document.getElementById('direccion').value.trim();
      let oficio = oficioSelect.value;

      if (oficio === 'Otro') {
        oficio = document.getElementById('otroOficio').value.trim();
        if (!oficio) {
          mostrarMensaje('Por favor escribe tu oficio en el campo "Otro"');
          return;
        }
      }

      if (!nombre || !email || !password || !telefono || !direccion || !oficio) {
        mostrarMensaje('Por favor completa todos los campos marcados con *');
        return;
      }

      if (password.length < 6) {
        mostrarMensaje('La contraseña debe tener al menos 6 caracteres');
        return;
      }

      if (!document.getElementById('acepto').checked) {
        mostrarMensaje('Debes aceptar el Compromiso de Confianza Vecinal');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Registrando...';

      try {
        const usuarioData = { nombre, email, password, telefono, rol: 'usuario', categorias: oficio };
        const registroResp = await registrarUsuario(usuarioData);
        const apiKey = registroResp.data.api_key;

        const avisoTitulo = document.getElementById('avisoTitulo').value.trim();
        const avisoContenido = document.getElementById('avisoContenido').value.trim();

        if (avisoTitulo && avisoContenido) {
          const descripcion = document.getElementById('descripcion').value;
          const avisoData = {
            titulo: avisoTitulo,
            contenido: avisoContenido + (descripcion ? '\n\n' + descripcion : ''),
            categoria: oficio.toLowerCase(),
            ubicacion: direccion,
            contacto: telefono,
            status: 'activo',
            destacado: 'no',
            created_by: email
          };
          await crearAviso(apiKey, avisoData).catch(e => console.warn('No se pudo crear aviso:', e));
        }

        mostrarMensaje(`✅ ¡Bienvenido/a ${nombre}! Tu registro fue exitoso. Ya puedes iniciar sesión.`, false);
        
        setTimeout(() => {
          window.location.href = '/avisos-jardines/login.html';
        }, 2000);

      } catch (error) {
        mostrarMensaje('Error: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Registrarme y publicar';
      }
    });
  </script>
</body>

</html>
