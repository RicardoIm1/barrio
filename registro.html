<!DOCTYPE html>
<html lang="es-MX">

<head>
  <meta name="google-site-verification" content="fmtZKP7ZEDNEcmHyx08vsSQn8wVmqfE2WlKtGyBo968" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Registro | BARRIO</title>
  <link rel="shortcut icon" href="/barrio/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/barrio/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/barrio/css/estilo.css">
  <link rel="stylesheet" href="/barrio/css/index2.css">
  <link rel="manifest" href="/barrio/manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <style>
    .registro-container {
      /* max-width: 700px; */
      max-width: 100%;
      margin: 0 auto;
    }

    .registro-header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #1e4620, #2b7a2b);
      border-radius: 1rem;
      color: white;
    }

    .registro-header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
    }

    .badge {
      background: #fbbf24;
      color: #1e4620;
      font-size: 0.7rem;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      display: inline-block;
      margin-top: 0.5rem;
    }

    .registro-content {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid var(--color-borde);
      margin-bottom: 2rem;
    }

    .campo {
      margin-bottom: 1.2rem;
    }

    .campo label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: var(--color-primario);
    }

    .campo input,
    .campo select,
    .campo textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--color-borde);
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: white;
    }

    .campo input:focus,
    .campo select:focus,
    .campo textarea:focus {
      outline: none;
      border-color: var(--color-acento);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .ayuda {
      font-size: 0.7rem;
      color: var(--color-texto-claro);
      margin-top: 0.3rem;
    }

    .info-visibilidad {
      background: #f0fdf4;
      border-left: 4px solid #2b7a2b;
      padding: 0.8rem 1rem;
      border-radius: 0.75rem;
      margin: 1rem 0;
      font-size: 0.8rem;
    }

    .checkbox-acuerdo {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      margin: 1.2rem 0;
      cursor: pointer;
    }

    .checkbox-acuerdo input {
      width: 20px;
      height: 20px;
      margin-top: 0.1rem;
      accent-color: var(--color-primario);
    }

    .checkbox-acuerdo label {
      font-size: 0.85rem;
      line-height: 1.4;
      cursor: pointer;
      color: var(--color-texto);
    }

    .btn {
      background: var(--color-primario);
      color: white;
      border: none;
      width: 100%;
      padding: 0.9rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--color-secundario);
    }

    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .mensaje-error {
      background: #fee2e2;
      color: #b91c1c;
      padding: 0.8rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      border: 1px solid #fecaca;
    }

    .mensaje-exito {
      background: #d1fae5;
      color: #065f46;
      padding: 0.8rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      border: 1px solid #a7f3d0;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .registro-content {
        padding: 1.5rem;
      }

      .registro-header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <main class="contenedor">
    <div class="registro-container">

      <div class="registro-content" id="formularioRegistro">
        <div id="mensajeGlobal"></div>

        <div class="campo">
          <label>Tu nombre completo *</label>
          <input type="text" id="nombre">
        </div>

        <div class="campo">
          <label>Correo electrónico *</label>
          <input type="email" id="email">
          <div class="ayuda">Lo usarás para iniciar sesión</div>
        </div>

        <div class="campo">
          <label>Contraseña *</label>

          <div style="position: relative;">
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">

            <button type="button" id="togglePassword" style="
        position:absolute;
        right:10px;
        top:50%;
        transform:translateY(-50%);
        background:none;
        border:none;
        cursor:pointer;
        font-size:0.85rem;
        color:#2b7a2b;
      ">
              👁️
            </button>
          </div>
        </div>

        <div class="campo">
          <label>Teléfono o WhatsApp *</label>
          <input type="tel" id="telefono" required pattern="[0-9]{10}" maxlength="10" inputmode="numeric"
            title="Debe contener exactamente 10 dígitos"
            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10)">
          <div class="ayuda">10 dígitos, para que los vecinos te contacten por WhatsApp</div>
        </div>

        <div class="campo">
          <label>Código Postal *</label>
          <input type="text" id="direccion" required pattern="\d{5}" maxlength="5"
            title="Debe contener exactamente 5 números"
            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,5)">
        </div>

        <div class="campo">
          <label>¿Qué oficio o profesión tienes? *</label>
          <select id="oficio" required>
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Electricista">⚡ Electricista</option>
            <option value="Plomero">🔧 Plomero</option>
            <option value="Carpintero">🪚 Carpintero</option>
            <option value="Mecánico">🚗 Mecánico</option>
            <option value="Estilista">✂️ Estilista</option>
            <option value="Costurera">🧵 Costurera</option>
            <option value="Pintor">🎨 Pintor</option>
            <option value="Albañil">🧱 Albañil</option>
            <option value="Panadero">🍞 Panadero</option>
            <option value="Comida casera">🍲 Comida casera</option>
            <option value="Otro">📝 Otro</option>
          </select>
        </div>

        <div class="campo" id="otroOficioContainer" style="display: none;">
          <label>Escribe tu oficio</label>
          <input type="text" id="otroOficio" placeholder="Ej: Soldador, Afilador...">
        </div>

        <div class="checkbox-acuerdo">
          <input type="checkbox" id="acepto">
          <label>
            Acepto el <strong><a href="/barrio/confianza.html" target="_blank">Compromiso de Confianza
                Vecinal</a></strong>
          </label>
        </div>

        <button class="btn" id="btnRegistrar">Registrarme</button>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="/barrio/js/api.js"></script>
  <script src="/barrio/js/auth.js"></script>
  <script src="/barrio/js/ui.js"></script>

  <script>
    // Cargar header y footer
    document.addEventListener('DOMContentLoaded', function () {

      //hacer visible la contraseña
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.getElementById('togglePassword');

      if (passwordInput && toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const isHidden = passwordInput.type === 'password';
          passwordInput.type = isHidden ? 'text' : 'password';
          toggleBtn.textContent = isHidden ? '🙈' : '👁️';
        });
      }

      // Header
      fetch('/barrio/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          setTimeout(() => {
            if (typeof window.inicializarHeaderAuth === 'function') {
              window.inicializarHeaderAuth();
            }
          }, 100);
        })
        .catch(err => console.error('Error cargando header:', err));

      // Footer 
      fetch('/barrio/common/footer-admin.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) {
            footerContainer.innerHTML = data;
            const yearSpan = footerContainer.querySelector('#copyright-year');
            if (yearSpan) {
              yearSpan.innerHTML = `&copy; ${new Date().getFullYear()} - Barrio. Todos los derechos reservados.`;
            }
            const scripts = footerContainer.querySelectorAll('script');
            scripts.forEach(oldScript => {
              const newScript = document.createElement('script');
              newScript.textContent = oldScript.textContent;
              document.body.appendChild(newScript);
              oldScript.remove();
            });
          }
        })
        .catch(error => console.error('Error cargando el footer:', error));

      // Configurar el formulario de registro
      const oficioSelect = document.getElementById('oficio');
      const otroContainer = document.getElementById('otroOficioContainer');

      if (oficioSelect) {
        oficioSelect.addEventListener('change', () => {
          otroContainer.style.display = oficioSelect.value === 'Otro' ? 'block' : 'none';
        });
      }

      const btn = document.getElementById('btnRegistrar');
      const mensajeDiv = document.getElementById('mensajeGlobal');

      function mostrarMensaje(texto, esError = true) {
        mensajeDiv.innerHTML = `<div class="${esError ? 'mensaje-error' : 'mensaje-exito'}">${texto}</div>`;
        setTimeout(() => {
          if (mensajeDiv.innerHTML.includes(texto)) mensajeDiv.innerHTML = '';
        }, 5000);
      }

      if (btn) {
        btn.addEventListener('click', async () => {
          const nombre = document.getElementById('nombre').value.trim();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value.trim();
          const telefono = document.getElementById('telefono').value.trim();
          const direccion = document.getElementById('direccion').value.trim();
          let oficio = oficioSelect.value;

          if (oficio === 'Otro') {
            oficio = document.getElementById('otroOficio').value.trim();
            if (!oficio) {
              mostrarMensaje('Por favor escribe tu oficio en el campo "Otro"');
              return;
            }
          }

          if (!nombre || !email || !password || !telefono || !direccion || !oficio) {
            mostrarMensaje('Por favor completa todos los campos marcados con *');
            return;
          }

          if (password.length < 6) {
            mostrarMensaje('La contraseña debe tener al menos 6 caracteres');
            return;
          }

          if (!document.getElementById('acepto').checked) {
            mostrarMensaje('Debes aceptar el Compromiso de Confianza Vecinal');
            return;
          }

          btn.disabled = true;
          btn.innerHTML = '<span class="spinner"></span> Registrando...';

          try {
            const resultado = await API.registro({
              nombre: nombre,
              email: email,
              password: password,
              telefono: telefono,
              rol: 'usuario',
              categorias: oficio,
              direccion: direccion
            });

            // ✅ Nuevo código
            console.log('Registro exitoso:', resultado);

            // Guardar sesión automáticamente
            if (resultado && resultado.data && resultado.data.api_key) {
              localStorage.setItem('api_key', resultado.data.api_key);
              localStorage.setItem('usuario', JSON.stringify(resultado.data.usuario));
              mostrarMensaje(`✅ ¡Bienvenido/a ${nombre}! Registro exitoso.`, false);
              setTimeout(() => {
                window.location.href = '/barrio/admin.html';
              }, 1500);
            } else if (resultado && resultado.api_key) {
              // Si la respuesta viene sin .data
              localStorage.setItem('api_key', resultado.api_key);
              if (resultado.usuario) {
                localStorage.setItem('usuario', JSON.stringify(resultado.usuario));
              }
              mostrarMensaje(`✅ ¡Bienvenido/a ${nombre}! Registro exitoso.`, false);
              setTimeout(() => {
                window.location.href = '/barrio/admin.html';
              }, 1500);
            } else {
              // Si no viene api_key, solo mostrar mensaje y redirigir al login
              mostrarMensaje(`✅ ¡Bienvenido/a ${nombre}! Tu registro fue exitoso. Ahora inicia sesión.`, false);
              setTimeout(() => {
                window.location.href = '/barrio/login.html';
              }, 2000);
            }

          } catch (error) {
            console.error('Error en registro:', error);
            mostrarMensaje('Error: ' + error.message);
          } finally {
            btn.disabled = false;
            btn.innerHTML = 'Registrarme';
          }
        });
      }
    }); // ← Cierre del addEventListener
  </script>

  <script>
    // Forzar la funcionalidad de "Otro" oficio
    (function () {
      const oficioSelect = document.getElementById('oficio');
      const otroContainer = document.getElementById('otroOficioContainer');

      if (oficioSelect && otroContainer) {
        // Función para mostrar/ocultar el campo "Otro"
        function toggleOtroOficio() {
          if (oficioSelect.value === 'Otro') {
            otroContainer.style.display = 'block';
            document.getElementById('otroOficio').required = true;
          } else {
            otroContainer.style.display = 'none';
            document.getElementById('otroOficio').required = false;
            document.getElementById('otroOficio').value = '';
          }
        }

        // Ejecutar al cargar
        toggleOtroOficio();

        // Ejecutar cuando cambie la selección
        oficioSelect.addEventListener('change', toggleOtroOficio);
      }
    })();
  </script>

</body>

</html>
