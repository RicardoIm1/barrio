<!DOCTYPE html>
<html lang="es-MX">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Registro | BARRIO</title>
  <link rel="stylesheet" href="/barrio/css/estilo.css">
  <link rel="manifest" href="/barrio/manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <style>
    .registro-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .registro-header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #1e4620, #2b7a2b);
      border-radius: 1rem;
      color: white;
    }

    .registro-header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
    }

    .badge {
      background: #fbbf24;
      color: #1e4620;
      font-size: 0.7rem;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      display: inline-block;
      margin-top: 0.5rem;
    }

    .registro-content {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid var(--color-borde);
      margin-bottom: 2rem;
    }

    .campo {
      margin-bottom: 1.2rem;
    }

    .campo label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: var(--color-primario);
    }

    .campo input,
    .campo select,
    .campo textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--color-borde);
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: white;
    }

    .campo input:focus,
    .campo select:focus,
    .campo textarea:focus {
      outline: none;
      border-color: var(--color-acento);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .ayuda {
      font-size: 0.7rem;
      color: var(--color-texto-claro);
      margin-top: 0.3rem;
    }

    .info-visibilidad {
      background: #f0fdf4;
      border-left: 4px solid #2b7a2b;
      padding: 0.8rem 1rem;
      border-radius: 0.75rem;
      margin: 1rem 0;
      font-size: 0.8rem;
    }

    .checkbox-acuerdo {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      margin: 1.2rem 0;
      cursor: pointer;
    }

    .checkbox-acuerdo input {
      width: 20px;
      height: 20px;
      margin-top: 0.1rem;
      accent-color: var(--color-primario);
    }

    .checkbox-acuerdo label {
      font-size: 0.85rem;
      line-height: 1.4;
      cursor: pointer;
      color: var(--color-texto);
    }

    .btn {
      background: var(--color-primario);
      color: white;
      border: none;
      width: 100%;
      padding: 0.9rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--color-secundario);
    }

    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .mensaje-error {
      background: #fee2e2;
      color: #b91c1c;
      padding: 0.8rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      border: 1px solid #fecaca;
    }

    .mensaje-exito {
      background: #d1fae5;
      color: #065f46;
      padding: 0.8rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      border: 1px solid #a7f3d0;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .registro-content {
        padding: 1.5rem;
      }

      .registro-header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <main class="contenedor">
    <div class="registro-container">
      <!-- <div class="registro-header">
        <h1>📋 Formar parte</h1>
        <p>Regístrate y publica avisos en tu colonia</p>
        <div class="badge">✨ Entre vecinos, sin letras chiquitas</div>
      </div> -->

      <div class="registro-content" id="formularioRegistro">
        <div id="mensajeGlobal"></div>

        <div class="campo">
          <label>Tu nombre completo *</label>
          <input type="text" id="nombre" placeholder="Ejemplo: María de la Luz Gutiérrez">
        </div>

        <div class="campo">
          <label>Correo electrónico *</label>
          <input type="email" id="email" placeholder="Ejemplo: maria@ejemplo.com">
          <div class="ayuda">Lo usarás para iniciar sesión</div>
        </div>

        <div class="campo">
          <label>Contraseña *</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="campo">
          <label>Teléfono o WhatsApp *</label>
          <input type="tel" id="telefono" placeholder="Ejemplo: 322 999 9999">
          <div class="ayuda">Para que los vecinos te contacten</div>
        </div>

        <div class="campo">
          <label>Dirección o referencia en la colonia *</label>
          <input type="text" id="direccion" placeholder="Ejemplo: Calle Siempre viva #847">
        </div>

        <div class="campo">
          <label>¿Qué oficio o profesión tienes? *</label>
          <select id="oficio">
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Electricista">⚡ Electricista</option>
            <option value="Plomero">🔧 Plomero</option>
            <option value="Carpintero">🪚 Carpintero</option>
            <option value="Mecánico">🚗 Mecánico</option>
            <option value="Estilista">✂️ Estilista</option>
            <option value="Costurera">🧵 Costurera</option>
            <option value="Pintor">🎨 Pintor</option>
            <option value="Albañil">🧱 Albañil</option>
            <option value="Panadero">🍞 Panadero</option>
            <option value="Comida casera">🍲 Comida casera</option>
            <option value="Otro">📝 Otro</option>
          </select>
        </div>

        <div class="campo" id="otroOficioContainer" style="display: none;">
          <label>Escribe tu oficio</label>
          <input type="text" id="otroOficio" placeholder="Ej: Soldador, Afilador...">
        </div>

        <div class="checkbox-acuerdo">
          <input type="checkbox" id="acepto">
          <label>
            Acepto el <strong><a href="/barrio/confianza.html" target="_blank">Compromiso de Confianza
                Vecinal</a></strong>
          </label>
        </div>

        <button class="btn" id="btnRegistrar">Registrarme</button>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="/barrio/js/api.js"></script>
  <script src="/barrio/js/auth.js"></script>
  <script src="/barrio/js/ui.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      UI.cargarHeader();

      fetch('/barrio/common/footer.html')
        .then(response => response.ok ? response.text() : Promise.reject())
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) footerContainer.innerHTML = data;

          // ✅ Forzar la ejecución de scripts después de inyectar
          const scripts = footerContainer.querySelectorAll('script');
          scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
            oldScript.remove();
          });
        })
        .catch(error => console.error('Error cargando el footer:', error));
    });

    const oficioSelect = document.getElementById('oficio');
    const otroContainer = document.getElementById('otroOficioContainer');

    oficioSelect.addEventListener('change', () => {
      otroContainer.style.display = oficioSelect.value === 'Otro' ? 'block' : 'none';
    });

    const btn = document.getElementById('btnRegistrar');
    const mensajeDiv = document.getElementById('mensajeGlobal');

    function mostrarMensaje(texto, esError = true) {
      mensajeDiv.innerHTML = `<div class="${esError ? 'mensaje-error' : 'mensaje-exito'}">${texto}</div>`;
      setTimeout(() => {
        if (mensajeDiv.innerHTML.includes(texto)) mensajeDiv.innerHTML = '';
      }, 5000);
    }

    btn.addEventListener('click', async () => {
      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const direccion = document.getElementById('direccion').value.trim();
      let oficio = oficioSelect.value;

      if (oficio === 'Otro') {
        oficio = document.getElementById('otroOficio').value.trim();
        if (!oficio) {
          mostrarMensaje('Por favor escribe tu oficio en el campo "Otro"');
          return;
        }
      }

      if (!nombre || !email || !password || !telefono || !direccion || !oficio) {
        mostrarMensaje('Por favor completa todos los campos marcados con *');
        return;
      }

      if (password.length < 6) {
        mostrarMensaje('La contraseña debe tener al menos 6 caracteres');
        return;
      }

      if (!document.getElementById('acepto').checked) {
        mostrarMensaje('Debes aceptar el Compromiso de Confianza Vecinal');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Registrando...';

      try {
        // Usar API.registro() que ya existe
        const resultado = await API.registro({
          nombre: nombre,
          email: email,
          password: password,
          telefono: telefono,
          rol: 'usuario',
          categorias: oficio,
          direccion: direccion
        });

        console.log('Registro exitoso:', resultado);

        mostrarMensaje(`✅ ¡Bienvenido/a ${nombre}! Tu registro fue exitoso.`, false);

        setTimeout(() => {
          window.location.href = '/barrio/login.html';
        }, 2000);

      } catch (error) {
        console.error('Error en registro:', error);
        mostrarMensaje('Error: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Registrarme';
      }
    });
  </script>
</body>

</html>
