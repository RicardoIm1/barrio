<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejemplo con banner de cookies</title>
  <style>
    /* Banner flotante */
    #cookieBanner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e4620;
      color: white;
      padding: 1rem;
      text-align: center;
      z-index: 1000;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      font-family: system-ui, sans-serif;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
    }

    #cookieBanner span {
      font-size: 0.9rem;
    }

    .btn-cookie {
      background: #fbbf24;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-cookie:hover {
      background: #f59e0b;
      transform: scale(1.02);
    }

    .btn-config {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-config:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Contenido de ejemplo */
    body {
      font-family: system-ui, sans-serif;
      background: #eef2e6;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    .contenido {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 1.5rem;
    }
  </style>
</head>
<body>
<div class="contenido">
  <h1>🍪 Ejemplo de banner de cookies</h1>
  <p>Este es el contenido de tu página. El banner de abajo no te llevará a otra página cuando aceptes.</p>
  <p>Solo guarda tu preferencia y desaparece.</p>
</div>

<!-- BANNER DE COOKIES -->
<div id="cookieBanner">
  <span>🍪 Usamos cookies para que la plataforma funcione bien y recordar tus preferencias. No vendemos tus datos ni te espiramos.</span>
  <div>
    <button id="aceptarBtn" class="btn-cookie">🍪 Aceptar</button>
    <button id="configurarBtn" class="btn-config">⚙️ Configurar</button>
  </div>
</div>

<script>
  // Revisar si ya aceptó antes
  if (localStorage.getItem('cookie_consent') === 'aceptadas') {
    document.getElementById('cookieBanner').style.display = 'none';
  }

  // Botón ACEPTAR: solo guarda y cierra el banner
  document.getElementById('aceptarBtn').addEventListener('click', function() {
    localStorage.setItem('cookie_consent', 'aceptadas');
    localStorage.setItem('cookie_fecha', new Date().toISOString());
    document.getElementById('cookieBanner').style.display = 'none';
    // No redirige a ninguna parte
  });

  // Botón CONFIGURAR: sí puede llevar a la página de política completa
  document.getElementById('configurarBtn').addEventListener('click', function() {
    // Esto sí puede redirigir a la página donde está la política completa
    window.location.href = '/politica-cookies.html';  // Cambia por tu URL real
  });
</script>
</body>
</html>
