<header class="header">
    <div class="contenedor header-contenido">
        <a href="/barrio/index.html" class="header-logo">
            <img src="/barrio/icons/logo-elbarrio.png" alt="Logo de El Barrio" class="logo-icon">
            <div class="logo-texto">
                <h1>El Barrio</h1>
                <h2 class="header-slogan">¡El barrio te respalda!</h2>
            </div>
        </a>

        <!-- ✅ BUSCADOR AGREGADO AQUÍ -->
        <div class="header-buscador">
            <input type="text" id="buscador-input-header" class="buscador-input-header"
                placeholder="🔍 Buscar avisos...">
        </div>

        <div id="reputacion-widget"
            style="display: none; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 40px; margin-right: 15px;">
            <div>⭐ <span id="puntos-valor">0</span></div>
            <div>🏆 <span id="nivel-valor">cargando</span></div>
            <div>📊 <span id="avisos-restantes">-</span>/<span id="avisos-limite">-</span></div>
            <div
                style="width: 60px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden;">
                <div id="reputacion-barra" style="width:0%; height:100%; background:#fbbf24;"></div>
            </div>
            <button id="btn-ver-reputacion"
                style="background:none; border:none; color:white; cursor:pointer;">📊</button>
        </div>

        <div class="header-acciones" id="header-acciones">
            <!-- Campana de notificaciones -->
            <div class="notif-wrapper">
                <button class="notif-bell" id="notifBellBtn">🔔</button>
                <span id="notifBadge" class="notif-badge" style="display: none;">0</span>
                <div id="notifPanel" class="notif-panel" style="display: none;">
                    <div class="notif-header">
                        <span>🔔 Notificaciones</span>
                        <button onclick="marcarTodasLeidas()" class="notif-clear-all">✕ Todas</button>
                    </div>
                    <div id="notifList" class="notif-list">
                        <p class="notif-empty">📭 No hay notificaciones</p>
                    </div>
                </div>
            </div>

            <a href="/barrio/login.html" id="login-link" class="btn-login">🔑 <span class="btn-text">Iniciar
                    sesión</span></a>

            <div class="user-area" id="user-area" style="display: none;">
                <span class="user-name" id="user-name"></span>
                <a href="#" id="cerrar-sesion" class="btn-logout">🔒 <span class="btn-text">Cerrar sesión</span></a>
            </div>
        </div>
    </div>
</header>
<style>
    /* Notificaciones - estilo limpio */
    .notif-wrapper {
        position: relative;
        display: inline-block;
    }

    .notif-bell {
        background: none;
        border: none;
        font-size: 1.3rem;
        cursor: pointer;
        padding: 6px;
        border-radius: 50%;
        transition: background 0.2s;
        color: #555;
    }

    .notif-bell:hover {
        background: rgba(0, 0, 0, 0.05);
    }

    .notif-badge {
        position: absolute;
        top: -4px;
        right: -4px;
        background: #e74c3c;
        color: white;
        font-size: 0.6rem;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 30px;
        min-width: 18px;
        text-align: center;
    }

    .notif-panel {
        position: absolute;
        top: 40px;
        right: -10px;
        width: 300px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        border: 1px solid #e5e7eb;
        z-index: 1000;
        overflow: hidden;
        display: none;
    }

    .notif-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #e5e7eb;
        font-weight: 600;
        font-size: 0.85rem;
        color: #333;
    }

    .notif-clear-all {
        background: none;
        border: none;
        color: #888;
        font-size: 0.7rem;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 20px;
    }

    .notif-clear-all:hover {
        background: #f5f5f5;
        color: #e74c3c;
    }

    .notif-list {
        max-height: 350px;
        overflow-y: auto;
    }

    .notif-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
        transition: background 0.2s;
    }

    .notif-item:hover {
        background: #f9f9f9;
    }

    .notif-item.no-leida {
        background: #fff8e7;
    }

    .notif-icon {
        font-size: 1.2rem;
    }

    .notif-content {
        flex: 1;
    }

    .notif-mensaje {
        font-size: 0.8rem;
        color: #333;
        line-height: 1.3;
    }

    .notif-tiempo {
        font-size: 0.65rem;
        color: #999;
        margin-top: 4px;
    }

    .notif-empty {
        text-align: center;
        padding: 30px 20px;
        color: #999;
        font-size: 0.8rem;
    }

    @media (max-width: 550px) {
        .notif-panel {
            width: 280px;
            right: -20px;
        }
    }
</style>
<style>
    /* ========== BUSCADOR EN HEADER ========== */
    .header-buscador {
        flex: 1;
        max-width: 300px;
        margin: 0 15px;
    }

    .buscador-input-header {
        width: 100%;
        padding: 8px 16px;
        border-radius: 30px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        font-size: 0.85rem;
        transition: all 0.2s;
    }

    .buscador-input-header:focus {
        outline: none;
        border-color: #f5b042;
        background: white;
        box-shadow: 0 0 0 2px rgba(245, 176, 66, 0.2);
    }

    @media (max-width: 768px) {
        .header-buscador {
            order: 3;
            max-width: none;
            width: 100%;
            margin: 8px 0 0;
        }
    }
</style>

<script>
    (function () {
        function obtenerUsuarioLocal() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');

            if (usuarioStr && apiKey) {
                try {
                    return JSON.parse(usuarioStr);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        function cerrarSesion() {
            localStorage.removeItem('usuario');
            localStorage.removeItem('api_key');
            window.location.href = '/barrio/index.html';
        }

        function actualizarBotones() {
            const usuario = obtenerUsuarioLocal();

            const loginLink = document.getElementById('login-link');
            const userArea = document.getElementById('user-area');
            const userNameSpan = document.getElementById('user-name');
            const perfilLink = document.getElementById('perfil-link');
            const cerrarBtn = document.getElementById('cerrar-sesion');

            if (!loginLink) {
                setTimeout(actualizarBotones, 100);
                return;
            }

            if (usuario) {
                loginLink.style.display = 'none';
                userArea.style.display = 'flex';

                const nombreMostrar = usuario.nombre || usuario.email || 'Usuario';
                if (userNameSpan) userNameSpan.textContent = `👋 ${nombreMostrar}`;

                if (perfilLink) {
                    perfilLink.onclick = function (e) {
                        e.preventDefault();
                        window.location.href = '/barrio/perfil.html';
                    };
                }

                if (cerrarBtn) {
                    const nuevoCerrar = cerrarBtn.cloneNode(true);
                    cerrarBtn.parentNode.replaceChild(nuevoCerrar, cerrarBtn);
                    nuevoCerrar.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        cerrarSesion();
                    });
                }
            } else {
                loginLink.style.display = 'inline-flex';
                userArea.style.display = 'none';
            }
        }

        actualizarBotones();

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', actualizarBotones);
        }

        window.addEventListener('storage', function (e) {
            if (e.key === 'usuario' || e.key === 'api_key') {
                actualizarBotones();
            }
        });

        window.actualizarHeaderSesion = actualizarBotones;
        window._headerActualizarBotones = actualizarBotones;
    })();
</script>

<script>
    // ========== NOTIFICACIONES ==========
    let notifInterval = null;

    function toggleNotificaciones() {
        const panel = document.getElementById('notifPanel');
        if (panel) {
            const isVisible = panel.style.display === 'block';
            panel.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) cargarNotificaciones();
        }
    }

    document.addEventListener('click', function (event) {
        const wrapper = document.querySelector('.notif-wrapper');
        const panel = document.getElementById('notifPanel');
        if (wrapper && panel && !wrapper.contains(event.target)) {
            panel.style.display = 'none';
        }
    });

    async function cargarNotificaciones() {
        const apiKey = localStorage.getItem('api_key');
        const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
        if (!apiKey || !usuario.email) return;

        try {
            const url = `https://script.google.com/macros/s/AKfycbxfKbjZuNLervPF3JTpNRAv_Cn5dGkk1vCLt3x-WX-NLRWdb-TxbBtMkJdDEGypggDY/exec?accion=OBTENER_NOTIFICACIONES&email=${encodeURIComponent(usuario.email)}&soloNoLeidas=true&api_key=${apiKey}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data && data.success) {
                const notis = data.data || [];
                actualizarBadge(notis.length);
                renderNotificaciones(notis);
            }
        } catch (e) { console.error(e); }
    }

    function actualizarBadge(count) {
        const badge = document.getElementById('notifBadge');
        if (badge) {
            if (count > 0) {
                badge.textContent = count > 99 ? '99+' : count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }
    }

    function renderNotificaciones(notis) {
        const container = document.getElementById('notifList');
        if (!container) return;
        if (!notis.length) {
            container.innerHTML = '<p class="notif-empty">📭 No hay notificaciones</p>';
            return;
        }
        container.innerHTML = notis.map(n => `
        <div class="notif-item no-leida" onclick="marcarNotificacion('${n.id}', '${n.aviso_id}')">
            <div class="notif-icon">${n.tipo === 'like' ? '👍' : '💬'}</div>
            <div class="notif-content">
                <div class="notif-mensaje">${escapeHtml(n.mensaje)}</div>
                <div class="notif-tiempo">${tiempoRelativo(n.fecha)}</div>
            </div>
        </div>
    `).join('');
    }

    async function marcarNotificacion(id, avisoId) {
        const apiKey = localStorage.getItem('api_key');
        try {
            await fetch(`https://script.google.com/macros/s/AKfycbxfKbjZuNLervPF3JTpNRAv_Cn5dGkk1vCLt3x-WX-NLRWdb-TxbBtMkJdDEGypggDY/exec?accion=MARCAR_NOTIFICACION_LEIDA&id=${id}&api_key=${apiKey}`);
            if (avisoId) window.location.href = `/barrio/aviso.html?id=${avisoId}`;
            cargarNotificaciones();
        } catch (e) { console.error(e); }
    }

    async function marcarTodasLeidas() {
        const panel = document.getElementById('notifPanel');
        if (panel) panel.style.display = 'none';
        cargarNotificaciones();
    }

    function tiempoRelativo(fechaISO) {
        if (!fechaISO) return '';
        const diff = Math.floor((new Date() - new Date(fechaISO)) / 60000);
        if (diff < 1) return 'ahora';
        if (diff < 60) return `hace ${diff} min`;
        if (diff < 1440) return `hace ${Math.floor(diff / 60)} h`;
        return `hace ${Math.floor(diff / 1440)} d`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // Conectar el botón
    document.getElementById('notifBellBtn')?.addEventListener('click', toggleNotificaciones);

    // Polling cada 30 segundos
    setInterval(() => { if (localStorage.getItem('api_key')) cargarNotificaciones(); }, 30000);
    setTimeout(cargarNotificaciones, 1000);
</script>
