<header class="header">
    <div class="contenedor header-contenido">
        <!-- Logo y título - Enlace al index -->
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">El canal oficial donde los vecinos sí ven las cosas</p>
            </div>
        </a>

        <!-- Acciones del usuario -->
        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">
                <span class="btn-icon">🔐</span>
                <span>Iniciar sesión</span>
            </a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">
                <span class="btn-icon">🚪</span>
                <span>Cerrar sesión</span>
            </a>
        </div>
    </div>
</header>

<style>
.logo-texto h1 {
    margin: 0;
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logo-icon {
    font-size: 3rem;
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none; /* fuerza que no haya borde */
}

.header-logo:hover h1 {
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn-login, .btn-logout {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-weight: 600;
    font-size: 0.9rem;
    border: none; /* asegura que no aparezca borde */
}

.btn-logout {
    background: linear-gradient(135deg, #dc3545, #c82333);
}

.btn-login:hover, .btn-logout:hover {
    filter: brightness(1.1);
    color: white; /* evita que cambie a blanco por defecto */
    text-decoration: none;
}
</style>

<script>
    // Script para manejar el estado de sesión en el header
    document.addEventListener('DOMContentLoaded', function() {
        const usuario = API?.getUsuarioActual ? API.getUsuarioActual() : null;
        const loginLink = document.getElementById('login-link');
        const cerrarSesion = document.getElementById('cerrar-sesion');
        
        if (usuario && loginLink && cerrarSesion) {
            loginLink.style.display = 'none';
            cerrarSesion.style.display = 'inline-flex';
            
            cerrarSesion.addEventListener('click', function(e) {
                e.preventDefault();
                if (API && API.cerrarSesion) {
                    API.cerrarSesion();
                }
                window.location.href = '/avisos-jardines/login.html';
            });
        } else if (loginLink && cerrarSesion) {
            loginLink.style.display = 'inline-flex';
            cerrarSesion.style.display = 'none';
        }
    });
</script>
