<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Header</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .contenedor {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .header-contenido {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            min-height: 4rem;
            transition: min-height 0.2s;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-icon {
            font-size: 2rem;
            background: linear-gradient(135deg, #2b7a2b, #1e4620);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-texto h1 {
            margin: 0;
            font-size: 1.2rem;
            line-height: 1.2;
            background: linear-gradient(135deg, #2b7a2b, #d4a043);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .header-slogan {
            font-size: 0.7rem;
            color: #6b7280;
            margin: 0;
            white-space: nowrap;
        }

        #reputacion-widget {
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.05);
            padding: 6px 15px;
            border-radius: 40px;
            margin-right: 15px;
            font-size: 0.8rem;
        }

        .header-acciones {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn-login, .btn-admin, .btn-logout, .btn-registro {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: 0.2s;
            white-space: nowrap;
            cursor: pointer;
            border: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #f5b042, #ff8c42);
            color: white;
        }

        .btn-registro {
            background: linear-gradient(135deg, #2b7a2b, #1e4620);
            color: white;
        }

        .btn-admin {
            background: linear-gradient(135deg, #d4a043, #b8860b);
            color: white;
        }

        .btn-logout {
            border: 2px solid #d4a043;
            color: #d4a043;
            background: transparent;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1001;
            flex-shrink: 0;
        }

        .hamburger span {
            width: 100%;
            height: 3px;
            background: #2d3748;
            border-radius: 10px;
            transition: all 0.25s ease;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 320px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            z-index: 1050;
            padding: 5rem 1.5rem 2rem;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mobile-menu.open {
            right: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1040;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-menu a, .mobile-menu button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            color: #1f2937;
            transition: 0.2s;
            font-size: 1rem;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .close-menu-btn {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #4b5563;
            width: auto;
            padding: 0;
        }

        @media (max-width: 768px) {
            .header-contenido {
                min-height: 2rem;
                padding: 0.4rem 0;
            }

            .logo-icon {
                width: 34px;
                height: 34px;
                font-size: 1.5rem;
            }

            .logo-texto h1 {
                font-size: 0.9rem;
                white-space: normal;
            }

            .header-slogan {
                font-size: 0.6rem;
                white-space: normal;
            }

            .header-acciones {
                display: none;
            }

            .hamburger {
                display: flex;
            }

            #reputacion-widget {
                display: none !important;
            }
        }

        @media (min-width: 769px) {
            .hamburger {
                display: none;
            }
            .mobile-menu, .menu-overlay {
                display: none;
            }
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-10px) rotate(-45deg);
        }

        .usuario-info {
            font-size: 0.75rem;
            color: #6b7280;
            padding: 0 16px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="contenedor header-contenido">
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">Lo que pasa en la colonia, aquí se sabe</p>
            </div>
        </a>

        <div id="reputacion-widget" style="display: none; align-items: center; gap: 12px; background: rgba(0,0,0,0.05); padding: 6px 15px; border-radius: 40px; margin-right: 15px;">
            <div>⭐ <span id="puntos-valor">0</span></div>
            <div>🏆 <span id="nivel-valor">cargando</span></div>
            <div>📊 <span id="avisos-restantes">-</span>/<span id="avisos-limite">-</span></div>
            <div style="width: 60px; height: 4px; background: rgba(0,0,0,0.2); border-radius: 2px; overflow: hidden;">
                <div id="reputacion-barra" style="width:0%; height:100%; background:#fbbf24;"></div>
            </div>
            <button id="btn-ver-reputacion" style="background:none; border:none; color:#2c3e66; cursor:pointer;">📊</button>
        </div>

        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">🔐 Iniciar sesión</a>
            <a href="/avisos-jardines/registro.html" id="registro-link" class="btn-registro">📝 Registrarse</a>
            <a href="#" id="admin-link" class="btn-admin" style="display:none;">⚙️ Administrador</a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">🚪 Cerrar sesión</a>
        </div>

        <button class="hamburger" id="hamburgerBtn" aria-label="Menú">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
    <button class="close-menu-btn" id="closeMenuBtn">✕</button>
    <div id="mobile-menu-links">
        <a href="/avisos-jardines/login.html" id="mobile-login-link">🔐 Iniciar sesión</a>
        <a href="/avisos-jardines/registro.html" id="mobile-registro-link">📝 Registrarse</a>
        <a href="#" id="mobile-admin-link" style="display:none;">⚙️ Administrador</a>
        <a href="#" id="mobile-cerrar-sesion" style="display:none;">🚪 Cerrar sesión</a>
    </div>
    <div class="usuario-info" id="mobile-user-info"></div>
</div>

<script>
    const API_BASE_URL = window.location.origin + '/api';
    
    function getAuthHeaders() {
        const apiKey = localStorage.getItem('api_key');
        return {
            'Content-Type': 'application/json',
            'X-API-Key': apiKey || ''
        };
    }
    
    async function obtenerUsuarioActual() {
        const apiKey = localStorage.getItem('api_key');
        if (!apiKey) return null;
        
        try {
            const response = await fetch(`${API_BASE_URL}/usuarios/me`, {
                headers: getAuthHeaders()
            });
            
            if (response.ok) {
                const usuario = await response.json();
                localStorage.setItem('usuario', JSON.stringify(usuario));
                return usuario;
            } else {
                localStorage.removeItem('usuario');
                localStorage.removeItem('api_key');
                return null;
            }
        } catch (error) {
            return null;
        }
    }
    
    async function obtenerReputacion() {
        const apiKey = localStorage.getItem('api_key');
        if (!apiKey) return null;
        
        try {
            const response = await fetch(`${API_BASE_URL}/reputacion/mi-reputacion`, {
                headers: getAuthHeaders()
            });
            
            if (response.ok) {
                return await response.json();
            }
            return null;
        } catch (error) {
            return null;
        }
    }
    
    async function actualizarWidgetReputacion() {
        const widget = document.getElementById('reputacion-widget');
        const usuario = await obtenerUsuarioActual();
        
        if (!usuario) {
            widget.style.display = 'none';
            return;
        }
        
        const reputacion = await obtenerReputacion();
        if (reputacion) {
            document.getElementById('puntos-valor').innerText = reputacion.puntos || 0;
            document.getElementById('nivel-valor').innerText = reputacion.nivel || 'Bronce';
            document.getElementById('avisos-restantes').innerText = reputacion.avisos_restantes || 0;
            document.getElementById('avisos-limite').innerText = reputacion.limite_semanal || 5;
            
            const porcentaje = ((reputacion.puntos || 0) / 500) * 100;
            document.getElementById('reputacion-barra').style.width = Math.min(100, porcentaje) + '%';
            widget.style.display = 'flex';
        } else {
            widget.style.display = 'none';
        }
    }
    
    async function cerrarSesion() {
        const apiKey = localStorage.getItem('api_key');
        if (apiKey) {
            try {
                await fetch(`${API_BASE_URL}/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    }
                });
            } catch (error) {}
        }
        
        localStorage.removeItem('usuario');
        localStorage.removeItem('api_key');
        window.location.href = '/avisos-jardines/index.html';
    }
    
    async function actualizarBotones() {
        const usuario = await obtenerUsuarioActual();
        const loginLink = document.getElementById('login-link');
        const registroLink = document.getElementById('registro-link');
        const adminLink = document.getElementById('admin-link');
        const cerrarBtn = document.getElementById('cerrar-sesion');
        
        const mobileLogin = document.getElementById('mobile-login-link');
        const mobileRegistro = document.getElementById('mobile-registro-link');
        const mobileAdmin = document.getElementById('mobile-admin-link');
        const mobileCerrar = document.getElementById('mobile-cerrar-sesion');
        const mobileUserInfo = document.getElementById('mobile-user-info');
        
        if (usuario) {
            if (loginLink) loginLink.style.display = 'none';
            if (registroLink) registroLink.style.display = 'none';
            if (cerrarBtn) {
                cerrarBtn.style.display = 'inline-flex';
                const newCerrar = cerrarBtn.cloneNode(true);
                cerrarBtn.parentNode.replaceChild(newCerrar, cerrarBtn);
                newCerrar.addEventListener('click', (e) => {
                    e.preventDefault();
                    cerrarSesion();
                });
            }
            
            if (mobileLogin) mobileLogin.style.display = 'none';
            if (mobileRegistro) mobileRegistro.style.display = 'none';
            if (mobileCerrar) {
                mobileCerrar.style.display = 'flex';
                const newMobileCerrar = mobileCerrar.cloneNode(true);
                mobileCerrar.parentNode.replaceChild(newMobileCerrar, mobileCerrar);
                newMobileCerrar.addEventListener('click', (e) => {
                    e.preventDefault();
                    cerrarSesion();
                });
            }
            
            if (mobileUserInfo) {
                mobileUserInfo.innerHTML = `👋 Hola, ${usuario.nombre || usuario.email}<br>🏆 ${usuario.puntos || 0} puntos`;
                mobileUserInfo.style.display = 'block';
            }
            
            if (usuario.rol === 'admin') {
                if (adminLink) {
                    adminLink.style.display = 'inline-flex';
                    const newAdmin = adminLink.cloneNode(true);
                    adminLink.parentNode.replaceChild(newAdmin, adminLink);
                    newAdmin.addEventListener('click', (e) => {
                        e.preventDefault();
                        window.location.href = '/avisos-jardines/admin.html';
                    });
                }
                if (mobileAdmin) {
                    mobileAdmin.style.display = 'flex';
                    const newMobileAdmin = mobileAdmin.cloneNode(true);
                    mobileAdmin.parentNode.replaceChild(newMobileAdmin, mobileAdmin);
                    newMobileAdmin.addEventListener('click', (e) => {
                        e.preventDefault();
                        window.location.href = '/avisos-jardines/admin.html';
                    });
                }
            } else {
                if (adminLink) adminLink.style.display = 'none';
                if (mobileAdmin) mobileAdmin.style.display = 'none';
            }
            
            await actualizarWidgetReputacion();
        } else {
            if (loginLink) loginLink.style.display = 'inline-flex';
            if (registroLink) registroLink.style.display = 'inline-flex';
            if (adminLink) adminLink.style.display = 'none';
            if (cerrarBtn) cerrarBtn.style.display = 'none';
            
            if (mobileLogin) mobileLogin.style.display = 'flex';
            if (mobileRegistro) mobileRegistro.style.display = 'flex';
            if (mobileAdmin) mobileAdmin.style.display = 'none';
            if (mobileCerrar) mobileCerrar.style.display = 'none';
            if (mobileUserInfo) {
                mobileUserInfo.innerHTML = '🔓 No has iniciado sesión';
                mobileUserInfo.style.display = 'block';
            }
            
            document.getElementById('reputacion-widget').style.display = 'none';
        }
    }
    
    const hamburger = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('menuOverlay');
    const closeBtn = document.getElementById('closeMenuBtn');
    
    function openMenu() {
        mobileMenu.classList.add('open');
        overlay.classList.add('active');
        hamburger.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeMenu() {
        mobileMenu.classList.remove('open');
        overlay.classList.remove('active');
        hamburger.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    if (hamburger) {
        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (mobileMenu.classList.contains('open')) {
                closeMenu();
            } else {
                openMenu();
            }
        });
    }
    
    if (closeBtn) closeBtn.addEventListener('click', closeMenu);
    if (overlay) overlay.addEventListener('click', closeMenu);
    
    document.querySelectorAll('.mobile-menu a, .mobile-menu button').forEach(link => {
        link.addEventListener('click', closeMenu);
    });
    
    document.addEventListener('DOMContentLoaded', async () => {
        await actualizarBotones();
        
        const btnVer = document.getElementById('btn-ver-reputacion');
        if (btnVer) {
            btnVer.addEventListener('click', async () => {
                const usuario = await obtenerUsuarioActual();
                if (usuario) {
                    const reputacion = await obtenerReputacion();
                    if (reputacion) {
                        alert(`📊 Reputación\n⭐ Puntos: ${reputacion.puntos || 0}\n🏆 Nivel: ${reputacion.nivel || 'Bronce'}\n📝 Avisos esta semana: ${reputacion.avisos_semana || 0}/${reputacion.limite_semanal || 5}`);
                    }
                }
            });
        }
    });
    
    window.addEventListener('storage', (e) => {
        if (e.key === 'usuario' || e.key === 'api_key') {
            actualizarBotones();
        }
    });
</script>

</body>
</html>
