<header class="header">
    <div class="contenedor header-contenido">
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">Lo que pasa en la colonia, aquí se sabe</p>
            </div>
        </a>

        <div id="reputacion-widget" style="display: none; align-items: center; gap: 12px; background: rgba(0,0,0,0.05); padding: 6px 15px; border-radius: 40px; margin-right: 15px;">
            <div>⭐ <span id="puntos-valor">0</span></div>
            <div>🏆 <span id="nivel-valor">cargando</span></div>
            <div>📊 <span id="avisos-restantes">-</span>/<span id="avisos-limite">-</span></div>
            <div style="width: 60px; height: 4px; background: rgba(0,0,0,0.2); border-radius: 2px; overflow: hidden;">
                <div id="reputacion-barra" style="width:0%; height:100%; background:#fbbf24;"></div>
            </div>
            <button id="btn-ver-reputacion" style="background:none; border:none; color:#2c3e66; cursor:pointer;">📊</button>
        </div>

        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">🔐 <span class="btn-text">Iniciar sesión</span></a>
            <a href="#" id="admin-link" class="btn-admin" style="display:none;">⚙️ <span class="btn-text">Administrador</span></a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">🚪 <span class="btn-text">Cerrar sesión</span></a>
        </div>
    </div>
</header>

<style>
    /* Sobrescribir estilos del header que causan problemas */
    .header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: white;
        padding: 0;
        margin-bottom: 0;
    }
    
    .header .contenedor {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: nowrap !important; /* Evitar que los elementos se vayan a otra línea */
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        max-width: 100%;
    }
    
    /* Forzar que el header-contenido use los estilos correctos */
    .header-contenido {
        width: 100%;
    }
    
    .header-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        flex-shrink: 1;
        min-width: 0;
    }
    
    .header-logo:hover {
        background: transparent !important;
        padding: 0 !important;
    }
    
    .logo-icon {
        font-size: 1.8rem;
        background: linear-gradient(135deg, #2b7a2b, #1e4620);
        border-radius: 50%;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    
    .logo-texto h1 {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.2;
        background: linear-gradient(135deg, #2b7a2b, #d4a043);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        white-space: nowrap;
    }
    
    .header-slogan {
        font-size: 0.55rem;
        color: #6b7280;
        margin: 0;
        white-space: nowrap;
    }
    
    .header-acciones {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-shrink: 0;
    }
    
    /* Estilos de botones - más específicos para no ser sobrescritos */
    .header-acciones .btn-login,
    .header-acciones .btn-admin,
    .header-acciones .btn-logout {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 0.3rem 0.8rem;
        border-radius: 40px;
        font-size: 0.75rem;
        font-weight: 600;
        text-decoration: none;
        white-space: nowrap;
        cursor: pointer;
        border: none;
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        color: white;
        box-shadow: 0 2px 4px rgba(245, 176, 66, 0.2);
    }
    
    .header-acciones .btn-login:hover {
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        transform: translateY(-1px);
        padding: 0.3rem 0.8rem;
    }
    
    .header-acciones .btn-admin {
        background: linear-gradient(135deg, #d4a043, #b8860b);
        color: white;
    }
    
    .header-acciones .btn-logout {
        border: 2px solid #d4a043;
        background: transparent;
        color: #d4a043;
        box-shadow: none;
    }
    
    .header-acciones .btn-logout:hover {
        background: transparent;
        padding: 0.3rem 0.8rem;
    }
    
    /* Ocultar widget en móviles */
    @media (max-width: 768px) {
        #reputacion-widget {
            display: none !important;
        }
    }
    
    /* Pantallas pequeñas - ocultar texto del botón */
    @media (max-width: 400px) {
        .btn-text {
            display: none;
        }
        
        .header-acciones .btn-login,
        .header-acciones .btn-admin,
        .header-acciones .btn-logout {
            padding: 0.3rem 0.6rem;
            font-size: 0.9rem;
        }
        
        .logo-icon {
            width: 30px;
            height: 30px;
            font-size: 1.4rem;
        }
        
        .logo-texto h1 {
            font-size: 0.75rem;
        }
        
        .header-slogan {
            font-size: 0.45rem;
        }
    }
</style>

<script>
    (function() {
        function cerrarSesion() {
            localStorage.removeItem('usuario');
            localStorage.removeItem('api_key');
            window.location.href = '/avisos-jardines/login.html';
        }
        
        function actualizarBotones() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');
            
            const loginLink = document.getElementById('login-link');
            const adminLink = document.getElementById('admin-link');
            let cerrarBtn = document.getElementById('cerrar-sesion');
            
            if (!loginLink) return;
            
            if (usuarioStr && apiKey) {
                try {
                    const usuario = JSON.parse(usuarioStr);
                    loginLink.style.display = 'none';
                    
                    if (cerrarBtn) {
                        cerrarBtn.style.display = 'inline-flex';
                        const newBtn = cerrarBtn.cloneNode(true);
                        cerrarBtn.parentNode.replaceChild(newBtn, cerrarBtn);
                        cerrarBtn = newBtn;
                        cerrarBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            cerrarSesion();
                        });
                    }
                    
                    if (usuario.rol === 'admin') {
                        adminLink.style.display = 'inline-flex';
                        adminLink.onclick = function(e) {
                            e.preventDefault();
                            window.location.href = '/avisos-jardines/admin.html';
                        };
                    } else {
                        adminLink.style.display = 'none';
                    }
                } catch(e) {}
            } else {
                loginLink.style.display = 'inline-flex';
                adminLink.style.display = 'none';
                if (cerrarBtn) cerrarBtn.style.display = 'none';
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', actualizarBotones);
        } else {
            actualizarBotones();
        }
        
        window.addEventListener('storage', actualizarBotones);
    })();
</script>
