<header class="header">
    <div class="contenedor header-contenido">
        <!-- Logo y título - Enlace al index -->
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">Lo que pasa en la colonia, aquí se sabe</p>
            </div>
        </a>

        <!-- Acciones del usuario -->
        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">
                <span class="btn-icon">🔐</span>
                <span>Iniciar sesión</span>
            </a>
            <a href="#" id="admin-link" class="btn-admin" style="display:none;">
                <span class="btn-icon">⚙️</span>
                <span>Administrador</span>
            </a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">
                <span class="btn-icon">🚪</span>
                <span>Cerrar sesión</span>
            </a>
        </div>
    </div>
</header>

<div id="reputacion-widget" style="display: flex; align-items: center; gap: 8px;">
  <span>⭐ <span id="puntos-confianza">0</span> pts</span>
  <span>🏆 <span id="nivel-usuario">cargando...</span></span>
  <span>📊 <span id="avisos-restantes">-</span> avisos/semana</span>
</div>

<script>
async function cargarReputacion() {
  const apiKey = localStorage.getItem('api_key');
  if (!apiKey) return;
  
  const api = new API();
  const result = await api.llamar('MI_REPUTACION', {}, apiKey);
  if (result && result.success) {
    document.getElementById('puntos-confianza').textContent = result.data.puntos;
    document.getElementById('nivel-usuario').textContent = result.data.nivel;
    document.getElementById('avisos-restantes').textContent = result.data.disponibles || 0;
  }
}
cargarReputacion();
</script>

<style>
    /* Header - logo y h1 uno al lado del otro */
    .header-logo {
        display: flex;
        align-items: center;
        gap: 15px;
        text-decoration: none;
    }

    .logo-icon {
        font-size: 3rem;
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        border-radius: 50%;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        flex-shrink: 0;
    }

    .logo-texto {
        display: flex;
        flex-direction: column;
    }

    .logo-texto h1 {
        margin: 0;
        font-size: 1.8rem;
        font-weight: 700;
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        white-space: nowrap;
    }

    .header-slogan {
        margin: 5px 0 0;
        font-size: 0.85rem;
        color: #b0b0b0;
        font-style: italic;
        white-space: nowrap;
    }

    .header-logo:hover h1 {
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Botón Iniciar sesión */
    .btn-login {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        color: white;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        font-size: 0.9rem;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-login:hover {
        background: linear-gradient(135deg, #e69a2e, #e67300);
        transform: scale(1.02);
    }

    /* Botón Administrador */
    .btn-admin {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #4a5568, #2d3748);
        color: #e2e8f0;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        font-size: 0.9rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-admin:hover {
        background: linear-gradient(135deg, #5a6578, #3d4858);
        color: white;
        transform: scale(1.02);
        border-color: rgba(255, 255, 255, 0.2);
    }

    /* Botón Cerrar sesión */
    .btn-logout {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: transparent;
        color: #a0aec0;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        font-size: 0.9rem;
        border: 1px solid #4a5568;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-logout:hover {
        background: rgba(160, 174, 192, 0.1);
        color: #e2e8f0;
        border-color: #718096;
        transform: scale(1.02);
    }

    .header-acciones {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    @media (max-width: 768px) {
        .logo-texto h1 {
            font-size: 1.2rem;
            white-space: normal;
        }

        .header-slogan {
            font-size: 0.7rem;
            white-space: normal;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            font-size: 2rem;
        }

        .btn-login,
        .btn-admin,
        .btn-logout {
            padding: 8px 16px;
            font-size: 0.8rem;
        }
    }
</style>

<script>
    // ==================== HEADER CON SESIÓN ====================

    // Función para actualizar la UI del header
    function actualizarHeaderUI() {
        console.log('🔄 Actualizando header UI...');

        // Verificar si API existe
        if (typeof API === 'undefined' || !API.getUsuarioActual) {
            console.log('⏳ API no disponible, reintentando en 300ms...');
            setTimeout(actualizarHeaderUI, 300);
            return;
        }

        const usuario = API.getUsuarioActual();
        const loginLink = document.getElementById('login-link');
        const adminLink = document.getElementById('admin-link');
        const cerrarSesion = document.getElementById('cerrar-sesion');

        if (!loginLink || !adminLink || !cerrarSesion) {
            console.error('❌ Elementos del header no encontrados');
            return;
        }

        console.log('👤 Usuario detectado:', usuario ? usuario.email : 'No logueado');

        if (usuario && usuario.email) {
            // Usuario logueado - mostrar botones
            loginLink.style.display = 'none';
            cerrarSesion.style.display = 'inline-flex';

            // Mostrar admin solo si tiene rol admin
            if (usuario.rol === 'admin') {
                adminLink.style.display = 'inline-flex';
                console.log('✅ Admin detectado, mostrando panel de administración');
            } else {
                adminLink.style.display = 'none';
            }

            // Configurar evento de cierre de sesión
            cerrarSesion.onclick = function (e) {
                e.preventDefault();
                console.log('🚪 Cerrando sesión...');
                if (API.cerrarSesion) API.cerrarSesion();
                localStorage.removeItem('usuario');
                localStorage.removeItem('api_key');
                window.location.href = '/avisos-jardines/login.html';
            };

            // Configurar evento de admin
            if (usuario.rol === 'admin') {
                adminLink.onclick = function (e) {
                    e.preventDefault();
                    window.location.href = '/avisos-jardines/admin.html';
                };
            }
        } else {
            // Usuario no logueado
            loginLink.style.display = 'inline-flex';
            adminLink.style.display = 'none';
            cerrarSesion.style.display = 'none';
            console.log('👤 Modo invitado');
        }
    }

    // Función global que puede ser llamada desde fuera
    window.inicializarHeaderAuth = function () {
        console.log('🚀 Inicializando header auth...');
        actualizarHeaderUI();
    };

    // Escuchar evento cuando API está lista
    window.addEventListener('api-ready', function () {
        console.log('📡 Evento api-ready recibido');
        actualizarHeaderUI();
    });

    // También escuchar cambios en localStorage (para cuando se hace login desde otra pestaña)
    window.addEventListener('storage', function (e) {
        if (e.key === 'usuario' || e.key === 'api_key') {
            console.log('🔄 Cambio detectado en localStorage');
            actualizarHeaderUI();
        }
    });

    // Inicializar cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(actualizarHeaderUI, 200);
        });
    } else {
        setTimeout(actualizarHeaderUI, 200);
    }

    // Agrega esta función al final del script del header
    window.actualizarHeaderSesion = function () {
        console.log('🔄 Actualizando header manualmente');
        if (typeof actualizarEstadoSesion === 'function') {
            actualizarEstadoSesion();
        } else if (typeof window.inicializarHeaderAuth === 'function') {
            window.inicializarHeaderAuth();
        }
    };
</script>
