<header class="header">
    <div class="contenedor header-contenido">
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">Lo que pasa en la colonia, aquí se sabe</p>
            </div>
        </a>

        <div id="reputacion-widget" style="display: none; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 40px; margin-right: 15px;">
            <div>⭐ <span id="puntos-valor">0</span></div>
            <div>🏆 <span id="nivel-valor">cargando</span></div>
            <div>📊 <span id="avisos-restantes">-</span>/<span id="avisos-limite">-</span></div>
            <div style="width: 60px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden;">
                <div id="reputacion-barra" style="width:0%; height:100%; background:#fbbf24;"></div>
            </div>
            <button id="btn-ver-reputacion" style="background:none; border:none; color:white; cursor:pointer;">📊</button>
        </div>

        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">🔐 Iniciar sesión</a>
            <a href="#" id="admin-link" class="btn-admin" style="display:none;">⚙️ Administrador</a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">🚪 Cerrar sesión</a>
        </div>
    </div>
</header>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #f5f7fb;
        min-height: 100vh;
    }

    .header {
        position: sticky;
        top: 0;
        left: 0;
        width: 100%;
        background: white;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        z-index: 1000;
    }

    .contenedor {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 0.75rem;
    }

    .header-contenido {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        min-height: 3rem;
        flex-wrap: nowrap;
    }

    .header-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        flex-shrink: 1;
        min-width: 0;
        overflow: hidden;
    }

    .logo-icon {
        font-size: 1.6rem;
        background: linear-gradient(135deg, #2b7a2b, #1e4620);
        border-radius: 50%;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .logo-texto {
        overflow: hidden;
    }

    .logo-texto h1 {
        margin: 0;
        font-size: 0.85rem;
        line-height: 1.1;
        background: linear-gradient(135deg, #2b7a2b, #d4a043);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .header-slogan {
        font-size: 0.5rem;
        color: #6b7280;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    #reputacion-widget {
        align-items: center;
        gap: 12px;
        background: rgba(0,0,0,0.05);
        padding: 6px 15px;
        border-radius: 40px;
        margin-right: 15px;
        font-size: 0.8rem;
    }

    .header-acciones {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-shrink: 0;
    }

    .btn-login, .btn-admin, .btn-logout {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 0.3rem 0.7rem;
        border-radius: 40px;
        font-size: 0.7rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
        white-space: nowrap;
        cursor: pointer;
        border: none;
    }

    .btn-login {
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        color: white;
        box-shadow: 0 2px 4px rgba(245, 176, 66, 0.2);
    }
    
    .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(245, 176, 66, 0.3);
    }
    
    .btn-login:active {
        transform: translateY(0);
    }

    .btn-admin {
        background: linear-gradient(135deg, #d4a043, #b8860b);
        color: white;
    }

    .btn-logout {
        border: 2px solid #d4a043;
        color: #d4a043;
        background: transparent;
    }

    /* Ocultar widget en móviles */
    @media (max-width: 768px) {
        #reputacion-widget {
            display: none !important;
        }
    }

    /* iPhone 8 y similares (375px) - botón compacto */
    @media (max-width: 400px) {
        .btn-login {
            padding: 0.25rem 0.6rem;
            font-size: 0.65rem;
            gap: 3px;
        }
        
        .logo-icon {
            width: 30px;
            height: 30px;
            font-size: 1.4rem;
        }
        
        .logo-texto h1 {
            font-size: 0.75rem;
        }
        
        .header-slogan {
            font-size: 0.45rem;
        }
        
        .header-contenido {
            gap: 0.3rem;
        }
    }

    /* Pantallas muy pequeñas (320px) - solo ícono */
    @media (max-width: 340px) {
        .btn-login .texto-login {
            display: none;
        }
        
        .btn-login {
            padding: 0.25rem 0.5rem;
            font-size: 0.9rem;
        }
    }
</style>

<script>
    (function() {
        function cerrarSesion() {
            localStorage.removeItem('usuario');
            localStorage.removeItem('api_key');
            window.location.href = '/avisos-jardines/login.html';
        }
        
        function actualizarBotones() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');
            
            const loginLink = document.getElementById('login-link');
            const adminLink = document.getElementById('admin-link');
            let cerrarBtn = document.getElementById('cerrar-sesion');
            
            if (!loginLink) return;
            
            if (usuarioStr && apiKey) {
                try {
                    const usuario = JSON.parse(usuarioStr);
                    loginLink.style.display = 'none';
                    
                    if (cerrarBtn) {
                        cerrarBtn.style.display = 'inline-flex';
                        const newBtn = cerrarBtn.cloneNode(true);
                        cerrarBtn.parentNode.replaceChild(newBtn, cerrarBtn);
                        cerrarBtn = newBtn;
                        cerrarBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            cerrarSesion();
                        });
                    }
                    
                    if (usuario.rol === 'admin') {
                        adminLink.style.display = 'inline-flex';
                        adminLink.onclick = function(e) {
                            e.preventDefault();
                            window.location.href = '/avisos-jardines/admin.html';
                        };
                    } else {
                        adminLink.style.display = 'none';
                    }
                } catch(e) {}
            } else {
                loginLink.style.display = 'inline-flex';
                adminLink.style.display = 'none';
                if (cerrarBtn) cerrarBtn.style.display = 'none';
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', actualizarBotones);
        } else {
            actualizarBotones();
        }
        
        window.addEventListener('storage', actualizarBotones);
    })();
</script>
