<header class="header">
    <div class="contenedor header-contenido">
        <a href="/barrio/index.html" class="header-logo">
            <img src="/barrio/icons/logo-elbarrio.png" alt="Logo de El Barrio" class="logo-icon">
            <div class="logo-texto">
                <h1>El Barrio</h1>
                <h2 class="header-slogan">¡El barrio te respalda!</h2>
            </div>
        </a>

        <div id="reputacion-widget"
            style="display: none; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 40px; margin-right: 15px;">
            <div>⭐ <span id="puntos-valor">0</span></div>
            <div>🏆 <span id="nivel-valor">cargando</span></div>
            <div>📊 <span id="avisos-restantes">-</span>/<span id="avisos-limite">-</span></div>
            <div
                style="width: 60px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden;">
                <div id="reputacion-barra" style="width:0%; height:100%; background:#fbbf24;"></div>
            </div>
            <button id="btn-ver-reputacion"
                style="background:none; border:none; color:white; cursor:pointer;">📊</button>
        </div>


        <div class="header-acciones" id="header-acciones">
            <!-- CAMPANA DE NOTIFICACIONES -->
            <div class="notifications-wrapper" id="notificationsWidget">
                <button class="notif-bell" id="notifBellBtn" onclick="toggleNotificaciones()">
                    🔔
                    <span id="notifBadge" class="notif-badge" style="display: none;">0</span>
                </button>
                <div id="notifPanel" class="notif-panel" style="display: none;">
                    <div class="notif-header">
                        <span>🔔 Notificaciones</span>
                        <button onclick="marcarTodasLeidas()" class="notif-clear-all">✕ Todas</button>
                    </div>
                    <div id="notifList" class="notif-list">
                        <p class="notif-empty">📭 No hay notificaciones nuevas</p>
                    </div>
                </div>
            </div>

            <a href="/barrio/login.html" id="login-link" class="btn-login">🔑 <span class="btn-text">Iniciar
                    sesión</span></a>

            <div class="user-area" id="user-area" style="display: none;">
                <span class="user-name" id="user-name"></span>
                <a href="#" id="cerrar-sesion" class="btn-logout">🔒 <span class="btn-text">Cerrar sesión</span></a>
            </div>
        </div>
    </div>
    </div>
</header>

<style>
    /* ========== NOTIFICACIONES EN HEADER ========== */
    .notifications-wrapper {
        position: relative;
    }

    .notif-bell {
        background: none;
        border: none;
        font-size: 1.4rem;
        cursor: pointer;
        position: relative;
        padding: 6px;
        border-radius: 30px;
        transition: background 0.2s;
    }

    .notif-bell:hover {
        background: rgba(245, 176, 66, 0.2);
    }

    .notif-badge {
        position: absolute;
        top: -2px;
        right: -2px;
        background: #ff4757;
        color: white;
        font-size: 0.6rem;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 30px;
        min-width: 18px;
        text-align: center;
    }

    .notif-panel {
        position: absolute;
        top: 100%;
        right: 0;
        width: 320px;
        max-width: 90vw;
        background: rgba(26, 26, 46, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1001;
        overflow: hidden;
        animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .notif-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        font-weight: bold;
        color: #f5b042;
    }

    .notif-clear-all {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #ccc;
        font-size: 0.7rem;
        padding: 4px 10px;
        border-radius: 20px;
        cursor: pointer;
    }

    .notif-clear-all:hover {
        background: rgba(255, 71, 87, 0.2);
        color: #ff4757;
    }

    .notif-list {
        max-height: 400px;
        overflow-y: auto;
    }

    .notif-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: background 0.2s;
        cursor: pointer;
    }

    .notif-item:hover {
        background: rgba(255, 255, 255, 0.05);
    }

    .notif-item.no-leida {
        background: rgba(245, 176, 66, 0.1);
    }

    .notif-icon {
        font-size: 1.2rem;
    }

    .notif-content {
        flex: 1;
    }

    .notif-mensaje {
        font-size: 0.8rem;
        color: #ddd;
        line-height: 1.3;
    }

    .notif-tiempo {
        font-size: 0.65rem;
        color: #888;
        margin-top: 4px;
    }

    .notif-empty {
        text-align: center;
        padding: 30px 20px;
        color: #888;
        font-size: 0.8rem;
    }

    @media (max-width: 550px) {
        .notif-panel {
            width: 280px;
            right: -50px;
        }
    }
</style>
<script>
    (function () {
        function obtenerUsuarioLocal() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');

            if (usuarioStr && apiKey) {
                try {
                    return JSON.parse(usuarioStr);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        function cerrarSesion() {
            localStorage.removeItem('usuario');
            localStorage.removeItem('api_key');
            window.location.href = '/barrio/index.html';
        }

        function actualizarBotones() {
            const usuario = obtenerUsuarioLocal();

            const loginLink = document.getElementById('login-link');
            const userArea = document.getElementById('user-area');
            const userNameSpan = document.getElementById('user-name');
            const perfilLink = document.getElementById('perfil-link');
            const cerrarBtn = document.getElementById('cerrar-sesion');

            if (!loginLink) {
                setTimeout(actualizarBotones, 100);
                return;
            }

            if (usuario) {
                loginLink.style.display = 'none';
                userArea.style.display = 'flex';

                const nombreMostrar = usuario.nombre || usuario.email || 'Usuario';
                if (userNameSpan) userNameSpan.textContent = `👋 ${nombreMostrar}`;

                if (perfilLink) {
                    perfilLink.onclick = function (e) {
                        e.preventDefault();
                        window.location.href = '/barrio/perfil.html';
                    };
                }

                if (cerrarBtn) {
                    const nuevoCerrar = cerrarBtn.cloneNode(true);
                    cerrarBtn.parentNode.replaceChild(nuevoCerrar, cerrarBtn);
                    nuevoCerrar.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        cerrarSesion();
                    });
                }
            } else {
                loginLink.style.display = 'inline-flex';
                userArea.style.display = 'none';
            }
        }

        actualizarBotones();

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', actualizarBotones);
        }

        window.addEventListener('storage', function (e) {
            if (e.key === 'usuario' || e.key === 'api_key') {
                actualizarBotones();
            }
        });

        window.actualizarHeaderSesion = actualizarBotones;
        window._headerActualizarBotones = actualizarBotones;
    })();
</script>
<script>
    // ========== NOTIFICACIONES EN EL HEADER ==========
    let notificacionesInterval = null;
    let notificacionesCache = [];

    function toggleNotificaciones() {
        const panel = document.getElementById('notifPanel');
        if (panel) {
            const isVisible = panel.style.display === 'block';
            panel.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) {
                cargarNotificaciones();
            }
        }
    }

    // Cerrar panel al hacer clic fuera
    document.addEventListener('click', function (event) {
        const widget = document.getElementById('notificationsWidget');
        const panel = document.getElementById('notifPanel');
        if (widget && panel && !widget.contains(event.target)) {
            panel.style.display = 'none';
        }
    });

    async function cargarNotificaciones() {
        const apiKey = localStorage.getItem('api_key');
        const usuario = obtenerUsuarioLocal();

        if (!apiKey || !usuario) return;

        try {
            const response = await fetch(`https://script.google.com/macros/s/AKfycbxfKbjZuNLervPF3JTpNRAv_Cn5dGkk1vCLt3x-WX-NLRWdb-TxbBtMkJdDEGypggDY/exec?accion=OBTENER_NOTIFICACIONES&email=${encodeURIComponent(usuario.email)}&soloNoLeidas=true&api_key=${apiKey}`);
            const data = await response.json();

            if (data && data.success) {
                const notificaciones = data.data || [];
                notificacionesCache = notificaciones;
                actualizarBadge(notificaciones.length);
                renderizarNotificaciones(notificaciones);
            }
        } catch (error) {
            console.error('Error cargando notificaciones:', error);
        }
    }

    function actualizarBadge(count) {
        const badge = document.getElementById('notifBadge');
        if (badge) {
            if (count > 0) {
                badge.textContent = count > 99 ? '99+' : count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }
    }

    function renderizarNotificaciones(notificaciones) {
        const container = document.getElementById('notifList');
        if (!container) return;

        if (!notificaciones || notificaciones.length === 0) {
            container.innerHTML = '<p class="notif-empty">📭 No hay notificaciones nuevas</p>';
            return;
        }

        container.innerHTML = notificaciones.map(notif => `
        <div class="notif-item no-leida" data-id="${notif.id}" onclick="marcarNotificacionLeida('${notif.id}', '${notif.aviso_id}')">
            <div class="notif-icon">${notif.tipo === 'like' ? '👍' : '💬'}</div>
            <div class="notif-content">
                <div class="notif-mensaje">${escapeHTML(notif.mensaje)}</div>
                <div class="notif-tiempo">${tiempoRelativo(notif.fecha)}</div>
            </div>
        </div>
    `).join('');
    }

    async function marcarNotificacionLeida(id, avisoId) {
        const apiKey = localStorage.getItem('api_key');
        try {
            await fetch(`https://script.google.com/macros/s/AKfycbxfKbjZuNLervPF3JTpNRAv_Cn5dGkk1vCLt3x-WX-NLRWdb-TxbBtMkJdDEGypggDY/exec?accion=MARCAR_NOTIFICACION_LEIDA&id=${id}&api_key=${apiKey}`);
            if (avisoId) {
                window.location.href = `/barrio/aviso.html?id=${avisoId}`;
            }
            cargarNotificaciones();
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function marcarTodasLeidas() {
        const apiKey = localStorage.getItem('api_key');
        const ids = notificacionesCache.map(n => n.id);
        if (ids.length === 0) return;

        try {
            await fetch(`https://script.google.com/macros/s/AKfycbxfKbjZuNLervPF3JTpNRAv_Cn5dGkk1vCLt3x-WX-NLRWdb-TxbBtMkJdDEGypggDY/exec?accion=MARCAR_NOTIFICACIONES_LEIDAS&ids=${JSON.stringify(ids)}&api_key=${apiKey}`);
            cargarNotificaciones();
            const panel = document.getElementById('notifPanel');
            if (panel) panel.style.display = 'none';
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function tiempoRelativo(fechaISO) {
        if (!fechaISO) return 'reciente';
        const ahora = new Date();
        const fecha = new Date(fechaISO);
        const diffSegundos = Math.floor((ahora - fecha) / 1000);

        if (diffSegundos < 60) return 'ahora';
        if (diffSegundos < 3600) return `hace ${Math.floor(diffSegundos / 60)} min`;
        if (diffSegundos < 86400) return `hace ${Math.floor(diffSegundos / 3600)} h`;
        return `hace ${Math.floor(diffSegundos / 86400)} d`;
    }

    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Iniciar polling cada 30 segundos
    function iniciarPollingNotificaciones() {
        if (notificacionesInterval) clearInterval(notificacionesInterval);

        setTimeout(cargarNotificaciones, 1000);

        notificacionesInterval = setInterval(() => {
            if (localStorage.getItem('api_key')) {
                cargarNotificaciones();
            }
        }, 30000);
    }

    // Iniciar cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', iniciarPollingNotificaciones);
    } else {
        iniciarPollingNotificaciones();
    }
</script>
