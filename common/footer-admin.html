<script>
    // ========== DASHBOARD FUNCTIONS ==========
    let currentUserRole = 'user'; // 'user' o 'admin'
    let chartDetailedView = false;

    // Detectar si es admin (basado en localStorage o variable global)
    function detectUserRole() {
        const userData = localStorage.getItem('currentUser');
        if (userData) {
            try {
                const user = JSON.parse(userData);
                if (user.role === 'admin' || user.isAdmin === true) {
                    currentUserRole = 'admin';
                    document.getElementById('userRoleBadge').innerHTML = '👑 Administrador';
                    document.getElementById('userRoleBadge').style.background = 'rgba(255, 193, 7, 0.2)';
                    document.getElementById('pendingCard').style.display = 'flex';
                    document.getElementById('chartCategorias').style.display = 'block';
                } else {
                    currentUserRole = 'user';
                    document.getElementById('userRoleBadge').innerHTML = '👤 Usuario';
                }
            } catch(e) {
                currentUserRole = 'user';
            }
        }
    }

    // Formatear fecha
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // Obtener todos los avisos (del localStorage)
    function getAllNotices() {
        const stored = localStorage.getItem('avisos');
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch(e) {
                return [];
            }
        }
        return [];
    }

    // Obtener avisos según el rol
    function getUserNotices() {
        const allNotices = getAllNotices();
        if (currentUserRole === 'admin') {
            return allNotices;
        } else {
            const userData = localStorage.getItem('currentUser');
            if (userData) {
                const user = JSON.parse(userData);
                return allNotices.filter(aviso => aviso.userId === user.id || aviso.userEmail === user.email);
            }
            return [];
        }
    }

    // Calcular estadísticas
    function calculateStats(notices) {
        const total = notices.length;
        const activos = notices.filter(a => a.estado === 'activo' || a.estado !== 'inactivo').length;
        const pendientes = notices.filter(a => a.estado === 'pendiente' || !a.estado).length;
        
        // Categorías únicas en uso
        const categoriasSet = new Set(notices.map(a => a.categoria).filter(c => c));
        const totalCategorias = categoriasSet.size;
        
        // Visitas totales
        const totalVisitas = notices.reduce((sum, a) => sum + (parseInt(a.visitas) || 0), 0);
        
        // Interacciones (likes + comentarios)
        const totalInteracciones = notices.reduce((sum, a) => {
            const likes = parseInt(a.likes) || 0;
            const comentarios = (a.comentarios && Array.isArray(a.comentarios)) ? a.comentarios.length : 0;
            return sum + likes + comentarios;
        }, 0);
        
        return { total, activos, pendientes, totalCategorias, totalVisitas, totalInteracciones };
    }

    // Estadísticas por categoría
    function getStatsByCategory(notices) {
        const categories = ['urgente', 'escuelas', 'servicios', 'comercios', 'eventos', 'gobierno', 'varios'];
        const stats = {};
        categories.forEach(cat => {
            stats[cat] = notices.filter(a => a.categoria === cat).length;
        });
        return stats;
    }

    // Actualizar tarjetas
    function updateCards(stats) {
        document.getElementById('totalAvisos').innerText = stats.total;
        document.getElementById('avisosActivos').innerText = stats.activos;
        if (currentUserRole === 'admin') {
            document.getElementById('avisosPendientes').innerText = stats.pendientes;
        }
        document.getElementById('totalCategorias').innerText = stats.totalCategorias;
        document.getElementById('totalVisitas').innerText = stats.totalVisitas.toLocaleString();
        document.getElementById('totalInteracciones').innerText = stats.totalInteracciones.toLocaleString();
    }

    // Renderizar gráfico de barras
    function renderChart(notices) {
        const stats = getStatsByCategory(notices);
        const maxValue = Math.max(...Object.values(stats), 1);
        const categoryNames = {
            'urgente': '🚨 Urgente',
            'escuelas': '🏫 Escuelas',
            'servicios': '🛠️ Servicios',
            'comercios': '🛒 Comercios',
            'eventos': '📅 Eventos',
            'gobierno': '🏛️ Gobierno',
            'varios': '📢 Varios'
        };
        
        let barsHtml = '';
        let totalWithNotices = 0;
        
        for (const [key, value] of Object.entries(stats)) {
            if (value > 0) totalWithNotices++;
            const percentage = (value / maxValue) * 100;
            barsHtml += `
                <div class="bar-item">
                    <div class="bar-label">${categoryNames[key]}</div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width: ${percentage}%;">
                            ${chartDetailedView && value > 0 ? value : ''}
                        </div>
                    </div>
                    <div class="bar-count">${value}</div>
                </div>
            `;
        }
        
        document.getElementById('chartBars').innerHTML = barsHtml || '<p style="color:#888;">No hay datos suficientes</p>';
        
        const topCategory = Object.entries(stats).sort((a,b) => b[1] - a[1])[0];
        if (topCategory && topCategory[1] > 0) {
            document.getElementById('chartStatsMini').innerHTML = `📌 Categoría con más avisos: ${categoryNames[topCategory[0]]} (${topCategory[1]} avisos)`;
        } else {
            document.getElementById('chartStatsMini').innerHTML = '📌 Publica tu primer aviso para ver estadísticas';
        }
    }

    // Renderizar últimos avisos
    function renderRecentNotices(notices) {
        const recent = [...notices].sort((a,b) => {
            const dateA = new Date(a.fecha || a.createdAt || 0);
            const dateB = new Date(b.fecha || b.createdAt || 0);
            return dateB - dateA;
        }).slice(0, 5);
        
        const tbody = document.getElementById('recentTableBody');
        
        if (recent.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No hay avisos publicados</td></tr>';
            return;
        }
        
        tbody.innerHTML = recent.map(aviso => {
            let statusClass = 'status-active';
            let statusText = 'Activo';
            if (aviso.estado === 'pendiente' || !aviso.estado) {
                statusClass = 'status-pending';
                statusText = 'Pendiente';
            } else if (aviso.estado === 'inactivo') {
                statusClass = 'status-inactive';
                statusText = 'Inactivo';
            }
            
            const fecha = formatDate(aviso.fecha || aviso.createdAt || new Date());
            const titulo = aviso.titulo?.substring(0, 40) + (aviso.titulo?.length > 40 ? '...' : '') || 'Sin título';
            const categoriaIcon = {
                'urgente': '🚨', 'escuelas': '🏫', 'servicios': '🛠️',
                'comercios': '🛒', 'eventos': '📅', 'gobierno': '🏛️', 'varios': '📢'
            }[aviso.categoria] || '📋';
            
            return `
                <tr>
                    <td>${categoriaIcon} ${titulo}</td>
                    <td>${aviso.categoria || 'General'}</td>
                    <td>${fecha}</td>
                    <td>${parseInt(aviso.visitas) || 0}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                </tr>
            `;
        }).join('');
    }

    // Función principal de actualización
    function refreshDashboardData() {
        const notices = getUserNotices();
        const stats = calculateStats(notices);
        updateCards(stats);
        
        if (currentUserRole === 'admin') {
            renderChart(notices);
        }
        
        renderRecentNotices(notices);
        
        // Actualizar fecha
        const now = new Date();
        document.getElementById('fechaActual').innerHTML = `📅 ${now.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
    }

    // Alternar vista del gráfico
    function toggleChartView() {
        chartDetailedView = !chartDetailedView;
        const notices = getUserNotices();
        renderChart(notices);
        const btn = document.querySelector('.chart-toggle');
        if (btn) {
            btn.innerHTML = chartDetailedView ? '📊 Vista compacta' : '📈 Vista detallada';
        }
    }

    // Inicializar dashboard
    function initDashboard() {
        detectUserRole();
        refreshDashboardData();
        
        // Actualizar automáticamente cada 30 segundos
        setInterval(refreshDashboardData, 30000);
    }

    // Actualizar copyright
    document.getElementById('copyright-year').innerHTML = `&copy; ${new Date().getFullYear()} - El Barrio. Todos los derechos reservados.`;

    // Iniciar cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDashboard);
    } else {
        initDashboard();
    }
</script>
