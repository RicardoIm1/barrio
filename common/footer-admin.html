<script>
    // ========== DASHBOARD FUNCTIONS - CONECTADO A API REAL ==========
    let currentUserRole = 'user';
    let currentUser = null;
    let chartDetailedView = false;

    // Detectar usuario actual desde API
    async function detectUserRole() {
        try {
            currentUser = API.getUsuarioActual();
            if (currentUser && currentUser.rol === 'admin') {
                currentUserRole = 'admin';
                const badge = document.getElementById('userRoleBadge');
                if (badge) {
                    badge.innerHTML = '👑 Administrador';
                    badge.style.background = 'rgba(255, 193, 7, 0.2)';
                }
                const pendingCard = document.getElementById('pendingCard');
                if (pendingCard) pendingCard.style.display = 'flex';
                const chartCategorias = document.getElementById('chartCategorias');
                if (chartCategorias) chartCategorias.style.display = 'block';
            } else {
                currentUserRole = 'user';
                const badge = document.getElementById('userRoleBadge');
                if (badge) badge.innerHTML = '👤 Usuario';
                const pendingCard = document.getElementById('pendingCard');
                if (pendingCard) pendingCard.style.display = 'none';
            }
            return true;
        } catch (e) {
            console.error('Error detectando usuario:', e);
            return false;
        }
    }

    // Formatear fecha
    function formatDate(dateString) {
        if (!dateString) return 'Fecha desconocida';
        try {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
        } catch (e) {
            return dateString;
        }
    }

    // Obtener todos los avisos desde la API
    async function getAllNoticesFromAPI() {
        try {
            const apiKey = localStorage.getItem('api_key');
            let respuesta;

            if (currentUserRole === 'admin') {
                // Admin obtiene TODOS los avisos
                respuesta = await API.peticion('LISTAR_AVISOS_PUBLICOS', {}, apiKey);
            } else {
                // Usuario normal obtiene SOLO sus avisos
                respuesta = await API.peticion('LISTAR_MIS_AVISOS', {}, apiKey);
            }

            console.log('Dashboard - Respuesta API:', respuesta);

            if (respuesta && respuesta.success) {
                let avisos = [];
                if (respuesta.data && respuesta.data.datos && Array.isArray(respuesta.data.datos)) {
                    avisos = respuesta.data.datos;
                } else if (respuesta.datos && Array.isArray(respuesta.datos)) {
                    avisos = respuesta.datos;
                } else if (Array.isArray(respuesta.data)) {
                    avisos = respuesta.data;
                }
                return avisos;
            }
            return [];
        } catch (error) {
            console.error('Error obteniendo avisos:', error);
            return [];
        }
    }

    // Calcular estadísticas
    function calculateStats(notices) {
        const total = notices.length;
        const activos = notices.filter(a => a.status === 'activo' || a.status === 'aprobado').length;
        const pendientes = notices.filter(a => a.status === 'pendiente' || !a.status).length;

        // Categorías únicas en uso
        const categoriasSet = new Set(notices.map(a => a.categoria).filter(c => c));
        const totalCategorias = categoriasSet.size;

        // Visitas totales
        const totalVisitas = notices.reduce((sum, a) => sum + (parseInt(a.vistas) || 0), 0);

        // Interacciones (likes + comentarios)
        const totalInteracciones = notices.reduce((sum, a) => {
            const likes = parseInt(a.intereses) || 0;
            const comentarios = parseInt(a.comentarios_count) || 0;
            return sum + likes + comentarios;
        }, 0);

        return { total, activos, pendientes, totalCategorias, totalVisitas, totalInteracciones };
    }

    // Estadísticas por categoría
    function getStatsByCategory(notices) {
        const categories = ['urgente', 'escuelas', 'servicios', 'comercios', 'eventos', 'gobierno', 'varios'];
        const stats = {};
        categories.forEach(cat => {
            stats[cat] = notices.filter(a => a.categoria === cat).length;
        });
        return stats;
    }

    // Actualizar tarjetas
    function updateCards(stats) {
        const totalAvisos = document.getElementById('totalAvisos');
        const avisosActivos = document.getElementById('avisosActivos');
        const totalCategorias = document.getElementById('totalCategorias');
        const totalVisitas = document.getElementById('totalVisitas');
        const totalInteracciones = document.getElementById('totalInteracciones');

        if (totalAvisos) totalAvisos.innerText = stats.total;
        if (avisosActivos) avisosActivos.innerText = stats.activos;
        if (currentUserRole === 'admin') {
            const avisosPendientes = document.getElementById('avisosPendientes');
            if (avisosPendientes) avisosPendientes.innerText = stats.pendientes;
        }
        if (totalCategorias) totalCategorias.innerText = stats.totalCategorias;
        if (totalVisitas) totalVisitas.innerText = stats.totalVisitas.toLocaleString();
        if (totalInteracciones) totalInteracciones.innerText = stats.totalInteracciones.toLocaleString();
    }

    // Renderizar gráfico de barras
    function renderChart(notices) {
        const stats = getStatsByCategory(notices);
        const maxValue = Math.max(...Object.values(stats), 1);
        const categoryNames = {
            'urgente': '🚨 Urgente',
            'escuelas': '🏫 Escuelas',
            'servicios': '🛠️ Servicios',
            'comercios': '🛒 Comercios',
            'eventos': '📅 Eventos',
            'gobierno': '🏛️ Gobierno',
            'varios': '📢 Varios'
        };

        let barsHtml = '';
        for (const [key, value] of Object.entries(stats)) {
            const percentage = (value / maxValue) * 100;
            barsHtml += `
                <div class="bar-item">
                    <div class="bar-label">${categoryNames[key]}</div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width: ${percentage}%;">
                            ${chartDetailedView && value > 0 ? value : ''}
                        </div>
                    </div>
                    <div class="bar-count">${value}</div>
                </div>
            `;
        }

        const chartBars = document.getElementById('chartBars');
        if (chartBars) chartBars.innerHTML = barsHtml || '<p style="color:#888;">No hay datos suficientes</p>';

        const topCategory = Object.entries(stats).sort((a, b) => b[1] - a[1])[0];
        const chartStatsMini = document.getElementById('chartStatsMini');
        if (chartStatsMini) {
            if (topCategory && topCategory[1] > 0) {
                chartStatsMini.innerHTML = `📌 Categoría con más avisos: ${categoryNames[topCategory[0]]} (${topCategory[1]} avisos)`;
            } else {
                chartStatsMini.innerHTML = '📌 Publica tu primer aviso para ver estadísticas';
            }
        }
    }

    // Renderizar últimos avisos en la tabla
    function renderRecentNotices(notices) {
        const recent = [...notices].sort((a, b) => {
            const dateA = new Date(a.created_at || a.fecha || 0);
            const dateB = new Date(b.created_at || b.fecha || 0);
            return dateB - dateA;
        }).slice(0, 5);

        const tbody = document.getElementById('recentTableBody');
        if (!tbody) return;

        if (recent.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No hay avisos publicados</td></tr>';
            return;
        }

        tbody.innerHTML = recent.map(aviso => {
            let statusClass = 'status-active';
            let statusText = 'Activo';
            if (aviso.status === 'pendiente' || !aviso.status) {
                statusClass = 'status-pending';
                statusText = 'Pendiente';
            } else if (aviso.status === 'rechazado') {
                statusClass = 'status-inactive';
                statusText = 'Rechazado';
            }

            const fecha = formatDate(aviso.created_at || aviso.fecha);
            const titulo = (aviso.titulo || 'Sin título').substring(0, 40);
            const categoriaIcon = {
                'urgente': '🚨', 'escuelas': '🏫', 'servicios': '🛠️',
                'comercios': '🛒', 'eventos': '📅', 'gobierno': '🏛️', 'varios': '📢'
            }[aviso.categoria] || '📋';

            return `
                <tr>
                    <td>${categoriaIcon} ${titulo}${aviso.titulo?.length > 40 ? '...' : ''}</td>
                    <td>${aviso.categoria || 'General'}</td>
                    <td>${fecha}</td>
                    <td>${parseInt(aviso.vistas) || 0}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                </tr>
            `;
        }).join('');
    }

    // Función principal de actualización
    async function refreshDashboardData() {
        try {
            const notices = await getAllNoticesFromAPI();
            const stats = calculateStats(notices);
            updateCards(stats);

            if (currentUserRole === 'admin') {
                renderChart(notices);
            }

            renderRecentNotices(notices);

            // Actualizar fecha
            const now = new Date();
            const fechaSpan = document.getElementById('fechaActual');
            if (fechaSpan) {
                fechaSpan.innerHTML = `📅 ${now.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
            }
        } catch (error) {
            console.error('Error actualizando dashboard:', error);
        }
    }

    // Alternar vista del gráfico
    window.toggleChartView = function () {
        chartDetailedView = !chartDetailedView;
        refreshDashboardData();
        const btn = document.querySelector('.chart-toggle');
        if (btn) {
            btn.innerHTML = chartDetailedView ? '📊 Vista compacta' : '📈 Vista detallada';
        }
    };

    // Inicializar dashboard
    async function initDashboard() {
        await detectUserRole();
        await refreshDashboardData();

        // Actualizar automáticamente cada 30 segundos
        setInterval(refreshDashboardData, 30000);
    }

    // Iniciar cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDashboard);
    } else {
        initDashboard();
    }
</script>
