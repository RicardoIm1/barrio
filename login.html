<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Iniciar sesión - Avisos Colonia Jardines PVR</title>
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
</head>

<body>
  <div id="header-container"></div>

  <main class="contenedor-chico">
    <div id="mensaje-container"></div>

    <form id="form-login" class="formulario">
      <h2 style="margin-bottom: 24px; font-weight: 500;">Iniciar sesión</h2>

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="Tu contraseña">
      </div>

      <button type="submit" class="boton">Entrar</button>
    </form>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      await UI.cargarHeader();
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
    });
  </script>

  <script>
    // Cargar footer dinámico
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) {
            footerContainer.innerHTML = data;
            const anioElement = document.getElementById('anio-actual');
            if (anioElement) {
              anioElement.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando el footer:', error));
    });
  </script>
</body>

</html>
