<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">

    <meta name="theme-color" content="#2c3e50">
    <style>
        /* ========== ESTILOS PREMIUM PARA EL INDEX ========== */

        /* Tarjetas cliqueables */
        .aviso-card {
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            width: 100%;
            box-sizing: border-box;

            background: white;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), 0 4px 12px rgba(0, 0, 0, 0.03);
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }

        .aviso-card:active {
            transform: scale(0.99);
        }

        .card-titulo {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 12px 16px 4px;
            line-height: 1.3;
        }

        .card-contenido {
            font-size: 0.9rem;
            color: #3a3a3a;
            margin: 0 16px 12px;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 0.7rem;
            color: #8e8e93;
            margin: 0 16px 12px;
        }

        .botones-card {
            display: flex;
            gap: 24px;
            padding: 8px 16px 16px;
            border-top: 0.5px solid #efefef;
        }

        .boton-icono {
            background: none;
            border: none;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #5a5a5a;
        }

        .boton-icono span {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .video-container {
            background: black;
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            /* Control exacto del alto */
        }

        .video-container iframe,
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Retraso escalonado más notable para las tarjetas */
        .aviso-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .aviso-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .aviso-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .aviso-card:nth-child(4) {
            animation-delay: 0.45s;
        }

        .aviso-card:nth-child(5) {
            animation-delay: 0.55s;
        }

        .aviso-card:nth-child(6) {
            animation-delay: 0.65s;
        }

        .aviso-card:nth-child(7) {
            animation-delay: 0.8s;
        }

        .aviso-card:nth-child(8) {
            animation-delay: 0.9s;
        }

        .aviso-card:nth-child(9) {
            animation-delay: 1.0s;
        }

        .aviso-card:nth-child(10) {
            animation-delay: 1.1s;
        }

        .aviso-card:nth-child(11) {
            animation-delay: 1.2s;
        }

        .aviso-card:nth-child(12) {
            animation-delay: 1.3s;
        }

        .aviso-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Badge de categoría más elegante */
        .categoria-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 2;
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        /* Botón de WhatsApp sutil */
        .whatsapp-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background-color: #25D366;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            z-index: 3;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png');
            background-size: 55%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .whatsapp-btn:hover {
            transform: scale(1.12);
            background-color: #128C7E;
        }

        /* Botón de teléfono sutil */
        .phone-btn {
            position: absolute;
            bottom: 12px;
            right: 56px;
            background: var(--color-acento);
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            z-index: 3;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .phone-btn:hover {
            transform: scale(1.12);
            background: var(--color-secundario);
        }

        /* Fecha más elegante */
        .aviso-fecha {
            font-size: 0.7rem;
            color: var(--color-texto-claro);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.5rem;
        }

        /* Contenido con límite de líneas */
        .aviso-contenido-preview {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--color-texto);
        }

        /* Pie de tarjeta con metadatos */
        .aviso-footer {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--color-borde);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--color-texto-claro);
        }

        /* Urgente: borde rojo y fondo suave */
        .aviso-card.urgente {
            border-left: 4px solid #dc3545;
            background: linear-gradient(135deg, #fff5f5 0%, white 100%);
        }

        /* Imagen en la tarjeta (si tiene) */
        .aviso-imagen {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
            margin-bottom: 0.8rem;
            background: var(--color-fondo);
        }

        /* Estado pendiente */
        .aviso-card.pendiente {
            opacity: 0.85;
            filter: grayscale(0.1);
            border-left: 4px solid #f39c12;
        }

        .pendiente-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f39c12;
            color: white;
            font-size: 0.6rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            z-index: 2;
        }

        /* Contenedor de filtros y buscador */
        .filtros-buscador-wrapper {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        /* Mejora en los filtros */
        .filtros {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            flex: 2;
        }

        .filtro {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            background: var(--color-fondo, #f0f2f5);
            border: none;
        }

        .filtro:hover {
            transform: translateY(-2px);
        }

        .filtro.activo {
            background: var(--color-primario, #2c3e50);
            color: white;
        }

        /* Buscador */
        .buscador-container {
            flex: 1;
            min-width: 220px;
        }

        .buscador-input {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--color-borde, #ddd);
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
        }

        .buscador-input:focus {
            outline: none;
            border-color: var(--color-primario, #2c3e50);
            box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
        }

        /* Tablets y pantallas medianas: 4 columnas, primeras 2 destacadas */
        @media (min-width: 768px) and (max-width: 1199px) {
            .grid-avisos {
                grid-template-columns: repeat(4, 1fr);
            }

            /* Primeros 2 items: ocupan 2 columnas cada uno (primera fila de 2) */
            .grid-avisos .aviso-card:nth-child(1),
            .grid-avisos .aviso-card:nth-child(2) {
                grid-column: span 2;
            }

            /* Primeros 2 items más grandes visualmente */
            .grid-avisos .aviso-card:nth-child(-n+2) .aviso-imagen {
                height: 220px;
            }

            .grid-avisos .aviso-card:nth-child(-n+2) h3 {
                font-size: 1.2rem;
            }

            .grid-avisos .aviso-card:nth-child(-n+2) .aviso-contenido-preview {
                -webkit-line-clamp: 4;
            }
        }

        /* Pantallas grandes: 4 columnas, primeras 2 destacadas */
        @media (min-width: 1200px) {
            .grid-avisos {
                grid-template-columns: repeat(4, 1fr);
            }

            /* Primeros 2 items: ocupan 2 columnas cada uno */
            .grid-avisos .aviso-card:nth-child(1),
            .grid-avisos .aviso-card:nth-child(2) {
                grid-column: span 2;
            }

            .grid-avisos .aviso-card:nth-child(-n+2) .aviso-imagen {
                height: 240px;
            }

            .grid-avisos .aviso-card:nth-child(-n+2) .aviso-contenido-preview {
                -webkit-line-clamp: 4;
            }
        }

        /* Loader para scroll infinito */
        .loading-trigger {
            text-align: center;
            padding: 2rem;
            color: var(--color-texto-claro);
        }

        /* Paginación oculta pero funcional para scroll infinito */
        .paginacion {
            display: none;
        }

        /* Estadísticas en tarjetas - MEJORADO */
        .aviso-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.8rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--color-borde);
            font-size: 0.7rem;
            color: var(--color-texto-claro);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.2rem 0.4rem;
            border-radius: 20px;
        }

        .stat-item.like-btn {
            cursor: pointer;
        }

        .stat-item.like-btn:hover {
            background: rgba(255, 71, 87, 0.1);
            transform: scale(1.05);
        }

        .stat-item.liked {
            color: #ff4757;
        }

        .stat-item:active {
            transform: scale(0.95);
        }

        /* Botón Interés flotante */
        .interes-btn {
            position: absolute;
            bottom: 12px;
            right: 100px;
            background: #ff4757;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            z-index: 3;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .interes-btn:hover {
            transform: scale(1.12);
            background: #e84118;
        }

        /* Comentarios flotantes */
        .comments-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .comments-panel.open {
            transform: translateY(0);
        }

        .comments-header {
            padding: 1rem;
            background: var(--color-primario);
            color: white;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .comments-header h3 {
            margin: 0;
            font-size: 1rem;
        }

        .close-comments {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            max-height: 400px;
        }

        .comment-item {
            background: var(--color-fondo);
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .comment-author {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--color-primario);
            margin-bottom: 0.3rem;
        }

        .comment-text {
            font-size: 0.85rem;
            color: var(--color-texto);
            line-height: 1.4;
        }

        .comment-date {
            font-size: 0.6rem;
            color: var(--color-texto-claro);
            margin-top: 0.3rem;
        }

        .comment-input-area {
            padding: 1rem;
            border-top: 1px solid var(--color-borde);
            display: flex;
            gap: 0.5rem;
        }

        .comment-input-area input {
            flex: 1;
            padding: 0.6rem;
            border: 1px solid var(--color-borde);
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .comment-input-area button {
            background: var(--color-primario);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Toast de notificación */
        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1100;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .banner-caro {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%);
            border-radius: 12px;
            padding: 1rem 2rem;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .prestige-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .prestige-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .prestige-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .prestige-item img {
            height: 40px;
            width: auto;
            object-fit: contain;
            /* filter: brightness(0) invert(1); */
            filter: none;
        }

        .prestige-item span {
            color: white;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .prestige-bar {
                justify-content: center;
            }

            .prestige-item img {
                height: 30px;

            }

            .prestige-item span {
                font-size: 0.65rem;
            }
        }
    </style>
    <style>
        /* === ESTILOS MODERNOS PARA TARJETAS (sin romper nada) === */

        }

        .card-stats-moderno .stat-item {
            display: flex;
            align-items: center;

            font-size: 0.8rem;
            color: #5a5a5e;

        }

        .card-stats-moderno .stat-item.liked {

        }

        /* Asegurar que los botones flotantes de WhatsApp e Interés no se rompan */
        .whatsapp-btn,
        .interes-btn {
            z-index: 2;
        }
    </style>
</head>

    <script>
        // ========== VARIABLES GLOBALES ==========
        let avisosData = [];
        let currentUser = null;
        let likedAvisos = JSON.parse(localStorage.getItem('likedAvisos') || '{}');
        let currentAvisoIdForComments = null;

        // Variables para scroll infinito
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;
        let currentCategory = 'todos';
        let currentSearchTerm = '';
        let allAvisos = [];
        let filteredAvisos = [];
        let renderedCount = 0;

        // Bandera para evitar múltiples llamadas a la API
        let isLoadingAvisos = false;
        let avisosCargados = false;

        // ========== FUNCIONES DE ESTADÍSTICAS ==========

        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        async function registrarVista(id) {
            try {
                const api = new API();
                const result = await api.llamar('REGISTRAR_VISTA', { id: id });
                if (result && result.success) {
                    console.log(`✅ Vista registrada para aviso ${id}`);
                }
            } catch (e) {
                console.warn('Error registrando vista:', e);
            }
        }

        async function registrarClickWhatsApp(id) {
            try {
                const api = new API();
                const result = await api.llamar('REGISTRAR_CLICK_WHATSAPP', { id: id });
                if (result && result.success) {
                    console.log(`✅ Click WhatsApp registrado para aviso ${id}`);
                }
            } catch (e) {
                console.warn('Error registrando click WhatsApp:', e);
            }
        }

        async function registrarInteres(id) {
            try {
                const api = new API();
                const result = await api.llamar('REGISTRAR_INTERES', { id: id });
                if (result && result.success) {
                    console.log(`✅ Interés registrado para aviso ${id}`);
                    const aviso = allAvisos.find(a => a.id == id);
                    if (aviso) {
                        aviso.intereses = (aviso.intereses || 0) + 1;
                    }
                    return true;
                }
            } catch (e) {
                console.warn('Error registrando interés:', e);
            }
            return false;
        }

        // ========== FUNCIONES DE INTERACCIÓN ==========

        window.verAviso = async function (id) {
            await registrarVista(id);
            window.location.href = `/barrio/aviso.html?id=${id}`;
        };

        window.abrirWhatsApp = async function (numero, texto, id, event) {
            if (event) event.stopPropagation();
            if (id) await registrarClickWhatsApp(id);
            const url = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        };

        window.abrirTelefono = function (numero, event) {
            if (event) event.stopPropagation();
            window.open(`tel:${numero}`, '_blank');
        };

        window.darLike = async function (id, event) {
            if (event) event.stopPropagation();
            if (likedAvisos[id]) {
                showToast('❤️ Ya marcaste "Me interesa" en este aviso', 1500);
                return;
            }
            const success = await registrarInteres(id);
            if (success) {
                likedAvisos[id] = true;
                localStorage.setItem('likedAvisos', JSON.stringify(likedAvisos));
                showToast('👍 ¡Gracias por tu interés!', 1500);
                const statElement = document.querySelector(`.stat-item.like-btn[data-id="${id}"]`);
                if (statElement) {
                    const currentLikes = parseInt(statElement.querySelector('.stat-value')?.textContent || '0');
                    if (statElement.querySelector('.stat-value')) {
                        statElement.querySelector('.stat-value').textContent = currentLikes + 1;
                    }
                    statElement.classList.add('liked');
                }
                applyFiltersAndSearch();
            }
        };

        window.abrirComentarios = function (id, event) {
            if (event) event.stopPropagation();
            currentAvisoIdForComments = id;
            document.getElementById('comments-panel').classList.add('open');
            cargarComentarios(id);
        };

        window.cerrarPanelComentarios = function () {
            document.getElementById('comments-panel').classList.remove('open');
            currentAvisoIdForComments = null;
        };

        async function cargarComentarios(avisoId) {
            const commentsList = document.getElementById('comments-list');
            if (!commentsList) return;
            commentsList.innerHTML = '<div class="cargando">💬 Cargando comentarios...</div>';
            try {
                const resultado = await API.peticion('LISTAR_COMENTARIOS', { avisoId: avisoId });
                if (resultado && resultado.success && Array.isArray(resultado.data)) {
                    if (resultado.data.length === 0) {
                        commentsList.innerHTML = '<div style="text-align:center; color:#888;">📝 No hay comentarios aún. ¡Sé el primero!</div>';
                    } else {
                        commentsList.innerHTML = resultado.data.map(com => `
                            <div class="comment-item">
                                <div class="comment-author">${escapeHtml(com.autor || 'Anónimo')}</div>
                                <div class="comment-text">${escapeHtml(com.texto)}</div>
                                <div class="comment-date">${formatearFecha(com.fecha)}</div>
                            </div>
                        `).join('');
                    }
                } else {
                    commentsList.innerHTML = '<div style="text-align:center; color:#888;">💬 No hay comentarios aún</div>';
                }
            } catch (e) {
                console.error('Error cargando comentarios:', e);
                commentsList.innerHTML = '<div style="text-align:center; color:#e74c3c;">❌ Error al cargar comentarios</div>';
            }
        }

        window.enviarComentario = async function () {
            const input = document.getElementById('comment-input');
            const texto = input.value.trim();
            if (!texto) {
                showToast('✏️ Escribe un comentario primero', 1500);
                return;
            }
            if (!currentAvisoIdForComments) {
                showToast('❌ Error: No se identificó el aviso', 1500);
                return;
            }
            const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
            const autor = usuario.nombre || usuario.email || 'Anónimo';
            try {
                const api = new API();
                const result = await api.llamar('AGREGAR_COMENTARIO', {
                    avisoId: currentAvisoIdForComments,
                    texto: texto,
                    autor: autor
                });
                if (result && result.success) {
                    input.value = '';
                    showToast('💬 Comentario enviado', 1500);
                    cargarComentarios(currentAvisoIdForComments);
                } else {
                    showToast('❌ Error al enviar comentario', 1500);
                }
            } catch (e) {
                console.error('Error enviando comentario:', e);
                showToast('❌ Error de conexión', 1500);
            }
        };

        // ========== FUNCIONES AUXILIARES ==========
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatearFecha(fechaStr) {
            if (!fechaStr) return 'Reciente';
            try {
                const fecha = new Date(fechaStr);
                return fecha.toLocaleDateString('es-MX');
            } catch (e) {
                return fechaStr;
            }
        }

        // Búsqueda global por cualquier campo
        function searchInAviso(aviso, searchTerm) {
            if (!searchTerm) return true;
            const term = searchTerm.toLowerCase();
            const searchableFields = [
                aviso.titulo, aviso.contenido, aviso.categoria, aviso.ubicacion,
                aviso.contacto, aviso.nombre_contacto, aviso.email, aviso.created_at
            ];
            return searchableFields.some(field => field && field.toString().toLowerCase().includes(term));
        }

        function applyFiltersAndSearch() {
            let filtered = [...allAvisos];
            if (currentCategory !== 'todos') {
                filtered = filtered.filter(a => a.categoria === currentCategory);
            }
            if (currentSearchTerm) {
                filtered = filtered.filter(aviso => searchInAviso(aviso, currentSearchTerm));
            }
            filteredAvisos = filtered;
            renderedCount = 0;
            currentPage = 1;
            hasMore = true;
            const container = document.getElementById('avisos-container');
            if (container) {
                container.innerHTML = '';
            }
            loadMoreAvisos();
        }

        function loadMoreAvisos() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            const loadingTrigger = document.getElementById('loading-trigger');
            if (loadingTrigger) {
                loadingTrigger.style.display = 'block';
            }

            setTimeout(() => {
                const start = renderedCount;
                const itemsPerLoad = 12;
                const end = Math.min(start + itemsPerLoad, filteredAvisos.length);
                const newAvisos = filteredAvisos.slice(start, end);

                if (newAvisos.length > 0) {
                    appendAvisosToGrid(newAvisos);
                    renderedCount = end;
                }

                if (end >= filteredAvisos.length) {
                    hasMore = false;
                    if (loadingTrigger) {
                        loadingTrigger.style.display = 'none';
                    }
                } else {
                    if (loadingTrigger) {
                        loadingTrigger.style.display = 'block';
                    }
                }
                isLoading = false;
            }, 400);
        }

        function appendAvisosToGrid(avisos) {
            const container = document.getElementById('avisos-container');
            if (!container) return;

            const usuarioActual = API.getUsuarioActual();
            const apiKey = localStorage.getItem('api_key');

            const html = avisos.map(aviso => {
                // Verificar si el usuario ya votó este aviso (positivo o negativo)
                const votosUsuario = JSON.parse(localStorage.getItem(`votos_${aviso.id}`) || '{}');
                const yaVotoPositivo = votosUsuario.positivo === true;
                const yaVotoNegativo = votosUsuario.negativo === true;
                const dislikes = aviso.votos_negativos || 0;

                return `
      <div class="aviso-card tarjeta-moderna ${aviso.categoria === 'urgente' ? 'urgente' : ''}" 
           data-id="${aviso.id}"
           onclick="verAviso('${aviso.id}')">
        <div class="categoria-badge" style="background: ${getColorCategoria(aviso.categoria)}; color: white;">
          ${getIconoCategoria(aviso.categoria)} ${aviso.categoria?.toUpperCase() || 'GENERAL'}
        </div>
        ${aviso.imagen_url ? `<img src="${aviso.imagen_url}" class="aviso-imagen" alt="${escapeHtml(aviso.titulo)}" loading="lazy">` : ''}
        <div class="card-contenido-moderno">
          <div class="card-header-moderno">
            <div class="card-fecha-moderna">📅 ${formatearFecha(aviso.created_at)}</div>
            <h3 class="card-titulo-moderno">${escapeHtml(aviso.titulo)}</h3>
          </div>
          <div class="card-preview-moderno">
            ${escapeHtml((aviso.contenido || '').substring(0, 120))}${(aviso.contenido || '').length > 120 ? '...' : ''}
          </div>
          <div class="card-stats-moderno">
            <span class="stat-item">👁️ <span class="stat-value">${aviso.vistas || 0}</span></span>
            <span class="stat-item">📞 <span class="stat-value">${aviso.clicks_whatsapp || 0}</span></span>
            <span class="stat-item like-btn ${yaVotoPositivo ? 'liked' : ''}" 
                  data-id="${aviso.id}" 
                  data-tipo="positivo"
                  onclick="votarAviso('${aviso.id}', 'positivo', event)">
              👍 <span class="stat-value">${aviso.intereses || 0}</span>
            </span>
            <span class="stat-item dislike-btn ${yaVotoNegativo ? 'disliked' : ''}" 
                  data-id="${aviso.id}" 
                  data-tipo="negativo"
                  onclick="votarAviso('${aviso.id}', 'negativo', event)">
              👎 <span class="stat-value">${dislikes}</span>
            </span>
            <span class="stat-item" onclick="abrirComentarios('${aviso.id}', event)">
              💬 <span class="stat-value">0</span>
            </span>
          </div>
          <div class="aviso-footer">
            <span>📍 ${aviso.ubicacion || 'Jardines PVR'}</span>
          </div>
        </div>
        ${aviso.contacto ? `
          <button class="whatsapp-btn" 
                  onclick="abrirWhatsApp('${aviso.contacto}', '${encodeURIComponent('Hola, vi tu aviso en BARRIO: ' + aviso.titulo)}', '${aviso.id}', event)">
          </button>
        ` : ''}
      </div>
    `;
            }).join('');

            container.insertAdjacentHTML('beforeend', html);
        }
        async function cargarAvisos() {
            // SOLUCIÓN: Evitar múltiples llamadas verificando si ya se cargaron o si ya está en proceso
            if (avisosCargados || isLoadingAvisos) {
                console.log('⚠️ Avisos ya cargados o carga en proceso, omitiendo llamada duplicada');
                return;
            }

            isLoadingAvisos = true;
            const container = document.getElementById('avisos-container');
            if (container) {
                container.innerHTML = '<div class="cargando">📰 Cargando avisos...</div>';
            }

            try {
                const resultado = await API.listarPublicos({}, { pagina: 1, limite: 200 });
                if (resultado && resultado.datos) {
                    allAvisos = resultado.datos.filter(a => a.status === 'activo' || a.status === undefined);
                    // Ordenar por fecha más reciente primero
                    allAvisos.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    avisosCargados = true; // Marcar como ya cargados
                    applyFiltersAndSearch();
                } else {
                    if (container) {
                        container.innerHTML = '<div class="mensaje mensaje-info">📭 No hay avisos disponibles</div>';
                    }
                }
            } catch (error) {
                console.error('Error cargando avisos:', error);
                if (container) {
                    container.innerHTML = '<div class="mensaje mensaje-error">❌ Error al cargar avisos</div>';
                }
            } finally {
                isLoadingAvisos = false;
            }
        }

        function getIconoCategoria(cat) {
            const iconos = { urgente: '⚠️', escuelas: '🏫', servicios: '🛠️', comercios: '🛒', eventos: '📅', gobierno: '🏛️', varios: '📢' };
            return iconos[cat] || '📄';
        }

        function getColorCategoria(cat) {
            const colores = { urgente: '#dc3545', escuelas: '#3498db', servicios: '#f39c12', comercios: '#27ae60', eventos: '#9b59b6', gobierno: '#1abc9c', varios: '#7f8c8d' };
            return colores[cat] || '#95a5a6';
        }

        function initFiltros() {
            const filtros = document.querySelectorAll('.filtro');
            filtros.forEach(filtro => {
                filtro.addEventListener('click', () => {
                    filtros.forEach(f => f.classList.remove('activo'));
                    filtro.classList.add('activo');
                    currentCategory = filtro.dataset.categoria;
                    applyFiltersAndSearch();
                });
            });
        }

        // Scroll infinito
        function setupInfiniteScroll() {
            window.addEventListener('scroll', () => {
                if (isLoading || !hasMore) return;
                const trigger = document.getElementById('loading-trigger');
                if (trigger) {
                    const rect = trigger.getBoundingClientRect();
                    if (rect.top <= window.innerHeight + 100) {
                        loadMoreAvisos();
                    }
                }
            });
        }

        // Buscador en tiempo real
        function setupSearch() {
            const searchInput = document.getElementById('buscador-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    currentSearchTerm = e.target.value;
                    applyFiltersAndSearch();
                });
            }
        }

        // ========== INICIALIZACIÓN ==========
        document.addEventListener('DOMContentLoaded', function () {
            initFiltros();
            setupSearch();
            setupInfiniteScroll();
            cargarAvisos(); // Solo UNA llamada a la API gracias a las banderas de control

            fetch('/barrio/common/header.html')
                .then(res => res.ok ? res.text() : Promise.reject())
                .then(html => {
                    document.getElementById('header-container').innerHTML = html;
                    setTimeout(() => {
                        if (typeof actualizarHeaderPorSesion === 'function') {
                            actualizarHeaderPorSesion();
                        }
                    }, 100);
                })
                .catch(err => console.error('Error cargando header:', err));

            fetch('/barrio/common/footer.html')
                .then(response => response.ok ? response.text() : Promise.reject())
                .then(data => {
                    const footerContainer = document.getElementById('footer-container');
                    if (footerContainer) {
                        footerContainer.innerHTML = data;
                        const anioElement = document.getElementById('anio-actual');
                        if (anioElement) anioElement.textContent = new Date().getFullYear();
                    }
                })
                .catch(error => console.error('Error cargando el footer:', error));
        });

        // ========== VOTAR (Likes/Dislikes) ==========
        window.votarAviso = async function (avisoId, tipo, event) {
            if (event) event.stopPropagation();

            const apiKey = localStorage.getItem('api_key');
            if (!apiKey) {
                showToast('🔐 Inicia sesión para votar', 2000);
                return;
            }

            // Verificar si ya votó este tipo antes
            const votosKey = `votos_${avisoId}`;
            const votosGuardados = JSON.parse(localStorage.getItem(votosKey) || '{}');

            if (tipo === 'positivo' && votosGuardados.positivo) {
                showToast('👍 Ya votaste positivo en este aviso', 1500);
                return;
            }
            if (tipo === 'negativo' && votosGuardados.negativo) {
                showToast('👎 Ya votaste negativo en este aviso', 1500);
                return;
            }

            try {
                const resultado = await API.peticion('VOTAR_AVISO', {
                    aviso_id: avisoId,
                    tipo: tipo
                }, apiKey);

                if (resultado && resultado.success) {
                    // Guardar en localStorage
                    votosGuardados[tipo] = true;
                    localStorage.setItem(votosKey, JSON.stringify(votosGuardados));

                    // Actualizar contadores con los valores REALES del servidor
                    const card = document.querySelector(`.aviso-card[data-id="${avisoId}"]`);
                    if (card) {
                        const likeSpan = card.querySelector('.like-btn .stat-value');
                        const dislikeSpan = card.querySelector('.dislike-btn .stat-value');
                        if (likeSpan && resultado.positivos !== undefined) likeSpan.textContent = resultado.positivos;
                        if (dislikeSpan && resultado.negativos !== undefined) dislikeSpan.textContent = resultado.negativos;

                        // Cambiar estilo del botón clickeado
                        const btn = card.querySelector(`.${tipo === 'positivo' ? 'like-btn' : 'dislike-btn'}`);
                        if (btn) btn.classList.add(tipo === 'positivo' ? 'liked' : 'disliked');
                    }

                    showToast(tipo === 'positivo' ? '👍 Gracias por tu voto positivo' : '👎 Voto negativo registrado', 1500);

                    // Si es negativo, verificar si el aviso debe desaparecer (3 votos)
                    if (tipo === 'negativo') {
                        const card = document.querySelector(`.aviso-card[data-id="${avisoId}"]`);
                        const dislikesSpan = card?.querySelector('.dislike-btn .stat-value');
                        const totalDislikes = dislikesSpan ? parseInt(dislikesSpan.textContent) : 0;
                        if (totalDislikes >= 3) {
                            if (card) card.style.display = 'none';
                            showToast('⚠️ Este aviso ha sido eliminado por la comunidad (3 votos negativos)', 3000);
                        }
                    }
                } else {
                    // 🔥 VERIFICAR SI EL ERROR ES "YA VOTASTE"
                    if (resultado && resultado.error === 'Ya votaste este aviso') {
                        showToast('ℹ️ Ya habías votado este aviso anteriormente', 1500);

                        const card = document.querySelector(`.aviso-card[data-id="${avisoId}"]`);
                        if (card) {
                            const btn = card.querySelector(`.${tipo === 'positivo' ? 'like-btn' : 'dislike-btn'}`);
                            if (btn) btn.classList.add(tipo === 'positivo' ? 'liked' : 'disliked');

                            if (resultado.positivos !== undefined) {
                                const likeSpan = card.querySelector('.like-btn .stat-value');
                                if (likeSpan) likeSpan.textContent = resultado.positivos;
                            }
                            if (resultado.negativos !== undefined) {
                                const dislikeSpan = card.querySelector('.dislike-btn .stat-value');
                                if (dislikeSpan) dislikeSpan.textContent = resultado.negativos;
                            }
                        }

                        votosGuardados[tipo] = true;
                        localStorage.setItem(votosKey, JSON.stringify(votosGuardados));
                    } else {
                        showToast('❌ Error al votar: ' + (resultado?.error || 'Intenta de nuevo'), 2000);
                    }
                }
            } catch (error) {
                console.error('Error votando:', error);
                showToast('❌ Error de conexión', 2000);
            }
        };
    </script>

    <!-- Cookie Banner -->
    <div id="cookieBanner"
        style="position: fixed; bottom: 0; left: 0; right: 0; background: #1e4620; color: white; padding: 1rem; text-align: center; z-index: 1000; display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem;">
        <span>🍪 Usamos cookies para que la plataforma funcione bien. No vendemos tus datos.</span>
        <div>
            <button id="aceptarCookies"
                style="background: #fbbf24; border: none; padding: 0.4rem 1.2rem; border-radius: 2rem; cursor: pointer;">Aceptar</button>
            <a href="/barrio/cookies.html"
                style="background: transparent; border: 1px solid white; color: white; padding: 0.4rem 1.2rem; border-radius: 2rem; text-decoration: none; margin-left: 0.5rem;">Configurar</a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('cookie_consent') === 'aceptadas') {
            const banner = document.getElementById('cookieBanner');
            if (banner) banner.style.display = 'none';
        }
        const aceptarBtn = document.getElementById('aceptarCookies');
        if (aceptarBtn) {
            aceptarBtn.addEventListener('click', () => {
                localStorage.setItem('cookie_consent', 'aceptadas');
                const banner = document.getElementById('cookieBanner');
                if (banner) banner.style.display = 'none';
            });
        }
    </script>

    <script>
        // ========== ACTUALIZAR HEADER SEGÚN SESIÓN ==========
        function actualizarHeaderPorSesion() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');

            const loginLink = document.getElementById('login-link');
            const userArea = document.getElementById('user-area');
            const userNameSpan = document.getElementById('user-name');
            const cerrarBtn = document.getElementById('cerrar-sesion');

            if (!loginLink) {
                console.log('Header no cargado aún, reintentando...');
                setTimeout(actualizarHeaderPorSesion, 200);
                return;
            }

            if (usuarioStr && apiKey) {
                try {
                    const usuario = JSON.parse(usuarioStr);
                    // Ocultar login, mostrar área de usuario
                    if (loginLink) loginLink.style.display = 'none';
                    if (userArea) userArea.style.display = 'flex';
                    if (userNameSpan) {
                        userNameSpan.textContent = `👋 ${usuario.nombre || usuario.email || 'Usuario'}`;
                        // ========== MEJORA: Clic para ir a admin ==========
                        userNameSpan.style.cursor = 'pointer';
                        userNameSpan.onclick = () => {
                            window.location.href = '/barrio/admin.html';
                        };
                    }

                    // Configurar cierre de sesión
                    if (cerrarBtn) {
                        const nuevoCerrar = cerrarBtn.cloneNode(true);
                        cerrarBtn.parentNode.replaceChild(nuevoCerrar, cerrarBtn);
                        nuevoCerrar.addEventListener('click', function (e) {
                            e.preventDefault();
                            localStorage.removeItem('usuario');
                            localStorage.removeItem('api_key');
                            window.location.href = '/barrio/index.html';
                        });
                    }
                    console.log('Header actualizado - Usuario logueado');
                } catch (e) {
                    console.error('Error al actualizar header:', e);
                }
            } else {
                // No hay sesión, mostrar login
                if (loginLink) loginLink.style.display = 'inline-flex';
                if (userArea) userArea.style.display = 'none';
                console.log('Header actualizado - Sin sesión');
            }
        }
        // Ejecutar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function () {
            // Esperar un poco a que el header se cargue (fetch)
            setTimeout(actualizarHeaderPorSesion, 200);
            setTimeout(actualizarHeaderPorSesion, 500);
            setTimeout(actualizarHeaderPorSesion, 1000);
        });
    </script>

    <!-- Panel de comentarios flotante -->
    <div id="comments-panel" class="comments-panel">
        <div class="comments-header">
            <h3>💬 Comentarios</h3>
            <button class="close-comments" onclick="cerrarPanelComentarios()">×</button>
        </div>
        <div id="comments-list" class="comments-list">
            <div class="cargando">Cargando comentarios...</div>
        </div>
        <div class="comment-input-area">
            <input type="text" id="comment-input" placeholder="Escribe tu comentario...">
            <button onclick="enviarComentario()">Enviar</button>
        </div>
    </div>
</body>
