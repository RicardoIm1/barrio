<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Avisos Colonia Jardines PVR</title>
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
  <link rel="manifest" href="/avisos-jardines/manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <style>
    /* ========== ESTILOS PREMIUM PARA EL INDEX ========== */

    /* Tarjetas cliqueables */
    .aviso-card {
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .aviso-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    /* Badge de categoría más elegante */
    .categoria-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      font-size: 0.7rem;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      backdrop-filter: blur(4px);
    }

    /* Botón de WhatsApp sutil */
    .whatsapp-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: #25D366;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.2s ease;
      z-index: 3;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .whatsapp-btn:hover {
      transform: scale(1.1);
      background: #128C7E;
    }

    /* Botón de teléfono sutil */
    .phone-btn {
      position: absolute;
      bottom: 12px;
      right: 56px;
      background: var(--color-acento);
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.2s ease;
      z-index: 3;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .phone-btn:hover {
      transform: scale(1.1);
      background: var(--color-secundario);
    }

    /* Fecha más elegante */
    .aviso-fecha {
      font-size: 0.7rem;
      color: var(--color-texto-claro);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }

    /* Contenido con límite de líneas */
    .aviso-contenido-preview {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--color-texto);
    }

    /* Pie de tarjeta con metadatos */
    .aviso-footer {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--color-borde);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--color-texto-claro);
    }

    /* Urgente: borde rojo y fondo suave */
    .aviso-card.urgente {
      border-left: 4px solid #dc3545;
      background: linear-gradient(135deg, #fff5f5 0%, white 100%);
    }

    /* Imagen en la tarjeta (si tiene) */
    .aviso-imagen {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px 8px 0 0;
      margin-bottom: 0.8rem;
      background: var(--color-fondo);
    }

    /* Estado pendiente */
    .aviso-card.pendiente {
      opacity: 0.85;
      filter: grayscale(0.1);
      border-left: 4px solid #f39c12;
    }

    .pendiente-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #f39c12;
      color: white;
      font-size: 0.6rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: 600;
      z-index: 2;
    }

    /* Mejora en los filtros */
    .filtros {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filtro {
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .filtro:hover {
      transform: translateY(-2px);
    }

    /* Grid responsivo mejorado */
    .grid-avisos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* Paginación mejorada */
    .paginacion {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pagina {
      padding: 0.5rem 1rem;
      border-radius: 40px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .pagina:hover {
      transform: translateY(-2px);
    }

    /* Mensaje de carga */
    .cargando {
      text-align: center;
      padding: 3rem;
      color: var(--color-texto-claro);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid-avisos {
        grid-template-columns: 1fr;
      }

      .filtro {
        padding: 0.4rem 1rem;
        font-size: 0.75rem;
      }
    }

    /* Botón Me interesa */
    .interes-btn {
      position: absolute;
      bottom: 12px;
      right: 100px;
      background: #ff4757;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 3;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .interes-btn:hover {
      transform: scale(1.1);
      background: #e84118;
    }

    /* Estadísticas en tarjetas */
    .aviso-stats {
      display: flex;
      gap: 1rem;
      margin-top: 0.8rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--color-borde);
      font-size: 0.7rem;
      color: var(--color-texto-claro);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .stat-item.like-btn {
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 20px;
    }

    .stat-item.like-btn:hover {
      background: rgba(255, 71, 87, 0.1);
      transform: scale(1.05);
    }

    .stat-item.liked {
      color: #ff4757;
    }

    /* Comentarios flotantes */
    .comments-panel {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
    }

    .comments-panel.open {
      transform: translateY(0);
    }

    .comments-header {
      padding: 1rem;
      background: var(--color-primario);
      color: white;
      border-radius: 20px 20px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .comments-header h3 {
      margin: 0;
      font-size: 1rem;
    }

    .close-comments {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      max-height: 400px;
    }

    .comment-item {
      background: var(--color-fondo);
      border-radius: 12px;
      padding: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .comment-author {
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--color-primario);
      margin-bottom: 0.3rem;
    }

    .comment-text {
      font-size: 0.85rem;
      color: var(--color-texto);
      line-height: 1.4;
    }

    .comment-date {
      font-size: 0.6rem;
      color: var(--color-texto-claro);
      margin-top: 0.3rem;
    }

    .comment-input-area {
      padding: 1rem;
      border-top: 1px solid var(--color-borde);
      display: flex;
      gap: 0.5rem;
    }

    .comment-input-area input {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid var(--color-borde);
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .comment-input-area button {
      background: var(--color-primario);
      color: white;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <main class="contenedor">
    <!-- Filtros de categorías -->
    <div class="filtros" id="filtros">
      <button class="filtro activo" data-categoria="todos">📋 Todos</button>
      <button class="filtro" data-categoria="urgente">🚨 URGENTE</button>
      <button class="filtro" data-categoria="escuelas">🏫 ESCUELAS</button>
      <button class="filtro" data-categoria="servicios">🛠️ SERVICIOS</button>
      <button class="filtro" data-categoria="comercios">🛒 COMERCIOS</button>
      <button class="filtro" data-categoria="eventos">📅 EVENTOS</button>
      <button class="filtro" data-categoria="gobierno">🏛️ GOBIERNO</button>
      <button class="filtro" data-categoria="varios">📢 VARIOS</button>
    </div>

    <!-- Mensajes de error/info -->
    <div id="mensaje-container"></div>

    <!-- Avisos -->
    <div id="avisos-container" class="grid-avisos">
      <div class="cargando">📰 Cargando avisos...</div>
    </div>

    <!-- Paginación -->
    <div id="paginacion" class="paginacion"></div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/auth.js"></script>
  <script src="/avisos-jardines/js/app.js"></script>

  <script>
    // ========== FUNCIONES GLOBALES PARA INTERACCIÓN ==========

    // Redirigir al detalle del aviso
    window.verAviso = function (id) {
      window.location.href = `/avisos-jardines/aviso.html?id=${id}`;
    };

    // Abrir WhatsApp (evita propagación para no abrir también el aviso)
    window.abrirWhatsApp = function (numero, texto, event) {
      if (event) event.stopPropagation();
      const url = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;
      window.open(url, '_blank');
    };

    // Abrir teléfono
    window.abrirTelefono = function (numero, event) {
      if (event) event.stopPropagation();
      window.open(`tel:${numero}`, '_blank');
    };

    // ========== CARGA DE HEADER Y FOOTER ==========
    document.addEventListener('DOMContentLoaded', function () {
      // Cargar header
      fetch('/avisos-jardines/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          setTimeout(() => {
            if (typeof window.inicializarHeaderAuth === 'function') {
              window.inicializarHeaderAuth();
            }
          }, 100);
        })
        .catch(err => console.error('Error cargando header:', err));

      // Cargar footer
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footerContainer = document.getElementById('footer-container');
          if (footerContainer) {
            footerContainer.innerHTML = data;
            const anioElement = document.getElementById('anio-actual');
            if (anioElement) {
              anioElement.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando el footer:', error));
    });
  </script>

  <!-- Cookie Banner -->
  <div id="cookieBanner"
    style="position: fixed; bottom: 0; left: 0; right: 0; background: #1e4620; color: white; padding: 1rem; text-align: center; z-index: 1000; display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem;">
    <span>🍪 Usamos cookies para que la plataforma funcione bien. No vendemos tus datos.</span>
    <div>
      <button id="aceptarCookies"
        style="background: #fbbf24; border: none; padding: 0.4rem 1.2rem; border-radius: 2rem; cursor: pointer;">Aceptar</button>
      <a href="/avisos-jardines/cookies.html"
        style="background: transparent; border: 1px solid white; color: white; padding: 0.4rem 1.2rem; border-radius: 2rem; text-decoration: none; margin-left: 0.5rem;">Configurar</a>
    </div>
  </div>

  <script>
    if (localStorage.getItem('cookie_consent') === 'aceptadas') {
      document.getElementById('cookieBanner').style.display = 'none';
    }

    document.getElementById('aceptarCookies').addEventListener('click', () => {
      localStorage.setItem('cookie_consent', 'aceptadas');
      document.getElementById('cookieBanner').style.display = 'none';
    });
  </script>

  <!-- Panel de comentarios flotante -->
  <div id="comments-panel" class="comments-panel">
    <div class="comments-header">
      <h3 id="comments-title">💬 Comentarios</h3>
      <button class="close-comments" onclick="cerrarPanelComentarios()">×</button>
    </div>
    <div id="comments-list" class="comments-list">
      <div class="cargando">Cargando comentarios...</div>
    </div>
    <div class="comment-input-area">
      <input type="text" id="comment-input" placeholder="Escribe tu comentario...">
      <button onclick="enviarComentario()">Enviar</button>
    </div>
  </div>
</body>

</html>
