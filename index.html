<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Avisos Colonia Jardines PVR</title>
    <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
    <link rel="manifest" href="/avisos-jardines/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <style>
        /* ========== ESTILOS PREMIUM PARA EL INDEX ========== */

        /* Tarjetas cliqueables */
        .aviso-card {
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            animation: cardFadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes cardFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .aviso-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .aviso-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        /* Badge de categoría más elegante */
        .categoria-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 2;
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        /* Botón de WhatsApp sutil */
        .whatsapp-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background-color: #25D366;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
            z-index: 3;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png');
            background-size: 60%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
            background-color: #128C7E;
        }

        /* Botón de teléfono sutil */
        .phone-btn {
            position: absolute;
            bottom: 12px;
            right: 56px;
            background: var(--color-acento);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
            z-index: 3;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .phone-btn:hover {
            transform: scale(1.1);
            background: var(--color-secundario);
        }

        .aviso-fecha {
            font-size: 0.7rem;
            color: var(--color-texto-claro);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.5rem;
        }

        .aviso-contenido-preview {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--color-texto);
        }

        .aviso-footer {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--color-borde);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--color-texto-claro);
        }

        .aviso-card.urgente {
            border-left: 4px solid #dc3545;
            background: linear-gradient(135deg, #fff5f5 0%, white 100%);
        }

        .aviso-imagen {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 16px 16px 0 0;
            margin-bottom: 0.8rem;
            background: var(--color-fondo);
        }

        .aviso-card.pendiente {
            opacity: 0.85;
            filter: grayscale(0.1);
            border-left: 4px solid #f39c12;
        }

        .pendiente-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f39c12;
            color: white;
            font-size: 0.6rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            z-index: 2;
        }

        /* Barra superior con filtros y buscador */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filtros {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            flex: 1;
        }

        .buscador-container {
            position: relative;
            min-width: 250px;
        }

        .buscador-input {
            padding: 0.6rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--color-borde);
            width: 100%;
            font-size: 0.85rem;
            transition: var(--transition);
            background: white;
        }

        .buscador-input:focus {
            outline: none;
            border-color: var(--color-acento);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        .clear-search {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 1rem;
            display: none;
        }

        .filtro {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
            background: white;
            border: 1px solid var(--color-borde);
            cursor: pointer;
        }

        .filtro:hover {
            transform: translateY(-2px);
            border-color: var(--color-acento);
        }

        .filtro.activo {
            background: var(--color-acento);
            color: white;
            border-color: var(--color-acento);
        }

        /* Grid responsivo mejorado - 3 columnas para primeros 3, luego 4 */
        .grid-avisos {
            display: grid;
            gap: 1.5rem;
        }

        /* Para pantallas medianas y grandes */
        @media (min-width: 768px) {
            .grid-avisos.has-first-three {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Los elementos después del tercero se organizan en 4 columnas en pantallas grandes */
        @media (min-width: 1024px) {
            .grid-avisos.has-more {
                grid-template-columns: repeat(4, 1fr);
            }

            .grid-avisos.has-first-three.has-more {
                grid-template-columns: repeat(4, 1fr);
            }

            /* Los primeros 3 ocupan todo el ancho en su fila implícita */
            .grid-avisos.has-first-three .aviso-card:nth-child(-n+3) {
                grid-column: span 1;
            }
        }

        /* Para móviles: 1 columna */
        @media (max-width: 767px) {
            .grid-avisos {
                grid-template-columns: 1fr;
            }

            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .filtros {
                display: none;
            }

            .filtros.mobile-visible {
                display: flex;
            }

            .buscador-container {
                width: 100%;
            }

            .mobile-filter-toggle {
                display: block;
                background: var(--color-acento);
                color: white;
                border: none;
                padding: 0.5rem;
                border-radius: 40px;
                margin-bottom: 0.5rem;
                cursor: pointer;
            }
        }

        .mobile-filter-toggle {
            display: none;
        }

        .interes-btn {
            position: absolute;
            bottom: 12px;
            right: 100px;
            background: #ff4757;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            z-index: 3;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .interes-btn:hover {
            transform: scale(1.1);
            background: #e84118;
        }

        .aviso-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.8rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--color-borde);
            font-size: 0.7rem;
            color: var(--color-texto-claro);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            transition: var(--transition);
            padding: 0.2rem 0.4rem;
            border-radius: 20px;
        }

        .stat-item.like-btn:hover {
            background: rgba(255, 71, 87, 0.1);
            transform: scale(1.05);
        }

        .stat-item.liked {
            color: #ff4757;
        }

        .comments-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .comments-panel.open {
            transform: translateY(0);
        }

        .loader-more {
            text-align: center;
            padding: 2rem;
            color: var(--color-texto-claro);
        }

        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 1100;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div id="header-container"></div>

    <main class="contenedor">
        <div class="top-bar">
            <div class="buscador-container">
                <input type="text" id="buscador" class="buscador-input"
                    placeholder="🔍 Buscar por título, contenido, ubicación, fecha...">
                <button class="clear-search" id="clearSearch">✕</button>
            </div>
            <button class="mobile-filter-toggle" id="mobileFilterToggle">📋 Filtros</button>
            <div class="filtros" id="filtros">
                <button class="filtro activo" data-categoria="todos">📋 Todos</button>
                <button class="filtro" data-categoria="urgente">🚨 URGENTE</button>
                <button class="filtro" data-categoria="escuelas">🏫 ESCUELAS</button>
                <button class="filtro" data-categoria="servicios">🛠️ SERVICIOS</button>
                <button class="filtro" data-categoria="comercios">🛒 COMERCIOS</button>
                <button class="filtro" data-categoria="eventos">📅 EVENTOS</button>
                <button class="filtro" data-categoria="gobierno">🏛️ GOBIERNO</button>
                <button class="filtro" data-categoria="varios">📢 VARIOS</button>
            </div>
        </div>

        <div id="mensaje-container"></div>
        <div id="avisos-container" class="grid-avisos">
            <div class="cargando">📰 Cargando avisos...</div>
        </div>
        <div id="loader-more" class="loader-more" style="display: none;">📰 Cargando más avisos...</div>
    </main>

    <div id="footer-container"></div>
    <div id="toast" class="toast-notification"></div>

    <script src="/avisos-jardines/js/api.js"></script>
    <script src="/avisos-jardines/js/auth.js"></script>
    <script src="/avisos-jardines/js/app.js"></script>

    <script>
        // ========== VARIABLES GLOBALES ==========
        let avisosData = [];
        let currentUser = null;
        let likedAvisos = JSON.parse(localStorage.getItem('likedAvisos') || '{}');
        let currentAvisoIdForComments = null;
        let todosLosAvisos = [];
        let avisosFiltrados = [];
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;
        let categoriaActual = 'todos';
        let busquedaActual = '';
        let scrollListener = null;

        // ========== FUNCIONES DE ESTADÍSTICAS ==========
        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        async function registrarVista(id) {
            try {
                const api = new API();
                await api.llamar('REGISTRAR_VISTA', { id: id });
            } catch (e) { }
        }

        async function registrarClickWhatsApp(id) {
            try {
                const api = new API();
                await api.llamar('REGISTRAR_CLICK_WHATSAPP', { id: id });
            } catch (e) { }
        }

        async function registrarInteres(id) {
            try {
                const api = new API();
                const result = await api.llamar('REGISTRAR_INTERES', { id: id });
                if (result && result.success) {
                    const aviso = todosLosAvisos.find(a => a.id == id);
                    if (aviso) aviso.intereses = (aviso.intereses || 0) + 1;
                    return true;
                }
            } catch (e) { }
            return false;
        }

        // ========== FUNCIONES DE INTERACCIÓN ==========
        window.verAviso = async function (id) {
            await registrarVista(id);
            window.location.href = `/avisos-jardines/aviso.html?id=${id}`;
        };

        window.abrirWhatsApp = async function (numero, texto, id, event) {
            if (event) event.stopPropagation();
            if (id) await registrarClickWhatsApp(id);
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(texto)}`, '_blank');
        };

        window.darLike = async function (id, event) {
            if (event) event.stopPropagation();
            if (likedAvisos[id]) {
                showToast('❤️ Ya marcaste "Me interesa" en este aviso', 1500);
                return;
            }
            const success = await registrarInteres(id);
            if (success) {
                likedAvisos[id] = true;
                localStorage.setItem('likedAvisos', JSON.stringify(likedAvisos));
                showToast('👍 ¡Gracias por tu interés!', 1500);
                aplicarFiltrosYBusqueda();
            }
        };

        window.abrirComentarios = function (id, event) {
            if (event) event.stopPropagation();
            currentAvisoIdForComments = id;
            document.getElementById('comments-panel').classList.add('open');
            cargarComentarios(id);
        };

        window.cerrarPanelComentarios = function () {
            document.getElementById('comments-panel').classList.remove('open');
        };

        async function cargarComentarios(avisoId) {
            const commentsList = document.getElementById('comments-list');
            if (!commentsList) return;
            commentsList.innerHTML = '<div class="cargando">💬 Cargando comentarios...</div>';
            try {
                const resultado = await API.peticion('LISTAR_COMENTARIOS', { avisoId: avisoId });
                if (resultado && resultado.success && Array.isArray(resultado.data)) {
                    if (resultado.data.length === 0) {
                        commentsList.innerHTML = '<div style="text-align:center; color:#888;">📝 No hay comentarios aún. ¡Sé el primero!</div>';
                    } else {
                        commentsList.innerHTML = resultado.data.map(com => `
                            <div class="comment-item">
                                <div class="comment-author">${escapeHtml(com.autor || 'Anónimo')}</div>
                                <div class="comment-text">${escapeHtml(com.texto)}</div>
                                <div class="comment-date">${formatearFecha(com.fecha)}</div>
                            </div>
                        `).join('');
                    }
                } else {
                    commentsList.innerHTML = '<div style="text-align:center; color:#888;">💬 No hay comentarios aún</div>';
                }
            } catch (e) {
                commentsList.innerHTML = '<div style="text-align:center; color:#e74c3c;">❌ Error al cargar comentarios</div>';
            }
        }

        window.enviarComentario = async function () {
            const input = document.getElementById('comment-input');
            const texto = input.value.trim();
            if (!texto) {
                showToast('✏️ Escribe un comentario primero', 1500);
                return;
            }
            if (!currentAvisoIdForComments) return;
            const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
            const autor = usuario.nombre || usuario.email || 'Anónimo';
            try {
                const api = new API();
                const result = await api.llamar('AGREGAR_COMENTARIO', {
                    avisoId: currentAvisoIdForComments,
                    texto: texto,
                    autor: autor
                });
                if (result && result.success) {
                    input.value = '';
                    showToast('💬 Comentario enviado', 1500);
                    cargarComentarios(currentAvisoIdForComments);
                }
            } catch (e) { }
        };

        // ========== FUNCIONES AUXILIARES ==========
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatearFecha(fechaStr) {
            if (!fechaStr) return 'Reciente';
            try {
                return new Date(fechaStr).toLocaleDateString('es-MX');
            } catch { return fechaStr; }
        }

        function buscarEnAviso(aviso, termino) {
            if (!termino) return true;
            const lowerTerm = termino.toLowerCase();
            const campos = [
                aviso.titulo, aviso.contenido, aviso.categoria, aviso.ubicacion,
                aviso.contacto, aviso.created_at, aviso.autor_nombre
            ];
            return campos.some(campo => campo && campo.toString().toLowerCase().includes(lowerTerm));
        }

        function aplicarFiltrosYBusqueda() {
            let resultado = [...todosLosAvisos];
            if (categoriaActual !== 'todos') {
                resultado = resultado.filter(a => a.categoria === categoriaActual);
            }
            if (busquedaActual.trim()) {
                resultado = resultado.filter(a => buscarEnAviso(a, busquedaActual));
            }
            avisosFiltrados = resultado;
            currentPage = 1;
            hasMore = true;
            renderizarAvisosConScroll();
        }

        function renderizarAvisosConScroll() {
            const itemsPerPage = 20;
            const start = 0;
            const end = currentPage * itemsPerPage;
            const avisosAMostrar = avisosFiltrados.slice(start, end);
            hasMore = end < avisosFiltrados.length;
            renderizarAvisos(avisosAMostrar);

            if (!hasMore && document.getElementById('loader-more')) {
                document.getElementById('loader-more').style.display = 'none';
            }
        }

        function cargarMasAvisos() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            const loader = document.getElementById('loader-more');
            if (loader) loader.style.display = 'block';

            setTimeout(() => {
                currentPage++;
                const itemsPerPage = 20;
                const end = currentPage * itemsPerPage;
                const nuevosAvisos = avisosFiltrados.slice(0, end);
                renderizarAvisos(nuevosAvisos, true);
                hasMore = end < avisosFiltrados.length;
                isLoading = false;
                if (loader) loader.style.display = hasMore ? 'none' : 'none';
            }, 300);
        }

        function renderizarAvisos(avisos, esCargaIncremental = false) {
            const container = document.getElementById('avisos-container');
            if (!container) return;

            const avisosHTML = avisos.map((aviso, index) => `
                <div class="aviso-card ${aviso.categoria === 'urgente' ? 'urgente' : ''}" 
                     data-id="${aviso.id}"
                     onclick="verAviso('${aviso.id}')"
                     style="animation-delay: ${Math.min(index * 0.03, 0.5)}s">
                    <div class="categoria-badge" style="background: ${getColorCategoria(aviso.categoria)}; color: white;">
                        ${getIconoCategoria(aviso.categoria)} ${aviso.categoria?.toUpperCase() || 'GENERAL'}
                    </div>
                    ${aviso.imagen_url ? `<img src="${aviso.imagen_url}" class="aviso-imagen" alt="${escapeHtml(aviso.titulo)}" loading="lazy">` : ''}
                    <div style="padding: 1rem;">
                        <div class="aviso-fecha">📅 ${formatearFecha(aviso.created_at)}</div>
                        <h3 style="margin: 0 0 0.5rem 0; font-size: 1.1rem;">${escapeHtml(aviso.titulo)}</h3>
                        <div class="aviso-contenido-preview">${escapeHtml((aviso.contenido || '').substring(0, 150))}${(aviso.contenido || '').length > 150 ? '...' : ''}</div>
                        <div class="aviso-stats">
                            <span class="stat-item">👁️ <span class="stat-value">${aviso.vistas || 0}</span></span>
                            <span class="stat-item like-btn ${likedAvisos[aviso.id] ? 'liked' : ''}" data-id="${aviso.id}" onclick="darLike('${aviso.id}', event)">❤️ <span class="stat-value">${aviso.intereses || 0}</span></span>
                            <span class="stat-item" onclick="abrirComentarios('${aviso.id}', event)">💬 <span class="stat-value">0</span></span>
                        </div>
                        <div class="aviso-footer"><span>📍 ${aviso.ubicacion || 'Jardines PVR'}</span></div>
                    </div>
                    ${aviso.contacto ? `<button class="whatsapp-btn" onclick="abrirWhatsApp('${aviso.contacto}', '${encodeURIComponent('Hola, vi tu aviso en Jardines PVR: ' + aviso.titulo)}', '${aviso.id}', event)">💬</button>` : ''}
                    <button class="interes-btn" onclick="darLike('${aviso.id}', event)">❤️</button>
                </div>
            `).join('');

            if (!esCargaIncremental) {
                container.innerHTML = avisosHTML;
            } else {
                container.insertAdjacentHTML('beforeend', avisosHTML);
                const newCards = container.querySelectorAll('.aviso-card:not(.visible)');
                newCards.forEach(card => {
                    card.classList.add('visible');
                });
            }

            // Aplicar grid dinámico según cantidad de avisos
            const hasFirstThree = avisos.length >= 3;
            const hasMoreThanThree = avisos.length > 3;
            container.classList.toggle('has-first-three', hasFirstThree);
            container.classList.toggle('has-more', hasMoreThanThree);

            // Forzar visibilidad de todas las tarjetas
            document.querySelectorAll('.aviso-card').forEach(card => card.classList.add('visible'));
        }

        function getIconoCategoria(cat) {
            const iconos = { urgente: '⚠️', escuelas: '🏫', servicios: '🛠️', comercios: '🛒', eventos: '📅', gobierno: '🏛️', varios: '📢' };
            return iconos[cat] || '📄';
        }

        function getColorCategoria(cat) {
            const colores = { urgente: '#dc3545', escuelas: '#3498db', servicios: '#f39c12', comercios: '#27ae60', eventos: '#9b59b6', gobierno: '#1abc9c', varios: '#7f8c8d' };
            return colores[cat] || '#95a5a6';
        }

        // ========== CARGA INICIAL ==========
        async function cargarAvisosIniciales() {
            const container = document.getElementById('avisos-container');
            container.innerHTML = '<div class="cargando">📰 Cargando avisos...</div>';
            try {
                const resultado = await API.listar('AVISOS', {}, { pagina: 1, limite: 200 });
                if (resultado && resultado.datos) {
                    todosLosAvisos = resultado.datos.filter(a => a.status === 'activo' || !a.status);
                    aplicarFiltrosYBusqueda();
                } else {
                    container.innerHTML = '<div class="mensaje mensaje-info">📭 No hay avisos disponibles</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="mensaje mensaje-error">❌ Error al cargar avisos</div>';
            }
        }

        // ========== EVENTOS Y FILTROS ==========
        function initFiltrosYBuscador() {
            const filtros = document.querySelectorAll('.filtro');
            filtros.forEach(filtro => {
                filtro.addEventListener('click', () => {
                    filtros.forEach(f => f.classList.remove('activo'));
                    filtro.classList.add('activo');
                    categoriaActual = filtro.dataset.categoria;
                    aplicarFiltrosYBusqueda();
                });
            });

            const buscador = document.getElementById('buscador');
            const clearBtn = document.getElementById('clearSearch');
            buscador.addEventListener('input', (e) => {
                busquedaActual = e.target.value;
                clearBtn.style.display = busquedaActual ? 'block' : 'none';
                aplicarFiltrosYBusqueda();
            });
            clearBtn.addEventListener('click', () => {
                buscador.value = '';
                busquedaActual = '';
                clearBtn.style.display = 'none';
                aplicarFiltrosYBusqueda();
            });

            // Scroll infinito
            scrollListener = () => {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;
                if (scrollTop + windowHeight >= documentHeight - 300) {
                    cargarMasAvisos();
                }
            };
            window.addEventListener('scroll', scrollListener);

            // Menú móvil para filtros
            const mobileToggle = document.getElementById('mobileFilterToggle');
            const filtrosContainer = document.getElementById('filtros');
            if (mobileToggle) {
                mobileToggle.addEventListener('click', () => {
                    filtrosContainer.classList.toggle('mobile-visible');
                });
            }
        }

        // ========== INICIALIZACIÓN ==========
        document.addEventListener('DOMContentLoaded', function () {
            initFiltros();
            cargarAvisos();

            // Cargar header
            fetch('/avisos-jardines/common/header.html')
                .then(res => {
                    if (!res.ok) throw new Error('Header no encontrado');
                    return res.text();
                })
                .then(html => {
                    document.getElementById('header-container').innerHTML = html;
                    setTimeout(() => {
                        if (typeof window.inicializarHeaderAuth === 'function') {
                            window.inicializarHeaderAuth();
                        }
                    }, 100);
                })
                .catch(err => console.error('Error cargando header:', err));

            // Cargar footer
            fetch('/avisos-jardines/common/footer.html')
                .then(response => {
                    if (!response.ok) throw new Error('Footer no encontrado');
                    return response.text();
                })
                .then(data => {
                    const footerContainer = document.getElementById('footer-container');
                    if (footerContainer) {
                        footerContainer.innerHTML = data;
                        const anioElement = document.getElementById('anio-actual');
                        if (anioElement) {
                            anioElement.textContent = new Date().getFullYear();
                        }
                    }
                })
                .catch(error => console.error('Error cargando el footer:', error));
        });
    </script>
