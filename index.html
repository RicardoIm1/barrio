<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>BARRIO - Avisos de tu colonia</title>
  <link rel="stylesheet" href="/barrio/css/estilo.css">
  <link rel="manifest" href="/barrio/manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <style>
    /* Estilos para las tarjetas de avisos */
    .avisos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      padding: 1rem;
    }
    
    .aviso-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #e9ecef;
    }
    
    .aviso-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    
    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #f8f9fa;
    }
    
    .card-content {
      padding: 1rem;
    }
    
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #1a2a3a;
    }
    
    .card-preview {
      font-size: 0.85rem;
      color: #6c757d;
      margin-bottom: 1rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-stats {
      display: flex;
      gap: 1rem;
      padding: 0.5rem 0;
      border-top: 1px solid #e9ecef;
      border-bottom: 1px solid #e9ecef;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
    }
    
    .card-stat {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #6c757d;
    }
    
    .card-stat-value {
      font-weight: 600;
      color: #1e4620;
    }
    
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    
    .card-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #e9ecef;
      background: white;
      color: #495057;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .card-btn.liked {
      background: #ff4757;
      border-color: #ff4757;
      color: white;
    }
    
    .card-btn.disliked {
      background: #7f8c8d;
      border-color: #7f8c8d;
      color: white;
    }
    
    .card-btn:hover {
      transform: translateY(-2px);
    }
    
    .card-btn.whatsapp:hover {
      background: #25D366;
      border-color: #25D366;
      color: white;
    }
    
    .btn-leer-mas {
      background: #1e4620;
      color: white;
      border: none;
    }
    
    .btn-leer-mas:hover {
      background: #2a5e2c;
    }
    
    .categoria-badge {
      display: inline-block;
      font-size: 0.6rem;
      text-transform: uppercase;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }
    
    .categoria-urgente { background: #c0392b; color: white; }
    .categoria-eventos { background: #3498db; color: white; }
    .categoria-servicios { background: #2ecc71; color: white; }
    .categoria-comercios { background: #f39c12; color: white; }
    .categoria-default { background: #95a5a6; color: white; }
    
    .loading-spinner {
      text-align: center;
      padding: 3rem;
      color: #6c757d;
    }
    
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      flex-wrap: wrap;
      background: white;
      border-radius: 12px;
      margin: 1rem;
    }
    
    .filter-btn {
      padding: 0.5rem 1rem;
      border-radius: 24px;
      border: 1px solid #e9ecef;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-btn.active {
      background: #1e4620;
      color: white;
      border-color: #1e4620;
    }
    
    @media (max-width: 768px) {
      .avisos-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  
  <main>
    <div class="filter-bar">
      <button class="filter-btn active" data-categoria="todos">📱 Todos</button>
      <button class="filter-btn" data-categoria="urgente">⚠️ Urgentes</button>
      <button class="filter-btn" data-categoria="eventos">🎉 Eventos</button>
      <button class="filter-btn" data-categoria="servicios">🔧 Servicios</button>
      <button class="filter-btn" data-categoria="comercios">🏪 Comercios</button>
    </div>
    
    <div id="avisos-container" class="avisos-grid">
      <div class="loading-spinner">📰 Cargando avisos...</div>
    </div>
  </main>
  
  <div id="toast" class="toast-notification" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(0,0,0,0.85);color:white;padding:10px 24px;border-radius:40px;font-size:0.9rem;z-index:1100;transition:transform 0.3s ease;pointer-events:none;"></div>
  
  <script src="/barrio/js/api.js"></script>
  <script src="/barrio/js/ui.js"></script>
  <script src="/barrio/js/auth.js"></script>
  
  <script>
    function escapeHTML(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    function showToast(message, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.transform = 'translateX(-50%) translateY(0)';
      setTimeout(() => {
        toast.style.transform = 'translateX(-50%) translateY(100px)';
      }, duration);
    }
    
    let todosLosAvisos = [];
    let categoriaActual = 'todos';
    let reaccionesUsuario = {}; // { avisoId: { liked, disliked } }
    
    async function cargarAvisos() {
      const container = document.getElementById('avisos-container');
      container.innerHTML = '<div class="loading-spinner">📰 Cargando avisos...</div>';
      
      try {
        const resultado = await API.listarPublicos({}, { pagina: 1, limite: 500 });
        todosLosAvisos = resultado.datos || [];
        
        // Cargar las reacciones del usuario para todos los avisos
        await cargarReaccionesUsuario();
        
        // Cargar estadísticas actualizadas (vistas, likes, dislikes, comentarios)
        await cargarEstadisticasTodos();
        
        filtrarYRenderizar();
      } catch (error) {
        console.error('Error cargando avisos:', error);
        container.innerHTML = '<div class="loading-spinner">❌ Error al cargar avisos</div>';
      }
    }
    
    async function cargarReaccionesUsuario() {
      try {
        const apiKey = localStorage.getItem('api_key');
        if (!apiKey) return;
        
        for (const aviso of todosLosAvisos) {
          try {
            const resultado = await API.peticion('VERIFICAR_REACCIONES', { id: aviso.id }, apiKey);
            if (resultado && resultado.success) {
              reaccionesUsuario[aviso.id] = {
                liked: resultado.data.liked || false,
                disliked: resultado.data.disliked || false
              };
            }
          } catch (e) {
            // Si falla uno, seguir con los demás
          }
        }
      } catch (e) {
        console.warn('Error cargando reacciones:', e);
      }
    }
    
    async function cargarEstadisticasTodos() {
      try {
        const apiKey = localStorage.getItem('api_key');
        for (let i = 0; i < todosLosAvisos.length; i++) {
          const aviso = todosLosAvisos[i];
          try {
            const resultado = await API.peticion('OBTENER_ESTADISTICAS', { id: aviso.id }, apiKey);
            if (resultado && resultado.success) {
              aviso.vistas = resultado.data.vistas || 0;
              aviso.likes = resultado.data.likes || 0;
              aviso.dislikes = resultado.data.dislikes || 0;
              aviso.comentarios = resultado.data.comentarios || 0;
            }
          } catch (e) {
            // Mantener valores existentes
          }
        }
      } catch (e) {
        console.warn('Error cargando estadísticas:', e);
      }
    }
    
    async function registrarVista(avisoId) {
      try {
        const apiKey = localStorage.getItem('api_key');
        await API.peticion('REGISTRAR_VISTA', { id: avisoId }, apiKey);
      } catch (e) {
        console.warn('Error registrando vista:', e);
      }
    }
    
    async function toggleLike(avisoId, event) {
      event.stopPropagation();
      const likeBtn = event.currentTarget;
      const dislikeBtn = likeBtn.parentElement.querySelector('.dislike-btn');
      const likesSpan = likeBtn.parentElement.parentElement.querySelector('.likes-count');
      const dislikesSpan = likeBtn.parentElement.parentElement.querySelector('.dislikes-count');
      
      const isLiked = likeBtn.classList.contains('liked');
      const isDisliked = dislikeBtn && dislikeBtn.classList.contains('disliked');
      
      try {
        const apiKey = localStorage.getItem('api_key');
        
        // Si tiene dislike, lo quitamos primero
        if (isDisliked) {
          await API.peticion('QUITAR_DISLIKE', { id: avisoId }, apiKey);
          dislikeBtn.classList.remove('disliked');
          if (dislikesSpan) {
            dislikesSpan.textContent = Math.max(0, (parseInt(dislikesSpan.textContent) || 0) - 1);
          }
        }
        
        // Procesar el like
        const endpoint = isLiked ? 'QUITAR_LIKE' : 'DAR_LIKE';
        const result = await API.peticion(endpoint, { id: avisoId }, apiKey);
        
        if (result && result.success) {
          if (isLiked) {
            likeBtn.classList.remove('liked');
            if (likesSpan) likesSpan.textContent = Math.max(0, (parseInt(likesSpan.textContent) || 0) - 1);
            showToast('❤️ Ya no te gusta', 1000);
          } else {
            likeBtn.classList.add('liked');
            if (likesSpan) likesSpan.textContent = (parseInt(likesSpan.textContent) || 0) + 1;
            showToast('👍 ¡Te gusta!', 1000);
          }
          
          // Actualizar el objeto local
          if (!reaccionesUsuario[avisoId]) reaccionesUsuario[avisoId] = { liked: false, disliked: false };
          reaccionesUsuario[avisoId].liked = !isLiked;
          reaccionesUsuario[avisoId].disliked = false;
        }
      } catch (e) {
        console.warn('Error en like:', e);
        showToast('❌ Error al procesar', 1500);
      }
    }
    
    async function toggleDislike(avisoId, event) {
      event.stopPropagation();
      const dislikeBtn = event.currentTarget;
      const likeBtn = dislikeBtn.parentElement.querySelector('.like-btn');
      const likesSpan = dislikeBtn.parentElement.parentElement.querySelector('.likes-count');
      const dislikesSpan = dislikeBtn.parentElement.parentElement.querySelector('.dislikes-count');
      
      const isDisliked = dislikeBtn.classList.contains('disliked');
      const isLiked = likeBtn && likeBtn.classList.contains('liked');
      
      try {
        const apiKey = localStorage.getItem('api_key');
        
        // Si tiene like, lo quitamos primero
        if (isLiked) {
          await API.peticion('QUITAR_LIKE', { id: avisoId }, apiKey);
          likeBtn.classList.remove('liked');
          if (likesSpan) likesSpan.textContent = Math.max(0, (parseInt(likesSpan.textContent) || 0) - 1);
        }
        
        // Procesar el dislike
        const endpoint = isDisliked ? 'QUITAR_DISLIKE' : 'DAR_DISLIKE';
        const result = await API.peticion(endpoint, { id: avisoId }, apiKey);
        
        if (result && result.success) {
          if (isDisliked) {
            dislikeBtn.classList.remove('disliked');
            if (dislikesSpan) dislikesSpan.textContent = Math.max(0, (parseInt(dislikesSpan.textContent) || 0) - 1);
            showToast('👎 Ya no te disgusta', 1000);
          } else {
            dislikeBtn.classList.add('disliked');
            if (dislikesSpan) dislikesSpan.textContent = (parseInt(dislikesSpan.textContent) || 0) + 1;
            showToast('👎 Te disgusta', 1000);
          }
          
          // Actualizar el objeto local
          if (!reaccionesUsuario[avisoId]) reaccionesUsuario[avisoId] = { liked: false, disliked: false };
          reaccionesUsuario[avisoId].disliked = !isDisliked;
          reaccionesUsuario[avisoId].liked = false;
        }
      } catch (e) {
        console.warn('Error en dislike:', e);
        showToast('❌ Error al procesar', 1500);
      }
    }
    
    async function registrarClickWhatsApp(avisoId, event) {
      event.stopPropagation();
      try {
        await API.peticion('REGISTRAR_CLICK_WHATSAPP', { id: avisoId });
        showToast('📱 Abriendo WhatsApp...', 1000);
      } catch (e) {
        console.warn('Error registrando click:', e);
      }
    }
    
    function verAviso(id) {
      registrarVista(id);
      window.location.href = `/barrio/aviso.html?id=${id}`;
    }
    
    function getCategoriaClass(categoria) {
      const classes = {
        'urgente': 'categoria-urgente',
        'eventos': 'categoria-eventos',
        'servicios': 'categoria-servicios',
        'comercios': 'categoria-comercios'
      };
      return classes[categoria] || 'categoria-default';
    }
    
    function getCategoriaTexto(categoria) {
      const textos = {
        'urgente': '⚠️ URGENTE',
        'eventos': '🎉 EVENTO',
        'servicios': '🔧 SERVICIO',
        'comercios': '🏪 COMERCIO',
        'gobierno': '🏛️ GOBIERNO',
        'escuelas': '📚 ESCUELA',
        'varios': '📌 VARIOS'
      };
      return textos[categoria] || categoria?.toUpperCase() || '📌 GENERAL';
    }
    
    function filtrarYRenderizar() {
      let avisosFiltrados = todosLosAvisos;
      
      if (categoriaActual !== 'todos') {
        avisosFiltrados = todosLosAvisos.filter(a => a.categoria === categoriaActual);
      }
      
      // Ordenar por fecha (más reciente primero)
      avisosFiltrados.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      
      renderizarAvisos(avisosFiltrados);
    }
    
    function renderizarAvisos(avisos) {
      const container = document.getElementById('avisos-container');
      
      if (!avisos.length) {
        container.innerHTML = '<div class="loading-spinner">📭 No hay avisos en esta categoría</div>';
        return;
      }
      
      container.innerHTML = avisos.map(aviso => {
        const tieneContacto = aviso.contacto && aviso.contacto.trim();
        const numero = tieneContacto ? String(aviso.contacto).replace(/[^0-9]/g, '') : '';
        const mensaje = encodeURIComponent(`Hola, vi tu aviso "${aviso.titulo}" en BARRIO. Me interesa.`);
        const whatsappUrl = tieneContacto ? `https://wa.me/52${numero}?text=${mensaje}` : '#';
        
        const reaccion = reaccionesUsuario[aviso.id] || { liked: false, disliked: false };
        const likes = aviso.likes || 0;
        const dislikes = aviso.dislikes || 0;
        const vistas = aviso.vistas || 0;
        const comentarios = aviso.comentarios || 0;
        
        let preview = aviso.contenido ? aviso.contenido.replace(/<[^>]*>/g, '').substring(0, 120) : 'Sin contenido';
        if (preview.length >= 120) preview += '...';
        
        return `
          <div class="aviso-card" onclick="verAviso(${aviso.id})">
            ${aviso.imagen_url ? `<img src="${escapeHTML(aviso.imagen_url)}" class="card-image" loading="lazy" onerror="this.style.display='none'">` : ''}
            <div class="card-content">
              <div class="categoria-badge ${getCategoriaClass(aviso.categoria)}">${getCategoriaTexto(aviso.categoria)}</div>
              <h3 class="card-title">${escapeHTML(aviso.titulo)}</h3>
              <div class="card-preview">${escapeHTML(preview)}</div>
              
              <div class="card-stats">
                <div class="card-stat">👁️ <span class="card-stat-value vistas-count">${vistas}</span></div>
                <div class="card-stat">❤️ <span class="card-stat-value likes-count">${likes}</span></div>
                <div class="card-stat">👎 <span class="card-stat-value dislikes-count">${dislikes}</span></div>
                <div class="card-stat">💬 <span class="card-stat-value comments-count">${comentarios}</span></div>
              </div>
              
              <div class="card-actions">
                <button class="card-btn like-btn ${reaccion.liked ? 'liked' : ''}" onclick="toggleLike(${aviso.id}, event)">❤️ Me gusta</button>
                <button class="card-btn dislike-btn ${reaccion.disliked ? 'disliked' : ''}" onclick="toggleDislike(${aviso.id}, event)">👎 No me gusta</button>
                ${tieneContacto ? `<a href="${whatsappUrl}" class="card-btn whatsapp" target="_blank" onclick="registrarClickWhatsApp(${aviso.id}, event)">📱 WhatsApp</a>` : ''}
                <button class="card-btn btn-leer-mas" onclick="verAviso(${aviso.id})">📖 Leer más</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Filtrar por categoría
    document.addEventListener('DOMContentLoaded', function() {
      // Cargar header
      fetch('/barrio/common/header.html').then(res => res.ok ? res.text() : Promise.reject()).then(html => {
        document.getElementById('header-container').innerHTML = html;
        setTimeout(() => {
          if (typeof window.inicializarHeaderAuth === 'function') window.inicializarHeaderAuth();
        }, 100);
      }).catch(err => console.error('Error cargando header:', err));
      
      // Configurar filtros
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          categoriaActual = btn.dataset.categoria;
          filtrarYRenderizar();
        });
      });
      
      // Cargar avisos
      cargarAvisos();
    });
    
    // Exponer funciones globalmente
    window.toggleLike = toggleLike;
    window.toggleDislike = toggleDislike;
    window.registrarClickWhatsApp = registrarClickWhatsApp;
    window.verAviso = verAviso;
    
    // Actualizar header según autenticación
    (function() {
      function forzarActualizarHeader() {
        const usuarioStr = localStorage.getItem('usuario'), apiKey = localStorage.getItem('api_key');
        const loginLink = document.getElementById('login-link'), userArea = document.getElementById('user-area'), userNameSpan = document.getElementById('user-name'), perfilLink = document.getElementById('perfil-link'), cerrarBtn = document.getElementById('cerrar-sesion');
        if (!loginLink) { setTimeout(forzarActualizarHeader, 200); return; }
        if (usuarioStr && apiKey) {
          try {
            const usuario = JSON.parse(usuarioStr);
            loginLink.style.display = 'none'; userArea.style.display = 'flex';
            if (userNameSpan) userNameSpan.textContent = `👋 ${usuario.nombre || usuario.email || 'Usuario'}`;
            if (perfilLink) perfilLink.onclick = (e) => { e.preventDefault(); window.location.href = '/barrio/perfil.html'; };
            if (cerrarBtn) { const nuevoCerrar = cerrarBtn.cloneNode(true); cerrarBtn.parentNode.replaceChild(nuevoCerrar, cerrarBtn); nuevoCerrar.addEventListener('click', (e) => { e.preventDefault(); localStorage.removeItem('usuario'); localStorage.removeItem('api_key'); window.location.href = '/barrio/index.html'; }); }
          } catch (e) { console.error(e); }
        } else { loginLink.style.display = 'inline-flex'; userArea.style.display = 'none'; }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', forzarActualizarHeader);
      else setTimeout(forzarActualizarHeader, 100);
      setTimeout(forzarActualizarHeader, 500);
      setTimeout(forzarActualizarHeader, 1000);
    })();
  </script>
</body>
</html>
