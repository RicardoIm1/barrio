<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Avisos Jardines</title>
  <style>
    body { font-family: sans-serif; margin: 20px; background: #f9f9f9; }
    .aviso { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
    .titulo { font-weight: bold; font-size: 1.2em; }
    .fecha { color: gray; font-size: 0.9em; }
    .categoria { font-style: italic; color: #555; }
    .prioridad { font-weight: bold; color: darkred; }
  </style>
</head>
<body>
  <h1>Avisos de la Colonia Jardines</h1>
  <div id="avisos"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzfHel-cMAp4tSyDt_a1w8HZ8G0u5yI4aEf6S32rVW8U2VqFYWY25jDQNuC0pU8SVTHWg/exec";

    function cargarAvisos() {
      const script = document.createElement("script");
      script.src = `${API_URL}?action=read&callback=mostrarAvisos`;
      document.body.appendChild(script);
    }

    function mostrarAvisos(avisos) {
      const contenedor = document.getElementById("avisos");
      contenedor.innerHTML = "";

      avisos.forEach(aviso => {
        const div = document.createElement("div");
        div.className = "aviso";
        div.innerHTML = `
          <div class="titulo">${aviso.Titulo}</div>
          <div class="descripcion">${aviso.Descripcion}</div>
          <div class="categoria">Categoría: ${aviso.Categoria}</div>
          <div class="prioridad">Prioridad: ${aviso.Prioridad}</div>
          <div class="fecha">Publicado: ${new Date(aviso.FechaCreacion).toLocaleString()}</div>
          <div class="autor">Por: ${aviso.Autor}</div>
        `;
        contenedor.appendChild(div);
      });
    }

    cargarAvisos();
  </script>
</body>
</html>
