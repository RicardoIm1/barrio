<!DOCTYPE html>
<html lang="es-MX">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Aviso - EL BARRIO</title>
    <link rel="shortcut icon" href="/barrio/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/barrio/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/barrio/css/estilo.css">
    <link rel="manifest" href="/barrio/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <style>
        .aviso-paper {
            max-width: 960px;
            margin: 2rem auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid #e9ecef;
        }

        .article-header {
            padding: 2rem 2.5rem 1rem;
            border-bottom: 2px solid #f5b042;
            background: white;
        }

        .article-category {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            padding: 0.2rem 0.8rem;
            background: #f5b042;
            color: white;
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        .article-category.urgente {
            background: #c0392b;
        }

        .article-category.pendiente {
            background: #f39c12;
        }

        .article-title {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0.5rem 0 1rem;
            color: #1a2a3a;
        }

        .featured-video-container {
            position: relative;
            background: #000;
            width: 100%;
        }

        .featured-video {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: #000;
        }

        .featured-image-container {
            position: relative;
            background: #1a1a2e;
        }

        .featured-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 0.8rem 0;
            margin: 0.5rem 0 0;
            color: #6c757d;
            font-size: 0.8rem;
            border-top: 1px solid #e9ecef;
            border-bottom: 1px solid #e9ecef;
        }

        .article-meta span {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .article-body {
            padding: 2rem 2.5rem;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #2c3e2f;
        }

        /* NUEVO: Contenedor de publicidad donde antes estaba article-actions */
        .ad-container {
            padding: 1rem 2.5rem 2rem;
            background: linear-gradient(135deg, #fef9e6 0%, #fff9ef 100%);
            border-top: 2px dashed #f5b042;
            border-bottom: 2px dashed #f5b042;
            margin: 0;
            text-align: center;
        }

        .ad-content {
            max-width: 100%;
            margin: 0 auto;
        }

        .ad-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f5b042;
            font-weight: 600;
            margin-bottom: 0.8rem;
            display: inline-block;
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 20px;
        }

        /* Ejemplo de banner publicitario */
        .demo-ad {
            background: #2c3e50;
            color: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            font-size: 0.9rem;
        }

        .demo-ad a {
            color: #f5b042;
            text-decoration: none;
            font-weight: bold;
        }

        .demo-ad a:hover {
            text-decoration: underline;
        }

        .gallery-section {
            margin: 1.5rem 0;
        }

        .gallery-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.8rem;
        }

        .gallery-item {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img,
        .lightbox video {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* NUEVO ESTILO: stats-row como barra de acciones */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0 1.5rem 0;
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, #f8f9fa 0%, #f1f3f5 100%);
            border-radius: 60px;
            border: 1px solid #e9ecef;
        }

        .stat-item {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: white;
            padding: 0.4rem 0.9rem;
            border-radius: 40px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            border: 1px solid transparent;
        }

        .stat-item.action-btn {
            cursor: pointer;
            background: white;
            border-color: #e2e6ea;
        }

        .stat-item.action-btn:hover {
            transform: translateY(-2px);
            background: #fff;
            border-color: #f5b042;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-item.liked {
            background: #ff4757;
            border-color: #ff4757;
            color: white;
        }

        .stat-item.liked .stat-value,
        .stat-item.liked .stat-icon {
            color: white;
        }

        .stat-item.disliked {
            background: #7f8c8d;
            border-color: #7f8c8d;
            color: white;
        }

        .stat-item.disliked .stat-value,
        .stat-item.disliked .stat-icon {
            color: white;
        }

        .stat-item.admin-action {
            background: #1e4620;
            border-color: #1e4620;
        }

        .stat-item.admin-action .stat-value,
        .stat-item.admin-action .stat-icon {
            color: white;
        }

        .stat-item.whatsapp-btn {
            background: #25D366;
            border-color: #25D366;
            color: white;
        }

        .stat-item.whatsapp-btn .stat-value,
        .stat-item.whatsapp-btn .stat-icon {
            color: white;
        }

        .back-link {
            margin-left: auto;
            background: transparent;
            border: 1px solid #ced4da;
            color: #1a2a3a;
            text-decoration: none;
        }

        .back-link:hover {
            background: #e9ecef;
            transform: translateY(-1px);
        }

        .stat-icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        .stat-value {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e4620;
        }

        .stat-label {
            display: none;
        }

        .comments-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            z-index: 1001;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .comments-panel.open {
            transform: translateY(0);
        }

        .comments-header {
            padding: 1rem;
            background: #1e4620;
            color: white;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .comments-header h3 {
            margin: 0;
            font-size: 1rem;
        }

        .close-comments {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            max-height: 400px;
        }

        .comment-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .comment-author {
            font-weight: 700;
            font-size: 0.8rem;
            color: #1e4620;
            margin-bottom: 0.3rem;
        }

        .comment-text {
            font-size: 0.85rem;
            color: #333;
            line-height: 1.4;
        }

        .comment-date {
            font-size: 0.6rem;
            color: #888;
            margin-top: 0.3rem;
        }

        .comment-input-area {
            padding: 1rem;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 0.5rem;
        }

        .comment-input-area input {
            flex: 1;
            padding: 0.6rem;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .comment-input-area button {
            background: #1e4620;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 20px;
            cursor: pointer;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1100;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6c757d;
            font-size: 1.1rem;
        }

        .error-message {
            background: #fef2e8;
            border-left: 4px solid #c0392b;
            padding: 1.2rem;
            margin: 2rem;
            border-radius: 8px;
            color: #c0392b;
        }

        @media (max-width: 768px) {
            .aviso-paper {
                margin: 1rem;
            }

            .article-title {
                font-size: 1.5rem;
            }

            .article-header,
            .article-body {
                padding: 1.2rem;
            }

            .ad-container {
                padding: 1rem 1.2rem;
            }

            .article-meta {
                gap: 1rem;
                font-size: 0.7rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 0.5rem;
            }

            .stats-row {
                gap: 0.4rem;
                padding: 0.5rem;
                border-radius: 30px;
                flex-wrap: wrap;
            }

            .stat-item {
                padding: 0.3rem 0.7rem;
            }

            .featured-video {
                max-height: 300px;
            }

            .featured-image {
                max-height: 300px;
            }

            .comments-panel {
                max-width: 100%;
            }

            .back-link {
                margin-left: 0;
            }
        }

        .whatsapp-btn {
            background-color: #25D366;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png');
            background-size: 55%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .whatsapp-btn:hover {
            transform: scale(1.12);
            background-color: #128C7E;
        }

        /* Botón WhatsApp flotante para vista detalle */
        .whatsapp-btn-detalle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin: 16px 0;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            width: auto;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png');
            background-size: 24px;
            background-position: 16px center;
            background-repeat: no-repeat;
            padding-left: 52px;
        }

        .whatsapp-btn-detalle:hover {
            transform: scale(1.02);
            background-color: #128C7E;
        }
    </style>
</head>

<body>
    <div id="header-container"></div>
    <main>
        <div id="aviso-container" class="aviso-paper">
            <div class="loading-state">📰 Cargando aviso... ⏳</div>
        </div>
    </main>
    <div id="lightbox" class="lightbox" onclick="cerrarLightbox()">
        <span class="lightbox-close">&times;</span>
        <div id="lightbox-content"></div>
    </div>
    <div id="toast" class="toast-notification"></div>

    <div id="comments-panel" class="comments-panel">
        <div class="comments-header">
            <h3>💬 Comentarios</h3>
            <button class="close-comments" onclick="cerrarPanelComentarios()">×</button>
        </div>
        <div id="comments-list" class="comments-list">
            <div class="cargando">Cargando comentarios...</div>
        </div>
        <div class="comment-input-area">
            <input type="text" id="comment-input" placeholder="Escribe tu comentario...">
            <button onclick="enviarComentario()">Enviar</button>
        </div>
    </div>

    <script src="/barrio/js/api.js"></script>
    <script src="/barrio/js/ui.js"></script>
    <script src="/barrio/js/auth.js"></script>

    <script>
        // ========== FUNCIONES UTILITARIAS ==========
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatearContenido(texto) {
            if (!texto) return '<p>Sin contenido</p>';
            const stringTexto = String(texto);
            const parrafos = stringTexto.split(/\n\s*\n/);
            return parrafos.map(p => `<p>${escapeHTML(p).replace(/\n/g, '<br>')}</p>`).join('');
        }

        function formatearFecha(fechaStr) {
            if (!fechaStr) return 'Fecha desconocida';
            try {
                let fecha = fechaStr;
                if (typeof fechaStr === 'string') {
                    let fechaParseada = new Date(fechaStr);
                    if (!isNaN(parseFloat(fechaStr)) && isFinite(fechaStr)) {
                        const fechaExcel = new Date((parseFloat(fechaStr) - 25569) * 86400000);
                        if (!isNaN(fechaExcel.getTime())) fechaParseada = fechaExcel;
                    }
                    fecha = fechaParseada;
                }
                if (isNaN(fecha.getTime())) {
                    const partes = fechaStr.split(/[/-]/);
                    if (partes.length === 3) {
                        fecha = new Date(partes[2], partes[1] - 1, partes[0]);
                    }
                }
                if (isNaN(fecha.getTime())) return fechaStr;
                return fecha.toLocaleDateString('es-MX', {
                    day: 'numeric',
                    month: 'short',
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });
            } catch (e) {
                console.warn('Error parseando fecha:', fechaStr, e);
                return fechaStr;
            }
        }

        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function abrirLightbox(url, tipo) {
            const lightbox = document.getElementById('lightbox');
            const content = document.getElementById('lightbox-content');
            if (tipo === 'video') {
                content.innerHTML = `<video controls autoplay style="max-width:90%; max-height:90%;"><source src="${escapeHTML(url)}" type="video/mp4"></video>`;
            } else {
                content.innerHTML = `<img src="${escapeHTML(url)}" alt="Imagen ampliada">`;
            }
            lightbox.classList.add('active');
        }

        function cerrarLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.getElementById('lightbox-content').innerHTML = '';
        }

        async function registrarVista(avisoId) {
            try {
                const apiKey = localStorage.getItem('api_key');
                await API.peticion('REGISTRAR_VISTA', { id: avisoId }, apiKey);
            } catch (e) { console.warn('Error registrando vista:', e); }
        }

        async function registrarClickWhatsApp(id) {
            try { await API.peticion('REGISTRAR_CLICK_WHATSAPP', { id: id }); }
            catch (e) { console.warn('Error registrando click WhatsApp:', e); }
        }

        // ========== POLLING PARA TIEMPO REAL ==========
        let pollingInterval = null;
        let ultimosDatos = { likes: 0, dislikes: 0, comentarios: 0, vistas: 0 };

        async function obtenerActualizacionesEnTiempoReal() {
            if (!avisoActual || !avisoActual.id) return;
            try {
                const apiKey = localStorage.getItem('api_key');
                const resultado = await API.peticion('OBTENER_ESTADISTICAS', { id: avisoActual.id }, apiKey);
                if (resultado && resultado.success) {
                    const datos = resultado.data;
                    if (datos.likes !== ultimosDatos.likes) {
                        const likesSpan = document.querySelector('.likes-count');
                        if (likesSpan) likesSpan.textContent = datos.likes;
                        ultimosDatos.likes = datos.likes;
                    }
                    if (datos.dislikes !== ultimosDatos.dislikes) {
                        const dislikesSpan = document.querySelector('.dislikes-count');
                        if (dislikesSpan) dislikesSpan.textContent = datos.dislikes;
                        ultimosDatos.dislikes = datos.dislikes;
                    }
                    if (datos.vistas !== ultimosDatos.vistas) {
                        const vistasSpan = document.querySelector('.vistas-count');
                        if (vistasSpan) vistasSpan.textContent = datos.vistas;
                        ultimosDatos.vistas = datos.vistas;
                    }
                    if (datos.comentarios !== ultimosDatos.comentarios && datos.comentarios > ultimosDatos.comentarios) {
                        cargarComentarios(avisoActual.id);
                        ultimosDatos.comentarios = datos.comentarios;
                    } else if (datos.comentarios !== ultimosDatos.comentarios) {
                        ultimosDatos.comentarios = datos.comentarios;
                    }
                }
            } catch (error) {
                console.warn('Error en polling:', error);
            }
        }

        function iniciarPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            const likesSpan = document.querySelector('.likes-count');
            const dislikesSpan = document.querySelector('.dislikes-count');
            const vistasSpan = document.querySelector('.vistas-count');
            const comentariosSpan = document.querySelector('.comments-count');
            ultimosDatos = {
                likes: likesSpan ? parseInt(likesSpan.textContent) || 0 : 0,
                dislikes: dislikesSpan ? parseInt(dislikesSpan.textContent) || 0 : 0,
                vistas: vistasSpan ? parseInt(vistasSpan.textContent) || 0 : 0,
                comentarios: comentariosSpan ? parseInt(comentariosSpan.textContent) || 0 : 0
            };
            pollingInterval = setInterval(() => {
                if (!document.hidden) {
                    obtenerActualizacionesEnTiempoReal();
                }
            }, 60000);
        }

        function detenerPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        document.addEventListener('visibilitychange', function () {
            if (!document.hidden && avisoActual && avisoActual.id) {
                obtenerActualizacionesEnTiempoReal();
            }
        });

        // ========== LIKE Y DISLIKE ==========
        async function darLike(avisoId) {
            const apiKey = localStorage.getItem('api_key');
            if (!apiKey) { showToast('🔐 Inicia sesión para dar like', 1500); return; }
            try {
                const resultado = await API.peticion('VOTAR_AVISO', { aviso_id: avisoId, tipo: 'positivo' }, apiKey);
                if (resultado && resultado.success) {
                    const likesSpan = document.querySelector('.likes-count');
                    if (likesSpan) likesSpan.textContent = resultado.data?.likes || resultado.likes;
                    const likeBtn = document.querySelector('.like-btn');
                    if (likeBtn) likeBtn.classList.add('liked');
                    showToast('👍 Like registrado', 1500);
                } else {
                    showToast('❌ ' + (resultado?.error || 'No se pudo'), 1500);
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Error de conexión', 1500);
            }
        }

        async function darDislike(avisoId) {
            const apiKey = localStorage.getItem('api_key');
            if (!apiKey) { showToast('🔐 Inicia sesión para dar dislike', 1500); return; }
            try {
                const resultado = await API.peticion('VOTAR_AVISO', { aviso_id: avisoId, tipo: 'negativo' }, apiKey);
                if (resultado && resultado.success) {
                    const dislikesSpan = document.querySelector('.dislikes-count');
                    if (dislikesSpan) dislikesSpan.textContent = resultado.data?.dislikes || resultado.dislikes;
                    const dislikeBtn = document.querySelector('.dislike-btn');
                    if (dislikeBtn) dislikeBtn.classList.add('disliked');
                    showToast('👎 Dislike registrado', 1500);
                } else {
                    showToast('❌ ' + (resultado?.error || 'No se pudo'), 1500);
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Error de conexión', 1500);
            }
        }

        // ========== COMENTARIOS ==========
        let currentAvisoIdForComments = null;

        async function cargarComentarios(avisoId) {
            const commentsList = document.getElementById('comments-list');
            if (!commentsList) return;
            commentsList.innerHTML = '<div class="cargando">💬 Cargando comentarios...</div>';
            try {
                const apiKey = localStorage.getItem('api_key');
                const resultado = await API.peticion('LISTAR_COMENTARIOS', { avisoId: avisoId }, apiKey);
                console.log('Comentarios respuesta:', resultado);
                if (resultado && resultado.success) {
                    let comentarios = [];
                    if (resultado.data && Array.isArray(resultado.data)) {
                        comentarios = resultado.data;
                    } else if (resultado.datos && Array.isArray(resultado.datos)) {
                        comentarios = resultado.datos;
                    }
                    if (comentarios.length === 0) {
                        commentsList.innerHTML = '<div style="text-align:center; color:#888;">📝 No hay comentarios aún. ¡Sé el primero!</div>';
                    } else {
                        commentsList.innerHTML = comentarios.map(com => {
                            let fechaComentario = com.fecha || com.created_at || com.timestamp || com.fechacreacion;
                            return `
                            <div class="comment-item">
                                <div class="comment-author">${escapeHTML(com.autor || com.usuario_nombre || com.usuario_email || 'Anónimo')}</div>
                                <div class="comment-text">${escapeHTML(com.texto || com.comentario || com.contenido)}</div>
                                <div class="comment-date">${formatearFecha(fechaComentario)}</div>
                            </div>`;
                        }).join('');
                    }
                } else {
                    commentsList.innerHTML = '<div style="text-align:center; color:#888;">💬 No hay comentarios aún</div>';
                }
            } catch (e) {
                console.error('Error cargando comentarios:', e);
                commentsList.innerHTML = '<div style="text-align:center; color:#e74c3c;">❌ Error al cargar comentarios</div>';
            }
        }

        window.enviarComentario = async function () {
            const input = document.getElementById('comment-input');
            const texto = input.value.trim();
            if (!texto) { showToast('✏️ Escribe un comentario primero', 1500); return; }
            if (!currentAvisoIdForComments) { showToast('❌ Error: No se identificó el aviso', 1500); return; }
            const apiKey = localStorage.getItem('api_key');
            if (!apiKey) { showToast('🔐 Inicia sesión para comentar', 1500); return; }
            const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
            const autor = usuario.nombre || usuario.email || 'Anónimo';
            try {
                const resultado = await API.peticion('AGREGAR_COMENTARIO', {
                    avisoId: currentAvisoIdForComments,
                    texto: texto,
                    autor: autor
                }, apiKey);
                if (resultado && resultado.success) {
                    input.value = '';
                    showToast('💬 Comentario enviado', 1500);
                    cargarComentarios(currentAvisoIdForComments);
                    const comentariosSpan = document.querySelector('.comments-count');
                    if (comentariosSpan) {
                        let actual = parseInt(comentariosSpan.textContent) || 0;
                        comentariosSpan.textContent = actual + 1;
                    }
                } else {
                    showToast('❌ ' + (resultado?.error || 'Error al enviar comentario'), 1500);
                }
            } catch (e) {
                console.error('Error enviando comentario:', e);
                showToast('❌ Error de conexión', 1500);
            }
        };

        window.abrirComentarios = function (id, event) {
            if (event) event.stopPropagation();
            const apiKey = localStorage.getItem('api_key');
            if (!apiKey) {
                showToast('🔐 Inicia sesión para ver y comentar', 2000);
                return;
            }
            currentAvisoIdForComments = id;
            document.getElementById('comments-panel').classList.add('open');
            cargarComentarios(id);
        };

        window.cerrarPanelComentarios = function () {
            document.getElementById('comments-panel').classList.remove('open');
            currentAvisoIdForComments = null;
        };

        // ========== VARIABLES GLOBALES ==========
        const AVISO_ID = new URLSearchParams(window.location.search).get('id');
        let avisoActual = null;
        let usuarioActual = null;

        // ========== RENDERIZADO PRINCIPAL ==========
        function renderizarAviso() {
            if (!avisoActual) return;

            let fechaTexto = 'Fecha no disponible';
            if (avisoActual.created_at) {
                try { fechaTexto = new Date(avisoActual.created_at).toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' }); }
                catch (e) { fechaTexto = String(avisoActual.created_at); }
            }

            const esUrgente = avisoActual.destacado === 'TRUE' || avisoActual.categoria === 'urgente';
            const esPendiente = avisoActual.status === 'pendiente';
            const esAdmin = usuarioActual && usuarioActual.rol === 'admin';
            const esPropietario = usuarioActual && String(usuarioActual.id) === String(avisoActual.created_by);
            const puedeEditar = esAdmin || esPropietario;

            const categoriaLegible = {
                'urgente': 'URGENTE', 'escuelas': 'ESCUELAS', 'servicios': 'SERVICIOS',
                'comercios': 'COMERCIOS', 'eventos': 'EVENTOS', 'gobierno': 'GOBIERNO', 'varios': 'VARIOS'
            }[avisoActual.categoria] || avisoActual.categoria || 'GENERAL';

            let categoriaClase = '', categoriaTexto = categoriaLegible;
            if (esUrgente) { categoriaClase = 'urgente'; categoriaTexto = '⚠️ URGENTE'; }
            else if (esPendiente) { categoriaClase = 'pendiente'; categoriaTexto = '⏳ PENDIENTE DE APROBACIÓN'; }

            // Multimedia
            let videoUrl = null;
            let imagenesGaleria = [];
            if (avisoActual.video_url && avisoActual.video_url.trim() !== '') {
                videoUrl = avisoActual.video_url;
                if (videoUrl.includes('youtube.com/watch?v=')) {
                    const videoId = videoUrl.split('v=')[1].split('&')[0];
                    videoUrl = `https://www.youtube.com/embed/${videoId}`;
                } else if (videoUrl.includes('youtu.be/')) {
                    const videoId = videoUrl.split('youtu.be/')[1].split('?')[0];
                    videoUrl = `https://www.youtube.com/embed/${videoId}`;
                }
            }
            if (avisoActual.imagen_url && avisoActual.imagen_url.trim() !== '') {
                if (avisoActual.imagen_url.includes(',')) {
                    imagenesGaleria = avisoActual.imagen_url.split(',').map(u => u.trim()).filter(u => u);
                } else {
                    imagenesGaleria = [avisoActual.imagen_url.trim()];
                }
            }

            const likes = parseInt(avisoActual.intereses) || 0;
            const dislikes = parseInt(avisoActual.votos_negativos) || 0;
            const comentarios = parseInt(avisoActual.comentarios_count) || 0;
            const vistas = parseInt(avisoActual.vistas) || parseInt(avisoActual.visitas) || parseInt(avisoActual.views) || 0;

            const tieneContacto = avisoActual.contacto && typeof avisoActual.contacto === 'string' && avisoActual.contacto.trim();
            const numero = tieneContacto ? String(avisoActual.contacto).replace(/[^0-9]/g, '') : '';
            const mensaje = encodeURIComponent(`Hola, vi tu aviso "${avisoActual.titulo}" en BARRIO. Me interesa.`);

            let html = `
            <div class="article-header">
                <div class="article-category ${categoriaClase}">${categoriaTexto}</div>
                <h1 class="article-title">${escapeHTML(avisoActual.titulo || 'Sin título')}</h1>
                <div class="article-meta">
                    <span>📅 ${escapeHTML(fechaTexto)}</span>
                    <span>👤 ${escapeHTML(avisoActual.nombre_autor || avisoActual.autor_nombre || avisoActual.nombre_usuario || avisoActual.created_by || 'Vecino')}</span>
                    <span>🏷️ ${escapeHTML(categoriaLegible)}</span>
                </div>
            </div>
        `;

            // Video destacado o imagen principal
            if (videoUrl) {
                html += `<div class="featured-video-container">
                            <video controls autoplay class="featured-video" poster="${imagenesGaleria[0] || ''}">
                                <source src="${escapeHTML(videoUrl)}" type="video/mp4">
                                Tu navegador no soporta videos.
                            </video>
                        </div>`;
            } else if (imagenesGaleria.length > 0) {
                html += `<div class="featured-image-container">
                            <img src="${escapeHTML(imagenesGaleria[0])}" class="featured-image" onclick="abrirLightbox('${escapeHTML(imagenesGaleria[0])}', 'imagen')">
                        </div>`;
            }

            html += `<div class="article-body">`;
            html += `<div class="article-content">${formatearContenido(avisoActual.contenido)}</div>`;
            // Mostrar ubicación, fecha del evento y WhatsApp juntos
            html += `<div style="display: flex; flex-wrap: wrap; gap: 1rem; margin: 1rem 0; padding: 1rem; background: #f8f9fa; border-radius: 12px; align-items: center;">`;

            // Ubicación
            if (avisoActual.ubicacion) {
                html += `<div style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="font-size: 1.2rem;">📍</span>
                <span><strong>Ubicación:</strong> ${escapeHTML(avisoActual.ubicacion)}</span>
            </div>`;
            }

            // Fecha del evento (si existe)
            if (avisoActual.fecha_evento && avisoActual.fecha_evento.trim() !== '') {
                let fechaEvento = avisoActual.fecha_evento;
                // Formatear la fecha si es necesario
                try {
                    const fechaObj = new Date(fechaEvento);
                    if (!isNaN(fechaObj.getTime())) {
                        fechaEvento = fechaObj.toLocaleDateString('es-MX', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                    }
                } catch (e) { /* mantener fecha original */ }

                html += `<div style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="font-size: 1.2rem;">📅</span>
                <span><strong>Fecha del evento:</strong> ${escapeHTML(fechaEvento)}</span>
            </div>`;
            }

            // Botón WhatsApp (si hay contacto)
            if (tieneContacto) {
                html += `<a href="https://wa.me/52${numero}?text=${mensaje}" 
                style="display: inline-flex; align-items: center; gap: 0.5rem; background: #25D366; color: white; padding: 0.5rem 1rem; border-radius: 40px; text-decoration: none; font-weight: 600; margin-left: auto;"
                target="_blank" 
                onclick="registrarClickWhatsApp('${avisoActual.id}')">
                <span>📱</span> WhatsApp
            </a>`;
            }

            html += `</div>`;

            // stats-row con todas las acciones integradas
            html += `<div class="stats-row">`;

            // 1. Vistas (solo estadística)
            html += `<div class="stat-item">
                        <span class="stat-icon">👁️</span>
                        <span class="stat-value vistas-count">${vistas}</span>
                    </div>`;

            // 2. Like (botón)
            html += `<div class="stat-item action-btn like-btn" onclick="darLike('${avisoActual.id}')">
                        <span class="stat-icon">👍</span>
                        <span class="stat-value likes-count">${likes}</span>
                    </div>`;

            // 3. Dislike (botón)
            html += `<div class="stat-item action-btn dislike-btn" onclick="darDislike('${avisoActual.id}')">
                        <span class="stat-icon">👎</span>
                        <span class="stat-value dislikes-count">${dislikes}</span>
                    </div>`;

            // 4. Comentarios (botón)
            html += `<div class="stat-item action-btn" onclick="abrirComentarios('${avisoActual.id}', event)">
                        <span class="stat-icon">💬</span>
                        <span class="stat-value comments-count">${comentarios}</span>
                    </div>`;

            // 5. WhatsApp
            if (tieneContacto) {
                html += `<a href="https://wa.me/52${numero}?text=${mensaje}" class="stat-item action-btn" target="_blank" style="background: #25D366; color: white;">
    <span class="stat-icon">📱</span>
    <span class="stat-value">WhatsApp</span>
</a> onclick="registrarClickWhatsApp('${avisoActual.id}')">
                            <span class="stat-icon">📱</span>
                            <span class="stat-value">WhatsApp</span>
                        </a>`;
            }

            // 6. Botones admin
            if (puedeEditar) {
                html += `<div class="stat-item action-btn admin-action" onclick="irAEditar('${avisoActual.id}')">
                            <span class="stat-icon">✏️</span>
                            <span class="stat-value"></span>
                        </div>`;
                html += `<div class="stat-item action-btn admin-action" onclick="eliminarAviso('${avisoActual.id}')">
                            <span class="stat-icon">🗑️</span>
                            <span class="stat-value"></span>
                        </div>`;
            }

            // 7. Botón volver
            if (puedeEditar) {
                html += `<a href="/barrio/admin.html" class="stat-item action-btn back-link">
                            <span class="stat-icon">←</span>
                            <span class="stat-value">Panel</span>
                        </a>`;
            } else {
                html += `<a href="/barrio/index.html" class="stat-item action-btn back-link">
                            <span class="stat-icon">←</span>
                            <span class="stat-value">Inicio</span>
                        </a>`;
            }

            html += `</div>`; // cierre stats-row

            // Galería de imágenes adicionales
            if (imagenesGaleria.length > 1) {
                const imagenesAdicionales = imagenesGaleria.slice(1);
                html += `<div class="gallery-section">
                            <div class="gallery-title">📸 Galería de imágenes</div>
                            <div class="gallery">
                                ${imagenesAdicionales.map(img => `
                                    <div class="gallery-item" onclick="abrirLightbox('${escapeHTML(img)}', 'imagen')">
                                        <img src="${escapeHTML(img)}" loading="lazy">
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
            }

            html += `</div>`; // cierre article-body

            <!-- ========== NUEVO CONTENEDOR DE PUBLICIDAD ========== -->
            html += `
<!-- Anuncio con botón circular de WhatsApp usando el logo real -->
<div style="margin: 2rem 0 1rem;">
    <div style="display: flex; align-items: center; gap: 0.75rem; background: #f8f9fa; border-radius: 14px; padding: 0.75rem 1rem;">
        <div style="width: 40px; height: 40px; background: #f5b04220; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
            <span>📢</span>
        </div>
        <div style="flex: 1;">
            <div style="font-weight: 500; font-size: 0.85rem;">¿Quieres promocionar tu negocio?</div>
            <div style="font-size: 0.75rem; color: #666;">Llega a más vecinos en El Barrio</div>
        </div>
        <a href="https://wa.me/523222354331?text=Hola,%20quiero%20anunciarme%20en%20EL%20BARRIO" 
           class="whatsapp-btn"
           target="_blank">
        </a>
    </div>
</div>
`;

            document.getElementById('aviso-container').innerHTML = html;
            iniciarPolling();
        }

        async function cargarAviso() {
            const container = document.getElementById('aviso-container');
            if (!AVISO_ID) {
                container.innerHTML = `<div class="error-message">❌ No se especificó ningún aviso</div>`;
                return;
            }
            container.innerHTML = '<div class="loading-state">📰 Cargando aviso...</div>';
            try {
                usuarioActual = API.getUsuarioActual();
                const resultado = await API.peticion('LISTAR_AVISOS_PUBLICOS', {});
                let aviso = null;
                if (resultado && resultado.success && resultado.data && resultado.data.datos) {
                    aviso = resultado.data.datos.find(a => String(a.id) === String(AVISO_ID));
                }
                if (!aviso && resultado && resultado.success && resultado.data) {
                    if (Array.isArray(resultado.data)) {
                        aviso = resultado.data.find(a => String(a.id) === String(AVISO_ID));
                    } else if (resultado.data.datos) {
                        aviso = resultado.data.datos.find(a => String(a.id) === String(AVISO_ID));
                    }
                }
                if (!aviso) {
                    container.innerHTML = `<div class="error-message">❌ Aviso no encontrado</div>`;
                    return;
                }
                avisoActual = aviso;
                registrarVista(AVISO_ID);
                renderizarAviso();
                cargarComentarios(AVISO_ID);
                setTimeout(() => { actualizarContadorVistas(); }, 500);
            } catch (error) {
                console.error('Error cargando aviso:', error);
                container.innerHTML = `<div class="error-message">❌ Error al cargar el aviso: ${escapeHTML(error.message)}</div>`;
            }
        }

        async function actualizarContadorVistas() {
            try {
                const apiKey = localStorage.getItem('api_key');
                const resultado = await API.peticion('OBTENER_ESTADISTICAS', { id: AVISO_ID }, apiKey);
                if (resultado && resultado.success && resultado.data) {
                    const vistasSpan = document.querySelector('.vistas-count');
                    if (vistasSpan) {
                        vistasSpan.textContent = resultado.data.vistas || resultado.data.visitas || 0;
                    }
                }
            } catch (e) { console.warn('Error actualizando vistas:', e); }
        }

        window.irAEditar = (id) => window.location.href = `/barrio/admin.html?editar=${id}`;
        window.eliminarAviso = async (id) => {
            if (!confirm('¿Eliminar este aviso permanentemente?')) return;
            try {
                const apiKey = localStorage.getItem('api_key');
                const resultado = await API.peticion('ELIMINAR', { coleccion: 'AVISOS', id: id }, apiKey);
                if (resultado?.success) { alert('✅ Aviso eliminado'); window.location.href = '/barrio/index.html'; }
                else alert('❌ Error: ' + (resultado?.error || 'Error desconocido'));
            } catch (e) { alert('❌ Error al eliminar'); }
        };

        // Exponer funciones globales
        window.darLike = darLike;
        window.darDislike = darDislike;
        window.abrirLightbox = abrirLightbox;
        window.cerrarLightbox = cerrarLightbox;
        window.registrarClickWhatsApp = registrarClickWhatsApp;

        // ========== HEADER Y ACTUALIZACIÓN DE SESIÓN ==========
        function actualizarHeaderPorSesion() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');
            const loginLink = document.getElementById('login-link');
            const userArea = document.getElementById('user-area');
            const userNameSpan = document.getElementById('user-name');
            const cerrarBtn = document.getElementById('cerrar-sesion');
            if (!loginLink) { setTimeout(actualizarHeaderPorSesion, 200); return; }
            if (usuarioStr && apiKey) {
                try {
                    const usuario = JSON.parse(usuarioStr);
                    if (loginLink) loginLink.style.display = 'none';
                    if (userArea) userArea.style.display = 'flex';
                    if (userNameSpan) {
                        userNameSpan.textContent = `👋 ${usuario.nombre || usuario.email || 'Usuario'}`;
                        userNameSpan.style.cursor = 'pointer';
                        userNameSpan.onclick = () => window.location.href = '/barrio/admin.html';
                    }
                    if (cerrarBtn) {
                        const nuevoCerrar = cerrarBtn.cloneNode(true);
                        cerrarBtn.parentNode.replaceChild(nuevoCerrar, cerrarBtn);
                        nuevoCerrar.addEventListener('click', (e) => {
                            e.preventDefault();
                            localStorage.removeItem('usuario');
                            localStorage.removeItem('api_key');
                            window.location.href = '/barrio/index.html';
                        });
                    }
                } catch (e) { console.error(e); }
            } else {
                if (loginLink) loginLink.style.display = 'inline-flex';
                if (userArea) userArea.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            fetch('/barrio/common/header.html')
                .then(res => res.ok ? res.text() : Promise.reject())
                .then(html => {
                    document.getElementById('header-container').innerHTML = html;
                    setTimeout(actualizarHeaderPorSesion, 100);
                    setTimeout(actualizarHeaderPorSesion, 300);
                    setTimeout(actualizarHeaderPorSesion, 600);
                })
                .catch(err => console.error('Error cargando header:', err));
            cargarAviso();
        });

        window.addEventListener('beforeunload', () => { detenerPolling(); });
    </script>
</body>

</html>
