<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Administración - Avisos Colonia Jardines PVR</title>
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
  <style>
    /* Estilos adicionales para asegurar que los tabs funcionen */
    .tab {
      display: none;
    }

    .tab.activo {
      display: block;
    }

    .filtro.activo {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }

    #admin-tabs {
      margin-bottom: 30px;
      border-bottom: 2px solid #e0e0e0;
    }

    .filtro {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <main class="contenedor">
    <div id="mensaje-container"></div>

    <div class="filtros" id="admin-tabs">
      <button class="filtro activo" data-tab="nuevo">Nuevo aviso</button>
      <button class="filtro" data-tab="lista">Mis avisos</button>
      <button class="filtro" data-tab="perfil">Mi perfil</button>
      <button class="filtro" data-tab="usuarios" id="tab-usuarios-btn" style="display: none;">Usuarios</button>
    </div>

    <!-- Pestaña: Nuevo aviso -->
    <div id="tab-nuevo" class="tab activo">
      <form id="form-aviso" class="formulario" style="max-width: 100%;">
        <h2 style="margin-bottom: 24px; font-weight: 500;">Publicar aviso</h2>

        <div class="campo">
          <label for="categoria">Categoría</label>
          <select id="categoria" name="categoria" required>
            <option value="">Seleccionar</option>
            <option value="urgente">Urgente</option>
            <option value="eventos">Eventos</option>
            <option value="servicios">Servicios</option>
            <option value="perdidos">Perdidos y encontrados</option>
            <option value="clasificados">Clasificados</option>
          </select>
        </div>

        <div class="campo">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="titulo" required placeholder="Ej: Kermés vecinal">
        </div>

        <div class="campo">
          <label for="contenido">Descripción</label>
          <textarea id="contenido" name="contenido" required placeholder="Escribe los detalles del aviso..."></textarea>
        </div>

        <div class="campo">
          <label for="ubicacion">Ubicación (opcional)</label>
          <input type="text" id="ubicacion" name="ubicacion" placeholder="Ej: Calle Principal #123">
        </div>

        <div class="campo">
          <label for="contacto">Contacto (opcional)</label>
          <input type="text" id="contacto" name="contacto" placeholder="Ej: Teléfono o email">
        </div>

        <div class="campo">
          <label for="fecha_evento">Fecha del evento (opcional)</label>
          <input type="date" id="fecha_evento" name="fecha_evento">
        </div>

        <div class="campo" style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="urgente" name="urgente" style="width: auto;">
          <label for="urgente" style="margin-bottom: 0;">Marcar como urgente</label>
        </div>

        <div class="grupo-botones">
          <button type="submit" class="boton">Publicar aviso</button>
          <button type="button" class="boton boton-secundario" id="cancelar">Cancelar</button>
        </div>
      </form>
    </div>

    <!-- Pestaña: Lista de avisos -->
    <div id="tab-lista" class="tab">
      <div id="mis-avisos-container"></div>
      <div id="paginacion-admin" class="paginacion"></div>
    </div>

    <!-- Pestaña: Perfil -->
    <div id="tab-perfil" class="tab">
      <div class="formulario" style="max-width: 100%;">
        <h2 style="margin-bottom: 24px; font-weight: 500;">Mi perfil</h2>

        <div id="perfil-info"></div>

        <div style="margin-top: 32px;">
          <h3 style="margin-bottom: 16px; font-weight: 500;">Notificaciones</h3>
          <button class="boton boton-secundario" id="activar-notificaciones" style="width: auto;">
            Activar notificaciones
          </button>
        </div>
      </div>
    </div>

    <!-- Pestaña: Usuarios (solo admin) -->
    <div id="tab-usuarios" class="tab">
      <div class="formulario" style="max-width: 100%;">
        <h2 style="margin-bottom: 24px; font-weight: 500;">Administrar usuarios</h2>

        <form id="form-usuario">
          <div class="campo">
            <label for="user-email">Email</label>
            <input type="email" id="user-email" required placeholder="ejemplo@correo.com">
          </div>

          <div class="campo">
            <label for="user-nombre">Nombre completo</label>
            <input type="text" id="user-nombre" required placeholder="Nombre del usuario">
          </div>

          <div class="campo">
            <label for="user-rol">Rol</label>
            <select id="user-rol" required>
              <option value="usuario">Usuario</option>
              <option value="admin">Administrador</option>
            </select>
          </div>

          <div class="campo">
            <label for="user-password">Contraseña</label>
            <input type="password" id="user-password" required placeholder="Contraseña temporal">
          </div>

          <div class="campo">
            <label for="user-categorias">Categorías permitidas</label>
            <select id="user-categorias">
              <option value="todas">Todas las categorías</option>
              <option value="urgente">Solo urgentes</option>
              <option value="eventos">Solo eventos</option>
              <option value="servicios">Solo servicios</option>
              <option value="perdidos">Solo perdidos</option>
              <option value="clasificados">Solo clasificados</option>
            </select>
          </div>

          <div class="grupo-botones">
            <button type="submit" class="boton">Crear usuario</button>
          </div>
        </form>

        <h3 style="margin: 32px 0 16px;">Usuarios registrados</h3>
        <div id="lista-usuarios-container"></div>
      </div>
    </div>
  </main>

  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/auth.js"></script> <!-- 👈 ESTE FALTABA -->
  <script src="/avisos-jardines/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      await UI.cargarHeader();
    });
  </script>

  <script>
    // Manejar cierre de sesión
    document.getElementById('cerrar-sesion')?.addEventListener('click', function (e) {
      e.preventDefault();
      if (API.cerrarSesion) {
        API.cerrarSesion();
      }
      window.location.href = '/avisos-jardines/login.html';
    });
  </script>
</body>

</html>
